<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>웹디자인기능사 필기 요점 · 색으로 외우는 학습실</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    /* 중립 베이스 */
    --ink:#1a1c22;
    --ink-2:#4a4e5a;
    --ink-3:#838897;
    --paper:#eef0f4;
    --card:#ffffff;
    --line:#e2e5ec;
    --line-soft:#eceef3;
    /* 출제율(중요도) 색 스케일 — 색채 시험 테마 */
    --r95:#e0263c; /* 90%+  필수 */
    --r80:#ef7d1a; /* 80-89 핵심 */
    --r70:#e0a500; /* 70-79 중요 */
    --r60:#16a085; /* 60-69 보통 */
    --r50:#3f7ee6; /* ~59   참고 */
    --r00:#9aa0ad; /* 미표기 */
    --gold:#caa53d;
    --shadow:0 1px 2px rgba(20,24,40,.05),0 8px 24px -12px rgba(20,24,40,.18);
    --shadow-lg:0 4px 12px rgba(20,24,40,.08),0 24px 48px -20px rgba(20,24,40,.28);
    --radius:14px;
    --fs-base:15.5px;
    --font:'IBM Plex Sans KR',-apple-system,BlinkMacSystemFont,'Malgun Gothic',sans-serif;
    --mono:'IBM Plex Mono','IBM Plex Sans KR',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  @media (prefers-reduced-motion:reduce){html{scroll-behavior:auto}*{animation-duration:.001ms!important;transition-duration:.001ms!important}}
  body{
    font-family:var(--font);font-size:var(--fs-base);line-height:1.6;color:var(--ink);
    background:var(--paper);-webkit-font-smoothing:antialiased;
    background-image:radial-gradient(circle at 1px 1px, rgba(20,24,40,.035) 1px, transparent 0);
    background-size:22px 22px;
  }
  /* ===== 스펙트럼 띠 (가시광선 시그니처) ===== */
  .spectrum{height:5px;width:100%;
    background:linear-gradient(90deg,#5b2a86 0%,#3f51b5 14%,#2196f3 28%,#00bcd4 40%,#3ec46d 52%,#cddc39 64%,#ffeb3b 74%,#ff9800 86%,#e53935 100%);
  }

  /* ===== 헤더 ===== */
  header.top{position:sticky;top:0;z-index:40;background:rgba(238,240,244,.86);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
  .top-inner{max-width:1080px;margin:0 auto;padding:14px 20px 12px;display:flex;flex-wrap:wrap;align-items:center;gap:14px 20px}
  .brand{display:flex;flex-direction:column;gap:2px;min-width:0}
  .brand .kicker{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-3);font-weight:600}
  .brand h1{font-size:19px;font-weight:700;letter-spacing:-.01em;white-space:nowrap}
  .brand h1 em{font-style:normal;color:var(--r95)}
  .progress-wrap{margin-left:auto;display:flex;align-items:center;gap:12px;min-width:200px}
  .ring{position:relative;width:46px;height:46px;flex:none}
  .ring svg{transform:rotate(-90deg)}
  .ring .pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-weight:600;font-size:12px;color:var(--ink)}
  .progress-meta{font-size:12.5px;color:var(--ink-2);line-height:1.3}
  .progress-meta b{color:var(--ink);font-weight:600}
  .search{position:relative;flex:1 1 220px;min-width:180px;max-width:340px}
  .search input{width:100%;padding:10px 14px 10px 38px;border:1px solid var(--line);border-radius:10px;background:var(--card);font-family:var(--font);font-size:14px;color:var(--ink);box-shadow:var(--shadow)}
  .search input:focus{outline:none;border-color:var(--ink);box-shadow:0 0 0 3px rgba(26,28,34,.08)}
  .search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--ink-3)}
  .search .clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);border:none;background:none;color:var(--ink-3);cursor:pointer;font-size:18px;line-height:1;padding:4px;display:none}

  /* ===== 컨트롤 바 ===== */
  .controls{max-width:1080px;margin:0 auto;padding:16px 20px 0;display:flex;flex-wrap:wrap;gap:10px 14px;align-items:center}
  .tabs{display:flex;gap:6px;flex-wrap:wrap;background:var(--card);padding:5px;border-radius:12px;border:1px solid var(--line);box-shadow:var(--shadow)}
  .tab{border:none;background:none;font-family:var(--font);font-size:13.5px;font-weight:600;color:var(--ink-2);padding:8px 14px;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .15s,color .15s}
  .tab .dot{width:9px;height:9px;border-radius:50%;background:var(--ink-3)}
  .tab[data-p="p1"] .dot{background:var(--r95)}
  .tab[data-p="p2"] .dot{background:var(--r50)}
  .tab[data-p="p3"] .dot{background:var(--r60)}
  .tab.active{background:var(--ink);color:#fff}
  .tab.active .dot{background:#fff!important}
  .tab .mini{font-family:var(--mono);font-size:11px;opacity:.7;font-weight:500}

  .seg{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap}
  .seg-group{display:flex;background:var(--card);border:1px solid var(--line);border-radius:10px;overflow:hidden;box-shadow:var(--shadow)}
  .seg-btn{border:none;background:none;font-family:var(--font);font-size:12.5px;font-weight:500;color:var(--ink-2);padding:8px 12px;cursor:pointer;border-right:1px solid var(--line-soft)}
  .seg-btn:last-child{border-right:none}
  .seg-btn.on{background:var(--ink);color:#fff}

  /* ===== 범례 ===== */
  .legend{max-width:1080px;margin:14px auto 0;padding:0 20px;display:flex;flex-wrap:wrap;gap:6px 16px;align-items:center;font-size:11.5px;color:var(--ink-3)}
  .legend .lg{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);letter-spacing:.02em}
  .legend .chip{width:11px;height:11px;border-radius:3px}

  /* ===== 메인 ===== */
  main{max-width:1080px;margin:0 auto;padding:18px 20px 80px}
  .part-head{display:flex;align-items:baseline;gap:12px;margin:8px 2px 16px;flex-wrap:wrap}
  .part-head .lbl{font-family:var(--mono);font-size:12px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-3)}
  .part-head .nm{font-size:24px;font-weight:700;letter-spacing:-.02em}
  .part-head .cnt{font-family:var(--mono);font-size:12.5px;color:var(--ink-3);margin-left:auto}

  .grid{display:grid;gap:12px}

  /* ===== 섹션 카드 ===== */
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;transition:box-shadow .18s,border-color .18s}
  .card.open{box-shadow:var(--shadow-lg)}
  .card.done{border-color:#cfe9df}
  .chead{display:flex;align-items:center;gap:14px;padding:14px 16px;cursor:pointer;user-select:none;position:relative}
  .chead:hover{background:#fafbfc}
  /* 컬러칩 = 출제율 */
  .chip-rate{flex:none;width:54px;height:54px;border-radius:11px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;position:relative;overflow:hidden}
  .chip-rate .v{font-family:var(--mono);font-weight:600;font-size:17px;line-height:1}
  .chip-rate .u{font-size:9px;opacity:.85;margin-top:1px;letter-spacing:.04em}
  .chip-rate.na{background:repeating-linear-gradient(45deg,#cdd2db,#cdd2db 5px,#d8dce3 5px,#d8dce3 10px);color:#6b7280}
  .chip-rate.na .v{font-size:13px}
  .ctitle{flex:1 1 auto;min-width:0}
  .ctitle .num{font-family:var(--mono);font-size:12px;color:var(--ink-3);font-weight:500}
  .ctitle h3{font-size:16px;font-weight:600;letter-spacing:-.01em;line-height:1.35;display:inline}
  .ctitle .bar{margin-top:7px;height:5px;border-radius:3px;background:var(--line-soft);overflow:hidden;max-width:240px}
  .ctitle .bar i{display:block;height:100%;border-radius:3px}
  .cacts{flex:none;display:flex;align-items:center;gap:4px}
  .iconbtn{width:34px;height:34px;border:none;background:none;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink-3);transition:background .15s,color .15s}
  .iconbtn:hover{background:var(--line-soft);color:var(--ink)}
  .iconbtn.fav.on{color:var(--gold)}
  .iconbtn.chk.on{color:#16a085}
  .caret{transition:transform .2s;color:var(--ink-3)}
  .card.open .caret{transform:rotate(180deg)}
  .done-flag{position:absolute;top:0;left:0;width:0;height:0;border-top:26px solid #16a085;border-right:26px solid transparent}
  .card:not(.done) .done-flag{display:none}

  /* 본문 */
  .cbody{display:grid;grid-template-rows:0fr;transition:grid-template-rows .26s ease}
  .card.open .cbody{grid-template-rows:1fr}
  .cbody-in{overflow:hidden}
  .cbody-pad{padding:4px 18px 20px;border-top:1px solid var(--line-soft)}
  .group{margin-top:16px}
  .group:first-child{margin-top:12px}
  .group .gh{font-size:12.5px;font-weight:600;color:var(--ink);letter-spacing:.01em;display:flex;align-items:center;gap:8px;margin-bottom:9px}
  .group .gh::before{content:"";width:14px;height:2px;border-radius:2px;background:var(--accent,var(--ink-3));flex:none}
  .group ul{list-style:none;display:flex;flex-direction:column;gap:7px}
  .group li{position:relative;padding-left:18px;font-size:14px;line-height:1.62;color:var(--ink-2)}
  .group li::before{content:"";position:absolute;left:3px;top:.62em;width:5px;height:5px;border-radius:50%;background:var(--accent,var(--ink-3));opacity:.55}
  .group li.sub{padding-left:30px;color:var(--ink-3);font-size:13.5px}
  .group li.sub::before{display:none}
  mark{background:#fff2a8;color:inherit;padding:0 2px;border-radius:3px}

  /* ===== 요약본 행 ===== */
  .brief{display:grid;gap:8px}
  .brow{background:var(--card);border:1px solid var(--line);border-radius:11px;box-shadow:var(--shadow);display:flex;align-items:center;gap:13px;padding:11px 14px;transition:border-color .15s}
  .brow.done{border-color:#cfe9df;background:#fbfdfc}
  .brow .chip-s{flex:none;width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--mono);font-weight:600;font-size:13px}
  .brow .chip-s.na{background:repeating-linear-gradient(45deg,#cdd2db,#cdd2db 5px,#d8dce3 5px,#d8dce3 10px);color:#6b7280;font-size:10px}
  .brow .bmain{flex:1 1 auto;min-width:0}
  .brow .bt{font-size:14px;font-weight:600;letter-spacing:-.01em;line-height:1.35}
  .brow .bt .bn{font-family:var(--mono);font-size:11px;color:var(--ink-3);font-weight:500;margin-right:6px}
  .brow .bs{font-size:12.7px;color:var(--ink-2);line-height:1.5;margin-top:3px}
  .brow .bacts{flex:none;display:flex;gap:2px}
  .brief-tip{font-size:12px;color:var(--ink-3);margin:0 2px 12px;display:flex;align-items:center;gap:7px}
  .brief-tip svg{flex:none;color:var(--gold)}

  /* 인쇄 */
  @media print{
    .top,.controls,.legend,footer,.toast,.bacts,.brief-tip{display:none!important}
    body{background:#fff;background-image:none}
    .spectrum{height:3px}
    .brow,.card{box-shadow:none;break-inside:avoid}
    .brief{gap:5px}
    main{padding-top:8px}
  }

  /* 빈 상태 */
  .empty{text-align:center;padding:70px 20px;color:var(--ink-3)}
  .empty .big{font-size:40px;margin-bottom:10px}
  .empty h4{font-size:16px;color:var(--ink-2);font-weight:600;margin-bottom:6px}

  /* 푸터 */
  footer{max-width:1080px;margin:0 auto;padding:30px 20px 50px;border-top:1px solid var(--line);font-size:12px;color:var(--ink-3);line-height:1.7}
  footer b{color:var(--ink-2);font-weight:600}
  .reset-link{background:none;border:none;color:var(--r50);font-family:var(--font);font-size:12px;cursor:pointer;padding:0;text-decoration:underline;text-underline-offset:2px}

  /* 토스트 */
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:10px 18px;border-radius:10px;font-size:13.5px;box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:60}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media (max-width:680px){
    :root{--fs-base:15px}
    .top-inner{padding:12px 16px}
    .brand h1{font-size:17px;white-space:normal}
    .progress-wrap{margin-left:0;order:3;width:100%;min-width:0}
    .search{order:4;max-width:none;flex-basis:100%}
    .controls{padding:14px 16px 0}
    .seg{margin-left:0;width:100%}
    .seg-group{flex:1}
    .seg-btn{flex:1;text-align:center;padding:8px 6px}
    .legend{padding:0 16px}
    main{padding:16px 16px 70px}
    .part-head .nm{font-size:21px}
    .chip-rate{width:46px;height:46px}
    .chip-rate .v{font-size:15px}
    .ctitle h3{font-size:15px}
    .ctitle .bar{max-width:none}
    .cacts{flex-direction:row}
    .chead{gap:10px;padding:12px 12px}
    .cbody-pad{padding:4px 14px 18px}
  }
</style>
</head>
<body>
  <div class="spectrum" aria-hidden="true"></div>
  <header class="top">
    <div class="top-inner">
      <div class="brand">
        <span class="kicker">웹디자인기능사 · 필기 요점정리</span>
        <h1>색으로 외우는 <em>학습실</em></h1>
      </div>
      <div class="progress-wrap" title="전체 학습 진도">
        <div class="ring">
          <svg width="46" height="46" viewBox="0 0 46 46">
            <circle cx="23" cy="23" r="19" fill="none" stroke="#e2e5ec" stroke-width="5"/>
            <circle id="ringFg" cx="23" cy="23" r="19" fill="none" stroke="#16a085" stroke-width="5" stroke-linecap="round" stroke-dasharray="119.4" stroke-dashoffset="119.4"/>
          </svg>
          <span class="pct" id="ringPct">0%</span>
        </div>
        <div class="progress-meta">
          <b id="doneCount">0</b> / <span id="totalCount">0</span> 완료<br>
          <span id="favLine">즐겨찾기 0개</span>
        </div>
      </div>
      <div class="search">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="search" type="search" placeholder="키워드 검색 (예: 먼셀, JPEG, 보색대비)" autocomplete="off" aria-label="키워드 검색">
        <button class="clear" id="clearSearch" aria-label="검색 지우기">&times;</button>
      </div>
    </div>
  </header>

  <div class="controls">
    <div class="tabs" id="tabs" role="tablist"></div>
    <div class="seg">
      <div class="seg-group" id="viewGroup" role="group" aria-label="보기 방식">
        <button class="seg-btn on" data-view="card">카드</button>
        <button class="seg-btn" data-view="brief">요약본</button>
      </div>
      <div class="seg-group" id="sortGroup" role="group" aria-label="정렬">
        <button class="seg-btn on" data-sort="num">번호순</button>
        <button class="seg-btn" data-sort="rate">출제율순</button>
      </div>
      <div class="seg-group" id="filterGroup" role="group" aria-label="필터">
        <button class="seg-btn on" data-filter="all">전체</button>
        <button class="seg-btn" data-filter="todo">미완료</button>
        <button class="seg-btn" data-filter="fav">즐겨찾기</button>
      </div>
    </div>
  </div>

  <div class="legend" aria-label="출제율 색 범례">
    <span class="lg"><span class="chip" style="background:var(--r95)"></span>90%+ 필수</span>
    <span class="lg"><span class="chip" style="background:var(--r80)"></span>80~89 핵심</span>
    <span class="lg"><span class="chip" style="background:var(--r70)"></span>70~79 중요</span>
    <span class="lg"><span class="chip" style="background:var(--r60)"></span>60~69 보통</span>
    <span class="lg"><span class="chip" style="background:var(--r50)"></span>~59 참고</span>
  </div>

  <main id="main"></main>

  <footer>
    <p>출제율(%)은 기출 빈도 기준의 학습 중요도 표시예요. 숫자가 높을수록 시험에 자주 나옵니다.
    완료 체크와 즐겨찾기는 <b>이 브라우저에 자동 저장</b>됩니다.</p>
    <p style="margin-top:8px">자료 출처: 웹디자인기능사 자격증 전문사이트 yoondle.com 요점정리 ·
    학습 기록 초기화: <button class="reset-link" id="resetBtn">전체 진도 지우기</button></p>
  </footer>

  <div class="toast" id="toast"></div>

<script>
// 웹디자인기능사 필기 요점정리 데이터
// 구조: parts[].sections[] = { n, title, rate, groups:[{h, items:[]}] }
const STUDY_DATA = {
  parts: [
    {
      id: "p1",
      label: "Part 1",
      name: "디자인 개론",
      sections: [
        { n: 1, title: "근대 디자인의 역사", rate: 75, groups: [
          { h: "주요 사조와 인물", items: [
            "미술공예운동 → 윌리엄 모리스: 수공예 부흥운동, 기계에 의한 대량생산 부정. 독일공작·바우하우스·아르누보에 영향",
            "아르누보 → 헨리 반 데 벨데: 식물 모티브 곡선미, 추상형식, 화려한 색채",
            "├ 유겐트스틸: 독일식 아르누보",
            "└ 세세션(분리파): 오토 와그너·조셉 호프만, 클래식한 직선미·기하학적 개성",
            "기능주의 → 루이스 설리반: 아름다움보다 기능의 편리함·만족을 우선",
            "독일공작연맹(DWB) → 헤르만 무테지우스: 양질화·규격화·객관적·합리적 미술 주장, 바우하우스 설립에 큰 영향",
            "큐비즘(입체주의) → 마티스·브라크·피카소: 기하학 형태로 환원, 이차원적 면의 분할로 재구성",
            "구성주의: 급진적 성격, 러시아(소련)에서 일어남",
            "데 스틸(신조형주의): 일체화·기하학적 형태, 삼원색과 흑·백·회색만 사용",
            "퓨리즘(순수주의): 입체주의 계승, 불필요한 장식 배격, 간결·정확한 조형미(실생활 도구)",
            "바우하우스: 윌터 그로피우스가 설립한 종합조형학교, 기능적·합목적적 새로운 미 추구",
            "아르데코(반 아르누보): '장식미술' 의미, 기능적·고전적 직선미, 낙관적·향락적 분위기",
          ]},
        ]},
        { n: 2, title: "현대 디자인의 역사", rate: 80, groups: [

    11:"렌더링: 투영→클리핑→은면→쉐이딩(플랫·고라우드·퐁)→매핑",

</script>
<script>
(function(){
  "use strict";
  var LS_DONE="wdc_done_v1", LS_FAV="wdc_fav_v1";
  var done=load(LS_DONE), fav=load(LS_FAV);
  var state={part:"p1",sort:"num",filter:"all",q:"",view:"card"};

  function load(k){try{return JSON.parse(localStorage.getItem(k))||{}}catch(e){return {}}}
  function save(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}
  function key(p,n){return p+"-"+n}

  function rateClass(r){
    if(r==null) return "na";
    if(r>=90) return "r95"; if(r>=80) return "r80"; if(r>=70) return "r70"; if(r>=60) return "r60"; return "r50";
  }
  function rateColor(r){return "var(--"+rateClass(r)+")"}

  /* ---- 탭 ---- */
  var tabsEl=document.getElementById("tabs");
  STUDY_DATA.parts.forEach(function(p,i){
    var b=document.createElement("button");
    b.className="tab"+(i===0?" active":"");
    b.dataset.p=p.id; b.setAttribute("role","tab");
    b.innerHTML='<span class="dot"></span>'+p.label+' · '+p.name+' <span class="mini">'+p.sections.length+'</span>';
    b.addEventListener("click",function(){
      state.part=p.id; state.q=""; document.getElementById("search").value="";
      document.getElementById("clearSearch").style.display="none";
      [].forEach.call(tabsEl.children,function(t){t.classList.toggle("active",t.dataset.p===p.id)});
      render(); window.scrollTo({top:0});
    });
    tabsEl.appendChild(b);
  });

  /* ---- 정렬/필터 ---- */
  document.getElementById("viewGroup").addEventListener("click",function(e){
    var b=e.target.closest("[data-view]"); if(!b) return;
    state.view=b.dataset.view;
    [].forEach.call(this.children,function(x){x.classList.toggle("on",x===b)}); render();
  });
  document.getElementById("sortGroup").addEventListener("click",function(e){
    var b=e.target.closest("[data-sort]"); if(!b) return;
    state.sort=b.dataset.sort;
    [].forEach.call(this.children,function(x){x.classList.toggle("on",x===b)}); render();
  });
  document.getElementById("filterGroup").addEventListener("click",function(e){
    var b=e.target.closest("[data-filter]"); if(!b) return;
    state.filter=b.dataset.filter;
    [].forEach.call(this.children,function(x){x.classList.toggle("on",x===b)}); render();
  });

  /* ---- 검색 ---- */
  var searchEl=document.getElementById("search"), clearEl=document.getElementById("clearSearch");
  var t;
  searchEl.addEventListener("input",function(){
    clearEl.style.display=this.value?"block":"none";
    clearTimeout(t); var v=this.value; t=setTimeout(function(){state.q=v.trim().toLowerCase();render()},120);
  });
  clearEl.addEventListener("click",function(){searchEl.value="";state.q="";this.style.display="none";render();searchEl.focus()});

  function hl(text,q){
    if(!q) return esc(text);
    var lo=text.toLowerCase(), out="", i=0, idx;
    while((idx=lo.indexOf(q,i))!==-1){
      out+=esc(text.slice(i,idx))+"<mark>"+esc(text.slice(idx,idx+q.length))+"</mark>";
      i=idx+q.length;
    }
    return out+esc(text.slice(i));
  }
  function esc(s){return s.replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]})}

  /* ---- 렌더 ---- */
  var main=document.getElementById("main");
  function render(){
    var searching=!!state.q;
    var partsToShow = searching ? STUDY_DATA.parts : STUDY_DATA.parts.filter(function(p){return p.id===state.part});
    main.innerHTML="";
    var anyShown=0;

    partsToShow.forEach(function(p){
      var secs=p.sections.slice();

      // 검색 매칭
      if(searching){
        secs=secs.filter(function(s){return matches(s,state.q)});
      }
      // 필터
      if(state.filter==="todo") secs=secs.filter(function(s){return !done[key(p.id,s.n)]});
      if(state.filter==="fav") secs=secs.filter(function(s){return fav[key(p.id,s.n)]});
      // 정렬
      if(state.sort==="rate") secs.sort(function(a,b){return (b.rate||0)-(a.rate||0)});
      else secs.sort(function(a,b){return a.n-b.n});

      if(!secs.length) return;
      anyShown+=secs.length;

      var head=document.createElement("div"); head.className="part-head";
      head.innerHTML='<span class="lbl" style="color:'+( p.id==="p1"?"var(--r95)":p.id==="p2"?"var(--r50)":"var(--r60)")+'">'+p.label+'</span>'+
        '<span class="nm">'+p.name+'</span>'+
        '<span class="cnt">'+secs.length+(searching?' 건 검색됨':' 단원')+'</span>';
      main.appendChild(head);

      if(state.view==="brief"){
        var wrap=document.createElement("div"); wrap.className="brief";
        secs.forEach(function(s){ wrap.appendChild(buildBriefRow(p,s,searching)) });
        main.appendChild(wrap);
      }else{
        var grid=document.createElement("div"); grid.className="grid";
        secs.forEach(function(s){ grid.appendChild(buildCard(p,s,searching)) });
        main.appendChild(grid);
      }
    });

    if(anyShown && state.view==="brief"){
      var tip=document.createElement("div"); tip.className="brief-tip";
      tip.innerHTML='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18h6M10 22h4M12 2a7 7 0 0 0-4 12.7c.6.5 1 1.3 1 2.1h6c0-.8.4-1.6 1-2.1A7 7 0 0 0 12 2z"/></svg>'+
        '핵심만 압축한 요약본이에요. 행을 눌러 ✓·☆ 표시하거나, 키보드 Ctrl/⌘+P 로 인쇄·PDF 저장할 수 있어요.';
      main.insertBefore(tip,main.firstChild);
    }

    if(!anyShown){
      main.innerHTML='<div class="empty"><div class="big">'+(searching?"🔍":state.filter==="fav"?"☆":"✓")+'</div>'+
        '<h4>'+(searching?'"'+esc(state.q)+'" 검색 결과가 없어요':state.filter==="fav"?'즐겨찾기한 단원이 없어요':'모든 단원을 완료했어요!')+'</h4>'+
        '<p>'+(searching?'다른 키워드로 검색해 보세요.':state.filter==="fav"?'카드의 ☆ 버튼으로 어려운 단원을 표시해 두세요.':'전체 보기로 복습할 수 있어요.')+'</p></div>';
    }
    updateProgress();
  }

  function matches(s,q){
    if(s.title.toLowerCase().indexOf(q)!==-1) return true;
    return s.groups.some(function(g){
      if(g.h.toLowerCase().indexOf(q)!==-1) return true;
      return g.items.some(function(it){return it.toLowerCase().indexOf(q)!==-1});
    });
  }

  function buildCard(p,s,searching){
    var k=key(p.id,s.n), isDone=!!done[k], isFav=!!fav[k];
    var card=document.createElement("div");
    card.className="card"+(isDone?" done":"")+(searching?" open":"");
    var rc=rateClass(s.rate), col=rateColor(s.rate);

    var head=document.createElement("div"); head.className="chead";
    head.innerHTML=
      '<div class="done-flag" aria-hidden="true"></div>'+
      '<div class="chip-rate '+rc+'" style="'+(rc!=="na"?"background:"+col:"")+'">'+
        (s.rate!=null?'<span class="v">'+s.rate+'</span><span class="u">출제%</span>':'<span class="v">참고</span>')+
      '</div>'+
      '<div class="ctitle">'+
        '<span class="num">단원 '+s.n+'</span><br>'+
        '<h3>'+hl(s.title,searching?state.q:"")+'</h3>'+
        (s.rate!=null?'<div class="bar"><i style="width:'+s.rate+'%;background:'+col+'"></i></div>':'')+
      '</div>'+
      '<div class="cacts">'+
        '<button class="iconbtn fav'+(isFav?" on":"")+'" title="즐겨찾기" aria-label="즐겨찾기">'+
          '<svg width="18" height="18" viewBox="0 0 24 24" fill="'+(isFav?"currentColor":"none")+'" stroke="currentColor" stroke-width="2"><path d="M12 17.3 6.2 20.7l1.5-6.6L2.5 9.6l6.7-.6L12 2.9l2.8 6.1 6.7.6-5.2 4.5 1.5 6.6z"/></svg>'+
        '</button>'+
        '<button class="iconbtn chk'+(isDone?" on":"")+'" title="완료 체크" aria-label="완료 체크">'+
          '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="9"/><path d="m8.5 12 2.5 2.5 4.5-5"/></svg>'+
        '</button>'+
        '<span class="iconbtn caret" aria-hidden="true"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg></span>'+
      '</div>';
    card.appendChild(head);

    var body=document.createElement("div"); body.className="cbody";
    var inner='<div class="cbody-in"><div class="cbody-pad" style="--accent:'+col+'">';
    s.groups.forEach(function(g){
      inner+='<div class="group"><div class="gh">'+hl(g.h,searching?state.q:"")+'</div><ul>';
      g.items.forEach(function(it){
        var sub = it.charAt(0)==="├" || it.charAt(0)==="└";
        inner+='<li'+(sub?' class="sub"':'')+'>'+hl(it,searching?state.q:"")+'</li>';
      });
      inner+='</ul></div>';
    });
    inner+='</div></div>';
    body.innerHTML=inner;
    card.appendChild(body);

    // 펼치기/접기
    head.addEventListener("click",function(e){
      if(e.target.closest(".iconbtn.fav")||e.target.closest(".iconbtn.chk")) return;
      card.classList.toggle("open");
    });
    // 즐겨찾기
    head.querySelector(".fav").addEventListener("click",function(e){
      e.stopPropagation();
      if(fav[k]){delete fav[k];this.classList.remove("on");this.querySelector("svg").setAttribute("fill","none");toast("즐겨찾기 해제")}
      else{fav[k]=1;this.classList.add("on");this.querySelector("svg").setAttribute("fill","currentColor");toast("즐겨찾기 추가 ☆")}
      save(LS_FAV,fav); updateProgress();
      if(state.filter==="fav") render();
    });
    // 완료
    head.querySelector(".chk").addEventListener("click",function(e){
      e.stopPropagation();
      if(done[k]){delete done[k];this.classList.remove("on");card.classList.remove("done");toast("완료 해제")}
      else{done[k]=1;this.classList.add("on");card.classList.add("done");toast("완료! ✓")}
      save(LS_DONE,done); updateProgress();
      if(state.filter==="todo") render();
    });
    return card;
  }

  function buildBriefRow(p,s,searching){
    var k=key(p.id,s.n), isDone=!!done[k], isFav=!!fav[k];
    var rc=rateClass(s.rate), col=rateColor(s.rate);
    var sum=(SUMMARY[p.id]&&SUMMARY[p.id][s.n])||"";
    var q=searching?state.q:"";
    var row=document.createElement("div");
    row.className="brow"+(isDone?" done":"");
    row.innerHTML=
      '<div class="chip-s '+rc+'" style="'+(rc!=="na"?"background:"+col:"")+'">'+(s.rate!=null?s.rate:"참고")+'</div>'+
      '<div class="bmain">'+
        '<div class="bt"><span class="bn">'+s.n+'</span>'+hl(s.title,q)+'</div>'+
        (sum?'<div class="bs">'+hl(sum,q)+'</div>':'')+
      '</div>'+
      '<div class="bacts">'+
        '<button class="iconbtn fav'+(isFav?" on":"")+'" title="즐겨찾기" aria-label="즐겨찾기">'+
          '<svg width="17" height="17" viewBox="0 0 24 24" fill="'+(isFav?"currentColor":"none")+'" stroke="currentColor" stroke-width="2"><path d="M12 17.3 6.2 20.7l1.5-6.6L2.5 9.6l6.7-.6L12 2.9l2.8 6.1 6.7.6-5.2 4.5 1.5 6.6z"/></svg>'+
        '</button>'+
        '<button class="iconbtn chk'+(isDone?" on":"")+'" title="완료 체크" aria-label="완료 체크">'+
          '<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="9"/><path d="m8.5 12 2.5 2.5 4.5-5"/></svg>'+
        '</button>'+
      '</div>';
    row.querySelector(".fav").addEventListener("click",function(){
      if(fav[k]){delete fav[k];toast("즐겨찾기 해제")}else{fav[k]=1;toast("즐겨찾기 추가 ☆")}
      save(LS_FAV,fav); updateProgress(); render();
    });
    row.querySelector(".chk").addEventListener("click",function(){
      if(done[k]){delete done[k];toast("완료 해제")}else{done[k]=1;toast("완료! ✓")}
      save(LS_DONE,done); updateProgress(); render();
    });
    return row;
  }

  /* ---- 진도 ---- */
  var total=STUDY_DATA.parts.reduce(function(a,p){return a+p.sections.length},0);
  document.getElementById("totalCount").textContent=total;
  function updateProgress(){
    var d=Object.keys(done).length, f=Object.keys(fav).length;
    var pct=total?Math.round(d/total*100):0;
    document.getElementById("doneCount").textContent=d;
    document.getElementById("ringPct").textContent=pct+"%";
    document.getElementById("favLine").textContent="즐겨찾기 "+f+"개";
    var c=2*Math.PI*19;
    document.getElementById("ringFg").style.strokeDashoffset=c*(1-pct/100);
  }

  /* ---- 토스트 ---- */
  var toastEl=document.getElementById("toast"), tt;
  function toast(msg){toastEl.textContent=msg;toastEl.classList.add("show");clearTimeout(tt);tt=setTimeout(function(){toastEl.classList.remove("show")},1400)}

  /* ---- 초기화 ---- */
  document.getElementById("resetBtn").addEventListener("click",function(){
    if(confirm("완료 체크와 즐겨찾기를 모두 지울까요?")){
      done={};fav={};save(LS_DONE,done);save(LS_FAV,fav);render();toast("학습 기록을 초기화했어요")
    }
  });

  render();
})();
</script>
</body>
</html>

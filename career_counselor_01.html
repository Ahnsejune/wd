훈련\n③ 말기 - 은퇴 전 프로그램, 변형 근무제","frequency":1,"recent":false,"expected":false,"importance":0,"category":"직무분석·경력개발","searchText":"경력개발 프로그램의 초기, 중기, 말기 단계별로 예시를 1가지씩 쓰시오. ① 초기 - 경력워트숍, 인턴십, 후견인 프로그램, 종업원 오리엔테이션\n② 중기 - 경력상담, 직무순환제도, 전문분야 교육 훈련\n③ 말기 - 은퇴 전 프로그램, 변형 근무제 직무분석·경력개발 2024년 1회"},{"id":"old-190","sourceGroup":"2019~2024","source":"2024년 1회","year":2024,"number":184,"question":"심리검사 시 검사자가 준수해야 하는 윤리강령 3가지를 쓰시오.","answer":"검사가 시대에 뒤떨어 질 수 있음을 인정한다. / 신뢰도와 타당도가 높은 검사를 선택한다. / 검사의 채점과 해석에 적절한 근거를 갖춘다.","frequency":1,"recent":false,"expected":false,"importance":0,"category":"심리검사·통계","searchText":"심리검사 시 검사자가 준수해야 하는 윤리강령 3가지를 쓰시오. 검사가 시대에 뒤떨어 질 수 있음을 인정한다. / 신뢰도와 타당도가 높은 검사를 선택한다. / 검사의 채점과 해석에 적절한 근거를 갖춘다. 심리검사·통계 2024년 1회"},{"id":"old-191","sourceGroup":"2019~2024","source":"2023년 3회","year":2023,"number":185,"question":"한국직업사전의 부가 직업정보 중 직무기능은 자료, 사람, 사물과 연관된 특성을 나타낸다. 그중 사물의 세부사항에 대한 오른쪽\n설명을 보고 빈칸에 해당하는 기능을 쓰시오.","answer":"기능\n설명\n기계의 성능, 재료의 특성, 작업장의 관례 등에 대한 지식을 적용하여 연속적인 기계가공작업을 수행하기 위한 기계 및\n설치\n설비의 준비, 공구 및 기타 기계장비의 설치 및 조정, 가공물 또는 재료의 위치조정, 제어장치 설정, 기계의 기능 및\n완제품의 정밀도 측정 등을 수행한다.\n설정된 표준치를 달성하기 위하여 궁극적인 책임이 존재하는 상황 하에서 신체부위, 공구, 작업도구를 사용하여 가공\nⓐ 정밀작업\n물 또는 재료를 가공, 조종, 이동, 안내하거나 또는 정위치시킨다. 그리고 도구, 가공물 또는 원료를 산정하고 작업에\n알맞게 공구를 조정한다.\nⓑ 제어조작\n기계 또는 설비를 시동, 정지, 제어하고 작업이 진행되고 있는 기계나 설비를 조정한다.\nⓒ 조작운전\n다양한 목적을 수행하고자 사물 또는 사람의 움직임을 통제하는데 있어 일정한 경로를 따라 조작되고 안내되어야 하는\n기계 또는 설비를 시동, 정지하고 그 움직임을 제어한다.\n기계, 설비 또는 재료를 가공, 조정, 이동 또는 위치할 수 있도록 신체부위, 공구 또는 특수장치를 사용한다. 정확도\nⓓ 수동조작\n달성 및 적합한 공구, 기계, 설비 또는 원료를 산정하는데 있어서 어느 정도의 판단력이 요구된다.\n기계 및 장비를 시동, 정지하고 그 기능을 관찰한다. 체인징가이드, 조정타이머, 온도게이지 등의 계기의 제어장치를\nⓔ 유지\n조정하거나 원료가 원활히 흐르도록 밸브를 돌려주고 빛의 반응에 따라 스위치를 돌린다. 이러한 조정업무에 판단력은\n요구되지 않는다.\n자동적으로 또는 타작업원에 의하여 가동, 유지되는 기계나 장비안에 자재를 삽입, 투척, 하역하거나 그 안에 있는\n투입-인출\n자재를 다른 장소로 옮긴다\n신체부위, 수공구, 또는 특수장치를 사용하여 기계, 장비, 물건 또는 원료 등을 정리, 운반 처리한다. 정확도 달성 및\n단순작업\n적합한 공구, 장비, 원료를 선정하는데 판단력은 요구되지 않는다.","frequency":1,"recent":false,"expected":false,"importance":0,"category":"직업정보·분류","searchText":"한국직업사전의 부가 직업정보 중 직무기능은 자료, 사람, 사물과 연관된 특성을 나타낸다. 그중 사물의 세부사항에 대한 오른쪽\n설명을 보고 빈칸에 해당하는 기능을 쓰시오. 기능\n설명\n기계의 성능, 재료의 특성, 작업장의 관례 등에 대한 지식을 적용하여 연속적인 기계가공작업을 수행하기 위한 기계 및\n설치\n설비의 준비, 공구 및 기타 기계장비의 설치 및 조정, 가공물 또는 재료의 위치조정, 제어장치 설정, 기계의 기능 및\n완제품의 정밀도 측정 등을 수행한다.\n설정된 표준치를 달성하기 위하여 궁극적인 책임이 존재하는 상황 하에서 신체부위, 공구, 작업도구를 사용하여 가공\nⓐ 정밀작업\n물 또는 재료를 가공, 조종, 이동, 안내하거나 또는 정위치시킨다. 그리고 도구, 가공물 또는 원료를 산정하고 작업에\n알맞게 공구를 조정한다.\nⓑ 제어조작\n기계 또는 설비를 시동, 정지, 제어하고 작업이 진행되고 있는 기계나 설비를 조정한다.\nⓒ 조작운전\n다양한 목적을 수행하고자 사물 또는 사람의 움직임을 통제하는데 있어 일정한 경로를 따라 조작되고 안내되어야 하는\n기계 또는 설비를 시동, 정지하고 그 움직임을 제어한다.\n기계, 설비 또는 재료를 가공, 조정, 이동 또는 위치할 수 있도록 신체부위, 공구 또는 특수장치를 사용한다. 정확도\nⓓ 수동조작\n달성 및 적합한 공구, 기계, 설비 또는 원료를 산정하는데 있어서 어느 정도의 판단력이 요구된다.\n기계 및 장비를 시동, 정지하고 그 기능을 관찰한다. 체인징가이드, 조정타이머, 온도게이지 등의 계기의 제어장치를\nⓔ 유지\n조정하거나 원료가 원활히 흐르도록 밸브를 돌려주고 빛의 반응에 따라 스위치를 돌린다. 이러한 조정업무에 판단력은\n요구되지 않는다.\n자동적으로 또는 타작업원에 의하여 가동, 유지되는 기계나 장비안에 자재를 삽입, 투척, 하역하거나 그 안에 있는\n투입-인출\n자재를 다른 장소로 옮긴다\n신체부위, 수공구, 또는 특수장치를 사용하여 기계, 장비, 물건 또는 원료 등을 정리, 운반 처리한다. 정확도 달성 및\n단순작업\n적합한 공구, 장비, 원료를 선정하는데 판단력은 요구되지 않는다. 직업정보·분류 2023년 3회"},{"id":"old-192","sourceGroup":"2019~2024","source":"2023년 3회","year":2023,"number":186,"question":"다음은 비정규직 근로자에 대한 설명이다. ( ) 안에 알맞은 내용을 쓰시오.","answer":"(1) ( ⓐ 한시적 근로자 )는 근로계약기간을 정한 자 또는 정하지 않았으나 비자발적 사유로 계속 근무를 기대할 수 없는 자이다.\n(2) ( ⓑ 기간제 근로자 )는 기간의 정함이 있는 근로계약을 체결하여 고용의 지속성을 기대할 수 없는 자이다.\n(3) 시간제근로자는 근로시간이 짧은 비상근 파트타임 근로자이다.\n(4) ( ⓒ 비전형 근로자 )는 파견근로자, 용역근로자, 특수고용근로자, 가정 내 근로자(재택, 가내), 일일(호출) 근로자 등이 있다.","frequency":1,"recent":false,"expected":false,"importance":0,"category":"노동시장·고용","searchText":"다음은 비정규직 근로자에 대한 설명이다. ( ) 안에 알맞은 내용을 쓰시오. (1) ( ⓐ 한시적 근로자 )는 근로계약기간을 정한 자 또는 정하지 않았으나 비자발적 사유로 계속 근무를 기대할 수 없는 자이다.\n(2) ( ⓑ 기간제 근로자 )는 기간의 정함이 있는 근로계약을 체결하여 고용의 지속성을 기대할 수 없는 자이다.\n(3) 시간제근로자는 근로시간이 짧은 비상근 파트타임 근로자이다.\n(4) ( ⓒ 비전형 근로자 )는 파견근로자, 용역근로자, 특수고용근로자, 가정 내 근로자(재택, 가내), 일일(호출) 근로자 등이 있다. 노동시장·고용 2023년 3회"},{"id":"2025-1","sourceGroup":"2025","source":"2025년 1~3회 실기 정리","year":2025,"number":1,"question":"임금이 상승하면 노동 공급곡선은 우상향한다. 이것이 참인지, 거짓인지, 불확실한지 판정하고 여가와 소득의 선택 모형에 의거하여 그 이유를 설명하시오.","answer":"- 불확실하다\n- 임금이 낮은 경우 대체효과가 소득효과보다 커서 입금이 오르면 노동 공급을 늘려 노동 공급곡선이\n우상향한다. 반면 임금이 높은 경우 소득효과가 대체효과보다 커지고, 일을 해서 소득을 얻는 것보다 쉬는 것을 선호하여 노동 시간을 줄이게 된다. 이에 따라 입금이 상승함에도 노동공급이 감소하는 후방굴절형 노동공급곡선이 나타날 수 있다.","frequency":1,"recent":true,"expected":false,"importance":0,"category":"노동시장·고용","searchText":"임금이 상승하면 노동 공급곡선은 우상향한다. 이것이 참인지, 거짓인지, 불확실한지 판정하고 여가와 소득의 선택 모형에 의거하여 그 이유를 설명하시오. - 불확실하다\n- 임금이 낮은 경우 대체효과가 소득효과보다 커서 입금이 오르면 노동 공급을 늘려 노동 공급곡선이\n우상향한다. 반면 임금이 높은 경우 소득효과가 대체효과보다 커지고, 일을 해서 소득을 얻는 것보다 쉬는 것을 선호하여 노동 시간을 줄이게 된다. 이에 따라 입금이 상승함에도 노동공급이 감소하는 후방굴절형 노동공급곡선이 나타날 수 있다. 노동시장·고용 2025년 1~3회 실기 정리"},{"id":"2025-2","sourceGroup":"2025","source":"2025년 1~3회 실기 정리","year":2025,"number":2,"question":"톨버트의 집단직업상담의 핵심요소 6가지를 쓰시오. (신출문제★)","answer":"① 목표 - 기대수준과 일치하는 현실적인 자아개념을 확립해야 한다.\n\n② 과정 - 자기 탐색, 상호작용, 개인적 정보 검토, 직업적 교육적 정보 검토, 합리적인 의사결정의\n\n5가지 과정으로 이루어진다.\n\n③ 비밀유지 - 집단 내의 토의 내용을 외부로 발설하면 안 된다.\n\n④ 집단구성 - 구성원 간 피드백을 촉진하고 구성원들이 이질적이도록 6~10명으로 구성한다.\n\n⑤ 리더 - 집단 상담 과정과 직업 정보를 잘 아는 사람이 리더를 맡아 대화를 이끈다.\n\n⑥ 일정 - 모임 횟수는 가능한 최소화한다.","frequency":1,"recent":true,"expected":false,"importance":1,"category":"상담실무·기법","searchText":"톨버트의 집단직업상담의 핵심요소 6가지를 쓰시오. (신출문제★) ① 목표 - 기대수준과 일치하는 현실적인 자아개념을 확립해야 한다.\n\n② 과정 - 자기 탐색, 상호작용, 개인적 정보 검토, 직업적 교육적 정보 검토, 합리적인 의사결정의\n\n5가지 과정으로 이루어진다.\n\n③ 비밀유지 - 집단 내의 토의 내용을 외부로 발설하면 안 된다.\n\n④ 집단구성 - 구성원 간 피드백을 촉진하고 구성원들이 이질적이도록 6~10명으로 구성한다.\n\n⑤ 리더 - 집단 상담 과정과 직업 정보를 잘 아는 사람이 리더를 맡아 대화를 이끈다.\n\n⑥ 일정 - 모임 횟수는 가능한 최소화한다. 상담실무·기법 2025년 1~3회 실기 정리"},{"id":"2025-3","sourceGroup":"2025","source":"2025년 1~3회 실기 정리","year":2025,"number":3,"question":"집단 직업 상담 과정에서 나타나는 5가지 활동 유형","answer":"①자기탐색 ②상호작용 ③개인적 정보의 검토 및 목표와의 연결\n④직업적&교육적 정보의 획득 및 검토 ⑤합리적인 의사결정\n= (자상한 개업 의사 톨버트)","frequency":1,"recent":true,"expected":false,"importance":0,"category":"상담실무·기법","searchText":"집단 직업 상담 과정에서 나타나는 5가지 활동 유형 ①자기탐색 ②상호작용 ③개인적 정보의 검토 및 목표와의 연결\n④직업적&교육적 정보의 획득 및 검토 ⑤합리적인 의사결정\n= (자상한 개업 의사 톨버트) 상담실무·기법 2025년 1~3회 실기 정리"},{"id":"2025-4","sourceGroup":"2025","source":"2025년 1~3회 실기 정리","year":2025,"number":4,"question":"실직하고 나서 “나는 무능하다.”라는 부정적인 자동적 사고가 떠올라 우울감에 빠진 내담자에게 벡의 인지행동적 상담을 한다고 하자. 이 내담자의 부정적 사고를 반박하고 긍정적인 대안적 사고를 찾게 하기 위해 사용할 수 있는 방법 3가지를 설명하시오.","answer":"- 언어적 기법 : 비합리적 신념을 논박하여 내담자의 언어를 변화시키는 방법\n- 정서적 기법 : 내담자가 합리적 정서를 상상하도록 하는 방법\n- 행동적 기법 : 내담자에게 목표 행동을 부여하고 실행하도록 하여 신념 체계를 변화시키는 방법\n위는 각 기법의 설명이고, 문제에서 제시한 상황에 맞추어 적어야함\n예) 언어적 기법 : 내담자에게 ‘나는 무능하다’는 사고는 근거 없는 비합리적 신념임을 주지시키고 보다 긍정적 표현을 할 수 있도록 언어 습관을 변화시킨다.\n행동적 기법 : 내담자에게 작은 목표를 설정하고 행동과제를 수행하도록 하여 성공경험을 통해 자신감을 향상시킨다.\n정서적 기법 : 긍정적인 자기진술과 사고 재구성을 통해 부정적 감정을 완화하고 긍정적 정서를 형성하도록 한다.","frequency":1,"recent":true,"expected":false,"importance":0,"category":"상담이론","searchText":"실직하고 나서 “나는 무능하다.”라는 부정적인 자동적 사고가 떠올라 우울감에 빠진 내담자에게 벡의 인지행동적 상담을 한다고 하자. 이 내담자의 부정적 사고를 반박하고 긍정적인 대안적 사고를 찾게 하기 위해 사용할 수 있는 방법 3가지를 설명하시오. - 언어적 기법 : 비합리적 신념을 논박하여 내담자의 언어를 변화시키는 방법\n- 정서적 기법 : 내담자가 합리적 정서를 상상하도록 하는 방법\n- 행동적 기법 : 내담자에게 목표 행동을 부여하고 실행하도록 하여 신념 체계를 변화시키는 방법\n위는 각 기법의 설명이고, 문제에서 제시한 상황에 맞추어 적어야함\n예) 언어적 기법 : 내담자에게 ‘나는 무능하다’는 사고는 근거 없는 비합리적 신념임을 주지시키고 보다 긍정적 표현을 할 수 있도록 언어 습관을 변화시킨다.\n행동적 기법 : 내담자에게 작은 목표를 설정하고 행동과제를 수행하도록 하여 성공경험을 통해 자신감을 향상시킨다.\n정서적 기법 : 긍정적인 자기진술과 사고 재구성을 통해 부정적 감정을 완화하고 긍정적 정서를 형성하도록 한다. 상담이론 2025년 1~3회 실기 정리"},{"id":"2025-5","sourceGroup":"2025","source":"2025년 1~3회 실기 정리","year":2025,"number":5,"question":"벡의 인지치료에서 인지적 오류의 유형 6가지를 쓰시오","answer":"①흑백논리 ②선택적 추상화 ③과도한 일반화 ④개인화 ⑤의미의 확대 및 축소\n⑥임의적 추론(자의적 해석)","frequency":1,"recent":true,"expected":false,"importance":0,"category":"상담이론","searchText":"벡의 인지치료에서 인지적 오류의 유형 6가지를 쓰시오 ①흑백논리 ②선택적 추상화 ③과도한 일반화 ④개인화 ⑤의미의 확대 및 축소\n⑥임의적 추론(자의적 해석) 상담이론 2025년 1~3회 실기 정리"},{"id":"2025-6","sourceGroup":"2025","source":"2025년 1~3회 실기 정리","year":2025,"number":6,"question":"로저스는 내담자 중심 상담을 성공적으로 이끄는 데 있어서 상담자의 능동적 성향을 강조하였다.\n\n내담자 중심 상담법을 사용할 때, 직업상담사가 갖추어야 할 3가지 기본 태도에 대해 설명하시오.","answer":"① 일치성(진실성) : 상담자는 내담자에게 자신의 생각을 솔직하게 표현하고 인정해야 한다.\n\n② 무조건적인 수용 : 내담자를 비판하지 말고 수용하며 존중해야 한다.\n\n③ 공감적 이해 : 상담자는 상담자로서의 위치를 유지하면서 내담자의 경험을 자신의 것처럼 이해해야 한다.","frequency":1,"recent":true,"expected":false,"importance":0,"category":"상담이론","searchText":"로저스는 내담자 중심 상담을 성공적으로 이끄는 데 있어서 상담자의 능동적 성향을 강조하였다.\n\n내담자 중심 상담법을 사용할 때, 직업상담사가 갖추어야 할 3가지 기본 태도에 대해 설명하시오. ① 일치성(진실성) : 상담자는 내담자에게 자신의 생각을 솔직하게 표현하고 인정해야 한다.\n\n② 무조건적인 수용 : 내담자를 비판하지 말고 수용하며 존중해야 한다.\n\n③ 공감적 이해 : 상담자는 상담자로서의 위치를 유지하면서 내담자의 경험을 자신의 것처럼 이해해야 한다. 상담이론 2025년 1~3회 실기 정리"},{"id":"2025-7","sourceGroup":"2025","source":"2025년 1~3회 실기 정리","year":2025,"number":7,"question":"내담자가 상담자에게 지나치게 의존하려는 전이가 일어났을 때, 그 의미와 해결방안을 설명하시오.","answer":"- 의미 : 내담자가 과거 중요한 인물에게 느꼈던 감정이나 생각을 현재의 상담자에게 투영하는 현상\n- 해결방안 : 내담자의 전이를 이해하되 내담자가 동요되지 않도록 객관적인 태도를 유지한다.\n훈습 등 기법을 활용하여 내담자를 분석하고 과거의 영향에서 벗어나 전이감정을 해소할 수 있도록 돕는다.\n내담자가 스스로 상황을 판단, 해석하여 자신을 통제할 수 있도록 한다.","frequency":1,"recent":true,"expected":false,"importance":0,"category":"상담실무·기법","searchText":"내담자가 상담자에게 지나치게 의존하려는 전이가 일어났을 때, 그 의미와 해결방안을 설명하시오. - 의미 : 내담자가 과거 중요한 인물에게 느꼈던 감정이나 생각을 현재의 상담자에게 투영하는 현상\n- 해결방안 : 내담자의 전이를 이해하되 내담자가 동요되지 않도록 객관적인 태도를 유지한다.\n훈습 등 기법을 활용하여 내담자를 분석하고 과거의 영향에서 벗어나 전이감정을 해소할 수 있도록 돕는다.\n내담자가 스스로 상황을 판단, 해석하여 자신을 통제할 수 있도록 한다. 상담실무·기법 2025년 1~3회 실기 정리"},{"id":"2025-8","sourceGroup":"2025","source":"2025년 1~3회 실기 정리","year":2025,"number":8,"question":"아들러의 개인주의 상담과정의 목표를 3가지 쓰시오. (★★★)","answer":"- 내담자가 열등감을 극복하도록 돕는다.\n- 내담자가 사회적 관심을 갖도록 한다.\n- 내담자가 사회 구성원으로써 기여하도록 돕는다.\n- 내담자가 잘못된 가치와 목표를 바로 잡도록 돕는다.","frequency":1,"recent":true,"expected":false,"importance":3,"category":"상담이론","searchText":"아들러의 개인주의 상담과정의 목표를 3가지 쓰시오. (★★★) - 내담자가 열등감을 극복하도록 돕는다.\n- 내담자가 사회적 관심을 갖도록 한다.\n- 내담자가 사회 구성원으로써 기여하도록 돕는다.\n- 내담자가 잘못된 가치와 목표를 바로 잡도록 돕는다. 상담이론 2025년 1~3회 실기 정리"},{"id":"2025-9","sourceGroup":"2025","source":"2025년 1~3회 실기 정리","year":2025,"number":9,"question":"브레이필드가 제시한 직업 정보의 기능 3가지를 쓰고 각각에 대해 설명하시오.","answer":"- 정보적 기능 : 직업 정보를 제공하여 내담자의 직업에 대한 지식을 늘리고 직업 선택에 대한 의사 결정을 돕는 기능\n- 재조정 기능 : 직업에 관한 정 ⑤ 부정적인 결과로 인해 실망하거나 충격을 받지 않도록 유의한다. 심리검사·통계 2025년 1~3회 실기 정리"},{"id":"2025-40","sourceGroup":"2025","source":"2025년 1~3회 실기 정리","year":2025,"number":40,"question":"스트롱 직업 흥미검사 척도 3가지 쓰고 설명하시오.","answer":"① 일반직업분류 (GOT: General Occupational Themes)\n\n: 홀랜드의 6가지 성격 유형을 측정하여 피검사자의 흥미에 대한 포괄적인 전망을 파악\n\n② 기본흥미척도 (BIS: Basic Interest Scales)\n\n: GOT의 하위 척도로, 특정 활동이나 주제에 대한 상세한 흥미를 측정. 25개의 세부 척도로 구성되어, 구체적으로 어떤 분야에 관심이 있는지 파악 가능\n\n③ 개인특성척도 (PSS: Personal Style Scales)\n\n: 일상생활과 직업 세계에서 개인이 선호하는 스타일을 측정.\n\n피검사자의 업무유형, 학습유형, 리더십 유형, 모험심 유형 등에 대한 개인 특성을 측정","frequency":1,"recent":true,"expected":false,"importance":0,"category":"직업정보·분류","searchText":"스트롱 직업 흥미검사 척도 3가지 쓰고 설명하시오. ① 일반직업분류 (got: general occupational themes)\n\n: 홀랜드의 6가지 성격 유형을 측정하여 피검사자의 흥미에 대한 포괄적인 전망을 파악\n\n② 기본흥미척도 (bis: basic interest scales)\n\n: got의 하위 척도로, 특정 활동이나 주제에 대한 상세한 흥미를 측정. 25개의 세부 척도로 구성되어, 구체적으로 어떤 분야에 관심이 있는지 파악 가능\n\n③ 개인특성척도 (pss: personal style scales)\n\n: 일상생활과 직업 세계에서 개인이 선호하는 스타일을 측정.\n\n피검사자의 업무유형, 학습유형, 리더십 유형, 모험심 유형 등에 대한 개인 특성을 측정 직업정보·분류 2025년 1~3회 실기 정리"},{"id":"2025-41","sourceGroup":"2025","source":"2025년 1~3회 실기 정리","year":2025,"number":41,"question":"노동수요의 탄력성을 구하는 공식을 쓰고, 노동수요의 탄력성에 영향을 주는 4가지 요인을 쓰시오.\n\n- 공식 : 노동수요 탄력성 = 노동수요 변화율 / 임금 변화율\n\n(노동수요 탄력성은 단위가 %가 아니어서 공식에 ‘x 100‘이 없고 음수가 나오지 않도록 절댓값 기호를 붙여야함!!!)\n\n- 요인","answer":"① 총 생산비에서 노동 비용이 차지하는 비중\n\n② 다른 생산요소의 노동에 대한 대체 가능성\n\n③ 노동 외 생산요소의 공급 탄력성\n\n④ 생산물에 대한 수요의 탄력성","frequency":1,"recent":true,"expected":false,"importance":0,"category":"노동시장·고용","searchText":"노동수요의 탄력성을 구하는 공식을 쓰고, 노동수요의 탄력성에 영향을 주는 4가지 요인을 쓰시오.\n\n- 공식 : 노동수요 탄력성 = 노동수요 변화율 / 임금 변화율\n\n(노동수요 탄력성은 단위가 %가 아니어서 공식에 ‘x 100‘이 없고 음수가 나오지 않도록 절댓값 기호를 붙여야함!!!)\n\n- 요인 ① 총 생산비에서 노동 비용이 차지하는 비중\n\n② 다른 생산요소의 노동에 대한 대체 가능성\n\n③ 노동 외 생산요소의 공급 탄력성\n\n④ 생산물에 대한 수요의 탄력성 노동시장·고용 2025년 1~3회 실기 정리"},{"id":"2025-42","sourceGroup":"2025","source":"2025년 1~3회 실기 정리","year":2025,"number":42,"question":"홀랜드 이론에서 개인과 개인 간의 관계, 환경과 환경 간의 관계, 개인과 환경 간의 관계를 설명하는 개념 3가지를 쓰고 설명하시오.","answer":"- 일관성 : 홀랜드의 6가지 흥미유형에서 어떤 상들을 다른 쌍보다 많은 공통점을 가지고 있다.\n- 변별성 : 특정 성격 유형은 다른 어떤 유형과는 유사하고, 어떤 유형과는 차별화 된다.\n- 정체성 : 개인에게 정체성은 목표, 흥미, 재능 등이고, 환경에서 정체성은 투명성, 안정성 등이다.","frequency":1,"recent":true,"expected":false,"importance":0,"category":"상담이론","searchText":"홀랜드 이론에서 개인과 개인 간의 관계, 환경과 환경 간의 관계, 개인과 환경 간의 관계를 설명하는 개념 3가지를 쓰고 설명하시오. - 일관성 : 홀랜드의 6가지 흥미유형에서 어떤 상들을 다른 쌍보다 많은 공통점을 가지고 있다.\n- 변별성 : 특정 성격 유형은 다른 어떤 유형과는 유사하고, 어떤 유형과는 차별화 된다.\n- 정체성 : 개인에게 정체성은 목표, 흥미, 재능 등이고, 환경에서 정체성은 투명성, 안정성 등이다. 상담이론 2025년 1~3회 실기 정리"},{"id":"2025-43","sourceGroup":"2025","source":"2025년 1~3회 실기 정리","year":2025,"number":43,"question":"홀랜드 직업 흥미 검사의 6가지 유형을 쓰고, 각각에 대해 간략히 설명하시오.","answer":"- 현실형 : 현장에서 수행하는 활동을 선호. 구체적, 실질적인 것을 지향 (기술직, 농부 등)\n- 탐구형 : 과학적, 탐구적인 성향. 정보수집 및 자료해석을 즐긴다. (화학자, 생물학자 등)\n- 예술형 : 심미적, 창조적인 성향. 자유롭게 상징적인 활동을 선호 (문학가, 미술가 등)\n- 사회형 : 사람들과 함께 어울리며 집단 속에서 일하는 것을 선호 (사회복지사, 교사 등)\n- 진취형 : 진취적, 경쟁적인 성향. 적극적인 활동을 선호 (기업실무자, 영업사원, 보험설계사 등)\n- 관습형 : 자료의 조직화나 세밀하고 정확한 주의가 요구되는 활동을 선호 (경리사원, 비서 등)","frequency":1,"recent":true,"expected":false,"importance":0,"category":"상담이론","searchText":"홀랜드 직업 흥미 검사의 6가지 유형을 쓰고, 각각에 대해 간략히 설명하시오. - 현실형 : 현장에서 수행하는 활동을 선호. 구체적, 실질적인 것을 지향 (기술직, 농부 등)\n- 탐구형 : 과학적, 탐구적인 성향. 정보수집 및 자료해석을 즐긴다. (화학자, 생물학자 등)\n- 예술형 : 심미적, 창조적인 성향. 자유롭게 상징적인 활동을 선호 (문학가, 미술가 등)\n- 사회형 : 사람들과 함께 어울리며 집단 속에서 일하는 것을 선호 (사회복지사, 교사 등)\n- 진취형 : 진취적, 경쟁적인 성향. 적극적인 활동을 선호 (기업실무자, 영업사원, 보험설계사 등)\n- 관습형 : 자료의 조직화나 세밀하고 정확한 주의가 요구되는 활동을 선호 (경리사원, 비서 등) 상담이론 2025년 1~3회 실기 정리"},{"id":"2025-44","sourceGroup":"2025","source":"2025년 1~3회 실기 정리","year":2025,"number":44,"question":"한국직업사전에 수록된 부가 직업정보 6가지를 쓰시오.","answer":"① 작업강도 ② 작업환경 ③ 작업장소 ④ 육체활동 ⑤ 정규교육 ⑥ 숙련기간\n\n(그 외 직무기능, 유사명칭, 관련 직업, 자격&면허, 한국표준산업분류 코드, 한국표준직업분류 코드, 조사연도","frequency":1,"recent":true,"expected":false,"importance":0,"category":"직업정보·분류","searchText":"한국직업사전에 수록된 부가 직업정보 6가지를 쓰시오. ① 작업강도 ② 작업환경 ③ 작업장소 ④ 육체활동 ⑤ 정규교육 ⑥ 숙련기간\n\n(그 외 직무기능, 유사명칭, 관련 직업, 자격&면허, 한국표준산업분류 코드, 한국표준직업분류 코드, 조사연도 직업정보·분류 2025년 1~3회 실기 정리"},{"id":"2025-45","sourceGroup":"2025","source":"2025년 1~3회 실기 정리","year":2025,"number":45,"question":"생애진로사정을 통해 얻을 수 있는 정보를 3가지 쓰시오.","answer":"① 내담자의 직업경험과 교육수준을 나타내는 객곽적인 사실\n\n② 내담자의 기술과 유능성에 대한 자기평가 및 상담자의 평가정보\n\n③ 내담자의 가치관 및 자기인식 정도\n\n(짧게 요약하면 : 교육,훈련경험/의존적인지, 독립적인지의 성향/자신의 기술과 능력에 대한 자기평가\n\n*** 생애진로사정(LCA)의 평가 의미 : 내담자의 생에 대한 접근을 통해 내담자에 대한 기초적인 직업상담 정보를 얻는 질적인 평가절차이다.","frequency":1,"recent":true,"expected":false,"importance":0,"category":"상담실무·기법","searchText":"생애진로사정을 통해 얻을 수 있는 정보를 3가지 쓰시오. ① 내담자의 직업경험과 교육수준을 나타내는 객곽적인 사실\n\n② 내담자의 기술과 유능성에 대한 자기평가 및 상담자의 평가정보\n\n③ 내담자의 가치관 및 자기인식 정도\n\n(짧게 요약하면 : 교육,훈련경험/의존적인지, 독립적인지의 성향/자신의 기술과 능력에 대한 자기평가\n\n*** 생애진로사정(lca)의 평가 의미 : 내담자의 생에 대한 접근을 통해 내담자에 대한 기초적인 직업상담 정보를 얻는 질적인 평가절차이다. 상담실무·기법 2025년 1~3회 실기 정리"},{"id":"2025-46","sourceGroup":"2025","source":"2025년 1~3회 실기 정리","year":2025,"number":46,"question":"한국 표준직업분류에서 직업으로 보지 않는 활동 6가지를 쓰시오.","answer":"① 이자, 임대료 등의 수입\n\n② 연금법, 고용보험법 등에 의한 수입\n\n③ 경마, 경륜, 복권 등에 의한 수입\n\n④ 예금 출금이나 보험금 수취 등의 활동\n\n⑤ 가사활동\n\n⑥ 사회수용시설 수용자의 시설 내 경제활동\n\n⑦ 수형자의 강제노동","frequency":1,"recent":true,"expected":false,"importance":0,"category":"노동시장·고용","searchText":"한국 표준직업분류에서 직업으로 보지 않는 활동 6가지를 쓰시오. ① 이자, 임대료 등의 수입\n\n② 연금법, 고용보험법 등에 의한 수입\n\n③ 경마, 경륜, 복권 등에 의한 수입\n\n④ 예금 출금이나 보험금 수취 등의 활동\n\n⑤ 가사활동\n\n⑥ 사회수용시설 수용자의 시설 내 경제활동\n\n⑦ 수형자의 강제노동 노동시장·고용 2025년 1~3회 실기 정리"},{"id":"2025-47","sourceGroup":"2025","source":"2025년 1~3회 실기 정리","year":2025,"number":47,"question":"최저 임금제의 긍정적 효과 5가지를 쓰시오.","answer":"- 경기 활성화에 효과가 있다.\n- 노동자 생활 안정에 도움이 된다.\n- 소득분배 상태가 개선된다.\n- 산업구조의 고도화에 기여한다.\n- 경제성장, 고용증대 효과가 있다.\n- 고임금 경제 효과를 얻을 수 있다.","frequency":1,"recent":true,"expected":false,"importance":0,"category":"노동시장·고용","searchText":"최저 임금제의 긍정적 효과 5가지를 쓰시오. - 경기 활성화에 효과가 있다.\n- 노동자 생활 안정에 도움이 된다.\n- 소득분배 상태가 개선된다.\n- 산업구조의 고도화에 기여한다.\n- 경제성장, 고용증대 효과가 있다.\n- 고임금 경제 효과를 얻을 수 있다. 노동시장·고용 2025년 1~3회 실기 정리"},{"id":"2025-48","sourceGroup":"2025","source":"2025년 1~3회 실기 정리","ye 4 | 14\n10단위 | 16 | 2\n\n1. 노동공급이 7단위일 때 한계노동비용을 구하시오.\n2. 이윤 극대화가 이루어지는 노동공급과 임금을 구하시오.","answer":"1. 한계노동비용\n- (7 × 10) - (6 × 8) = 22\n- 원문 이미지에는 12로 표기되어 있으나, 산식 결과는 22이다.\n\n2. 노동공급과 임금\n- 수요독점 노동시장에서 이윤극대화는 한계노동비용과 한계수입생산이 같은 지점에서 이루어진다.\n- 노동공급이 8단위일 때 한계노동비용은 (12 × 8) - (10 × 7) = 26으로 한계수입생산 26과 같다.\n- 따라서 노동공급은 8단위, 임금은 12이다.","frequency":1,"recent":true,"expected":false,"importance":0,"category":"노동시장·고용","searchText":"다음 표를 보고 물음에 답하시오.\n\n노동공급단위 | 임금 | 한계수입생산\n5단위 | 6 | 62\n6단위 | 8 | 50\n7단위 | 10 | 38\n8단위 | 12 | 26\n9단위 | 14 | 14\n10단위 | 16 | 2\n\n1. 노동공급이 7단위일 때 한계노동비용을 구하시오.\n2. 이윤 극대화가 이루어지는 노동공급과 임금을 구하시오. 1. 한계노동비용\n- (7 × 10) - (6 × 8) = 22\n- 원문 이미지에는 12로 표기되어 있으나, 산식 결과는 22이다.\n\n2. 노동공급과 임금\n- 수요독점 노동시장에서 이윤극대화는 한계노동비용과 한계수입생산이 같은 지점에서 이루어진다.\n- 노동공급이 8단위일 때 한계노동비용은 (12 × 8) - (10 × 7) = 26으로 한계수입생산 26과 같다.\n- 따라서 노동공급은 8단위, 임금은 12이다. 노동시장·고용 2026년 1회 실기"},{"id":"2026-13","sourceGroup":"2026","source":"2026년 1회 실기","year":2026,"number":13,"question":"일반직업적성검사(GATB)에서 측정하는 적성 항목을 3가지 쓰고 각각에 대해 설명하시오.","answer":"- 지능 : 일반적인 학습능력, 설명이나 지도 내용과 원리를 이해하고 추리, 판단하는 능력으로 새로운 환경에 빠르게 순응하게 한다. 입체 공간, 어휘, 산수 추리 검사를 통해 측정한다.\n- 언어능력 : 언어를 이해하고 사용하는 능력. 언어 상호 간의 관계와 문장의 뜻을 이해하는 능력으로 보고 들은 것이나 자신의 생각을 발표하는 능력이다. 어휘검사를 통해 측정한다.\n- 수리 능력 : 신속하게 계산하는 능력. 산수 추리, 계수 검사를 통해 측정한다.\n- 사무지각 : 문자, 인쇄물, 전표 등의 세부를 식별하는 능력. 잘못된 문자나 숫자를 찾아 교정하고 대조하는 능력으로 직관적인 인지 능력의 정확도나 비교 판별하는 능력을 의미한다. 명칭 비교 검사를 통해 측정한다.\n- 형태지각 : 실물이나 도해, 표에 나타나는 것을 세부까지 바르게 지각하는 능력. 시각으로 비교 판단하는 능력으로 도형의 형태나 음영, 선의 길이나 넓이 차이를 지각하는 능력이다. 시각의 예민도 등을 의미하며 기구대조와 형태대조검사로 측정한다.\n- 공간적성 : 공간상의 형태 및 평면과 물체의 관계를 이해하는 능력. 기하학적 문제의 해결 능력으로 2차원이나 3차원 형체를 시각으로 이해하는 능력이다. 평면도 판단, 입체 공간 검사를 통해 측정한다.\n- 운동 반응 : 눈과 손, 눈과 손가락을 함께 사용하여 빠르고 정확하게 운동할 수 있는 능력. 눈으로 겨누며 정확하게 손이나 손가락의 운동을 조절하는 능력이다. 타점속도, 표식, 종선기입검사로 측정한다.\n- 손 재치 : 손을 정교하게 조절하는 능력. 물건을 집거나 놓고, 뒤집을 때 손과 손목을 정교하고 자유롭게 활용하는 능력으로 환치, 회전검사로 측정한다.\n- 손가락 재치 : 손가락을 정교하고 신속하게 움직이는 능력. 작은 물건을 정확하고 신속하게 다루는 능력으로 조립과 분해검사로 측정한다.","frequency":1,"recent":true,"expected" <script>
(() => {
'use strict';
const STORE_KEY='career-counselor-practical-study-v2';
const PAGE_SIZE=18;
const categoryIcons={'상담이론':'🧠','상담실무·기법':'💬','직업선택·발달':'🧭','심리검사·통계':'📊','직업정보·분류':'🗂️','직무분석·경력개발':'🛠️','노동시장·고용':'📈','법규·제도':'⚖️','기타 핵심이론':'📚'};
const state={view:'home',search:'',category:'전체',source:'전체',sort:'recent',page:1,flashIndex:0,flashReveal:false,quiz:null};
const defaultProgress={status:{},seen:{},studyDays:[],theme:'light',daily:{date:'',ids:[]},quizHistory:[]};
let progress=loadProgress();

function loadProgress(){try{return {...defaultProgress,...JSON.parse(localStorage.getItem(STORE_KEY)||'{}')}}catch{return structuredClone(defaultProgress)}}
function saveProgress(){localStorage.setItem(STORE_KEY,JSON.stringify(progress));updateProgressUI()}
function today(){return new Date().toLocaleDateString('sv-SE')}
function touchStudyDay(){const d=today();if(!progress.studyDays.includes(d)){progress.studyDays.push(d);progress.studyDays=progress.studyDays.slice(-120)}}
function escapeHtml(v=''){return String(v).replace(/[&<>'"]/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch]))}
function highlight(v){let out=escapeHtml(v);const term=state.search.trim();if(term){try{const re=new RegExp('('+term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');out=out.replace(re,'<mark>$1</mark>')}catch{}}return out}
function formatText(v){return highlight(v).replace(/\n/g,'<br>')}
function shuffle(arr,seed=Math.random()){const a=[...arr];let r=typeof seed==='function'?seed:Math.random;for(let i=a.length-1;i>0;i--){const j=Math.floor(r()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function seededRandom(seed){let h=2166136261;for(const c of seed){h^=c.charCodeAt(0);h=Math.imul(h,16777619)}return()=>{h+=0x6D2B79F5;let t=h;t=Math.imul(t^t>>>15,t|1);t^=t+Math.imul(t^t>>>7,t|61);return((t^t>>>14)>>>0)/4294967296}}
function getDailyIds(){const d=today();if(progress.daily.date!==d||!progress.daily.ids?.length){progress.daily={date:d,ids:shuffle(QUESTIONS,seededRandom(d)).slice(0,10).map(q=>q.id)};saveProgress()}return progress.daily.ids}
function filteredQuestions(){let list=QUESTIONS.filter(q=>state.category==='전체'||q.category===state.category).filter(q=>state.source==='전체'||q.sourceGroup===state.source);const s=state.search.trim().toLowerCase();if(s)list=list.filter(q=>q.searchText.includes(s));if(state.sort==='recent')list.sort((a,b)=>b.year-a.year||b.frequency-a.frequency||a.number-b.number);if(state.sort==='frequency')list.sort((a,b)=>b.frequency-a.frequency||b.year-a.year);if(state.sort==='number')list.sort((a,b)=>a.year-b.year||a.number-b.number);if(state.sort==='random')list=shuffle(list,seededRandom(today()+state.category+state.source));return list}
function statusOf(id){return progress.status[id]||''}
function mark(id,status){progress.status[id]=status;progress.seen[id]=(progress.seen[id]||0)+1;touchStudyDay();saveProgress();renderCurrent();toast(status==='known'?'암기 완료로 저장했습니다.':'다시 볼 문제에 추가했습니다.')}
function markSeen(id){progress.seen[id]=(progress.seen[id]||0)+1;touchStudyDay();saveProgress()}
function stats(){const total=QUESTIONS.length;const known=Object.values(progress.status).filter(v=>v==='known').length;const review=Object.values(progress.status).filter(v=>v==='review').length;const seen=Object.keys(progress.seen).length;return{total,known,review,seen,pct:Math.round(known/total*100),streak:streak()}}
function streak(){const set=new Set(progress.studyDays);let d=new Date();let count=0;while(set.has(d.toLocaleDateString('sv-SE'))){count++;d.setDate(d.getDate()-1)}return count}
function badges(q){return `<div class="badges"><span class="badge primary">${escapeHtml(q.category)}</span><span class="badge">${escapeHtml(q.source)}</span>${q.frequency>1?`<span class="badge warning">출제 ${q.frequency}회</span>`:''}${q.recent?'<span class="badge recent">최신</span>':''}${q.expected?'<span class="badge warning">예상</span>':''}</div>`}
function setView(view){state.view=view;document.querySelectorAll('.view').forEach(v=>v.classList.toggle('active',v.id===view+'View'));document.querySelectorAll('[data-view]').forEach(b=>b.classList.toggle('active',b.dataset.view===view));closeDrawer();renderCurrent();window.scrollTo({top:0,behavior:'smooth'})}
function renderCurrent(){({home:renderHome,study:renderStudy,flash:renderFlash,quiz:renderQuiz,review:renderReview}[state.view]||renderHome)();updateProgressUI()}
function updateProgressUI(){const s=stats();document.getElementById('sideProgressPct').textContent=s.pct+'%';document.getElementById('sideProgressBar').style.width=s.pct+'%';document.getElementById('sideProgressText').textContent=s.known?`${s.known}문제 암기 완료 · ${s.review}문제 복습 중`:'아직 학습을 시작하지 않았어요.'}
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toast.t);toast.t=setTimeout(()=>el.classList.remove('show'),1800)}

function renderHome(){const s=stats();const cats=[...new Set(QUESTIONS.map(q=>q.category))].sort((a,b)=>QUESTIONS.filter(q=>q.category===b).length-QUESTIONS.filter(q=>q.category===a).length);const latest=[...QUESTIONS].sort((a,b)=>b.year-a.year||a.number-b.number).slice(0,6);document.getElementById('homeView').innerHTML=`
<div class="hero"><div class="hero-copy"><div class="eyebrow">2026 최신 기출 포함</div><h1>외우는 공부에서<br>꺼내 쓰는 공부로</h1><p>직업상담사 2급 실기 기출을 주제별로 찾고, 답안을 가린 채 반복해서 떠올려 보세요. 학습기록은 이 브라우저에 자동 저장됩니다.</p><div class="hero-actions"><button class="btn btn-primary" data-go="daily">오늘의 10문제</button><button class="btn btn-secondary" data-view="study">전체 기출 보기</button></div></div><div class="hero-panel"><div class="hero-panel-title">나의 학습 현황</div><div class="hero-progress-line"><span>암기 진도</span><strong>${s.pct}%</strong></div><div class="progress-track"><div class="progress-bar" style="width:${s.pct}%"></div></div><div class="hero-mini"><div><strong>${s.known}</strong><small>암기 완료</small></div><div><strong>${s.review}</strong><small>복습 필요</small></div><div><strong>${s.seen}</strong><small>확인한 문제</small></div><div><strong>${s.streak}일</strong><small>연속 학습</small></div></div></div></div>
<div class="stats-grid"><div class="stat-card"><div class="stat-icon">📚</div><div><strong>${s.total}</strong><span>전체 수록 문항</span></div></div><div class="stat-card"><div class="stat-icon">🆕</div><div><strong>${QUESTIONS.filter(q=>q.recent).length}</strong><span>2025~2026 최신</span></div></div><div class="stat-card"><div class="stat-icon">✅</div><div><strong>${s.known}</strong><span>암기 완료</span></div></div><div class="stat-card"><div class="stat-icon">🔥</div><div><strong>${s.streak}</strong><span>연속 학습일</span></div></div></div>
<div class="section-head"><div><h2>주제별 학습</h2><p>취약한 영역부터 골라서 집중 학습하세요.</p></div></div><div class="category-grid">${cats.map(c=>`<button class="category-card" data-category-go="${escapeHtml(c)}"><span class="cat-icon">${categoryIcons[c]||'📚'}</span><strong>${escapeHtml(c)}</strong><small>${QUESTIONS.filter(q=>q.category===c).length}문제</small></button>`).join('')}</div>
<div class="section-head"><div><h2>최신 기출 빠르게 보기</h2><p>2026년부터 최근 순서로 정리했습니다.</p></div><button class="text-btn" data-source-go="2026">2026년 전체 보기 →</button></div><div class="recent-list">${latest.map(q=>`<button class="mini-question" data-open-question="${q.id}">${badges(q)}<p>${escapeHtml(q.question.replace(/\n/g,' '))}</p></button>`).join('')}</div>`}

function categoryChips(){const cats=['전체',...new Set(QUESTIONS.map(q=>q.category))];return `<div class="chips">${cats.map(c=>`<button class="chip ${state.category===c?'active':''}" data-category="${escapeHtml(c)}">${escapeHtml(c)}</button>`).join('')}</div>`}
function questionCard(q){const st=statusOf(q.id);return `<article class="question-card ${st==='known'?'is-known':''} ${st==='review'?'is-review':''}" id="q-${q.id}"><div class="question-meta"><div class="question-no">${q.year} · NO.${q.number}</div>${badges(q)}</div><h3>${formatText(q.question)}</h3><div class="question-actions"><button class="btn btn-secondary answer-toggle" data-id="${q.id}">답안 보기</button><button class="btn btn-success" data-mark-known="${q.id}">✓ 암기 완료</button><button class="btn btn-danger" data-mark-review="${q.id}">↻ 다시 보기</button><button class="btn btn-ghost copy-btn" data-copy="${q.id}">복사</button></div><div class="answer-box" id="answer-${q.id}"><div class="answer-title">모범 답안</div><div class="answer-text">${formatText(q.answer)}</div></div></article>`}
function renderStudy(){const list=filteredQuestions();const pages=Math.max(1,Math.ceil(list.length/PAGE_SIZE));state.page=Math.min(state.page,pages);const start=(state.page-1)*PAGE_SIZE;const items=list.slice(start,start+PAGE_SIZE);document.getElementById('studyView').innerHTML=`<div class="page-head"><div><div class="eyebrow">기출문제 데이터베이스</div><h1>전체 기출문제</h1><p>검색과 필터를 이용해 필요한 문제만 빠르게 찾아보세요.</p></div><button class="btn btn-secondary" onclick="window.print()">인쇄하기</button></div><div class="toolbar"><select id="sourceFilter" aria-label="연도 범위"><option value="전체">전체 연도</option><option value="2026">2026년</option><option value="2025">2025년</option><option value="2019~2024">2019~2024년</option></select><select id="sortFilter" aria-label="정렬"><option value="recent">최신순</option><option value="frequency">출제빈도순</option><option value="number">연도·번호순</option><option value="random">오늘의 랜덤순</option></select><div class="toolbar-spacer"></div><span class="count-label">총 ${list.length}문제 · ${start+1}~${Math.min(start+PAGE_SIZE,list.length)} 표시</span></div>${categoryChips()}<div class="question-list">${items.length?items.map(questionCard).join(''):`<div class="empty"><div class="empty-icon">🔎</div><h3>검색 결과가 없습니다.</h3><p>검색어나 분류 조건을 바꿔 보세요.</p><button class="btn btn-primary" data-clear-filter>필터 초기화</button></div>`}</div>${pagination(pages)}`;document.getElementById('sourceFilter').value=state.source;document.getElementById('sortFilter').value=state.sort}
function pagination(pages){if(pages<=1)return'';let nums=[];for(let p=Math.max(1,state.page-2);p<=Math.min(pages,state.page+2);p++)nums.push(p);return `<div class="pagination"><button data-page="${state.page-1}" ${state.page===1?'disabled':''}>‹</button>${nums.map(p=>`<button data-page="${p}" class="${p===state.page?'active':''}">${p}</button>`).join('')}<button data-page="${state.page+1}" ${state.page===pages?'disabled':''}>›</button></div>`}

function flashPool(){const list=filteredQuestions();return list.length?list:QUESTIONS}
function renderFlash(){const pool=flashPool();state.flashIndex=Math.min(Math.max(0,state.flashIndex),pool.length-1);const q=pool[state.flashIndex];if(!q)return;document.getElementById('flashView').innerHTML=`<div class="page-head"><div><div class="eyebrow">능동 회상 학습</div><h1>암기카드</h1><p>먼저 답을 떠올린 다음 모범답안을 확인하세요.</p></div><button class="btn btn-secondary" data-random-flash>문제 섞기</button></div><div class="study-stage"><div class="stage-top"><div class="stage-progress"><div class="hero-progress-line"><span>${state.flashIndex+1} / ${pool.length}</span><strong>${Math.round((state.flashIndex+1)/pool.length*100)}%</strong></div><div class="progress-track"><div class="progress-bar" style="width:${(state.flashIndex+1)/pool.length*100}%"></div></div></div>${badges(q)}</div><article class="stage-card"><div class="question-no">${q.year} · NO.${q.number}</div><div class="stage-question">${formatText(q.question)}</div><div class="stage-answer ${state.flashReveal?'open':''}"><div class="answer-title">모범 답안</div>${formatText(q.answer)}</div><div class="stage-spacer"></div><div class="stage-actions">${state.flashReveal?`<button class="btn btn-danger" data-flash-grade="review">↻ 다시 보기</button><button class="btn btn-success" data-flash-grade="known">✓ 알고 있음</button>`:`<button class="btn btn-primary" data-flash-reveal>정답 확인</button>`}<button class="btn btn-secondary" data-flash-prev>이전</button><button class="btn btn-secondary" data-flash-next>다음</button></div><div class="shortcut">Space 정답 확인 · ← → 문제 이동 · 1 다시 보기 · 2 알고 있음</div></article></div>`}
function moveFlash(delta){const pool=flashPool();state.flashIndex=(state.flashIndex+delta+pool.length)%pool.length;state.flashReveal=false;renderFlash()}

function startQuiz(ids){const pool=ids?ids.map(id=>QUESTIONS.find(q=>q.id===id)).filter(Boolean):filteredQuestions();const chosen=shuffle(pool.length?pool:QUESTIONS).slice(0,Math.min(10,pool.length||10));state.quiz={items:chosen,index:0,revealed:false,correct:0,review:0,done:false};setView('quiz')}
function renderQuiz(){const root=document.getElementById('quizView');if(!state.quiz){root.innerHTML=`<div class="page-head"><div><div class="eyebrow">서술형 실전연습</div><h1>실전퀴즈</h1><p>10문제를 풀고 모범답안과 직접 비교해 채점합니다.</p></div></div><div class="study-stage"><article class="stage-card" style="text-align:center;justify-content:center"><div style="font-size:54px">✍️</div><h2>답을 직접 써 보는 연습</h2><p style="color:var(--muted);max-width:560px;margin:0 auto 22px">실기시험은 핵심 키워드를 빠짐없이 서술하는 것이 중요합니다. 현재 필터 조건에서 무작위 10문제를 출제합니다.</p><div class="stage-actions"><button class="btn btn-primary" data-start-quiz>10문제 시작</button><button class="btn btn-secondary" data-go="daily">오늘의 10문제</button></div></article></div>`;return}const z=state.quiz;if(z.done){const total=z.items.length;const pct=Math.round(z.correct/total*100);root.innerHTML=`<div class="page-head"><div><div class="eyebrow">퀴즈 완료</div><h1>학습 결과</h1><p>정답 여부를 스스로 평가한 결과입니다.</p></div></div><div class="study-stage"><article class="stage-card" style="text-align:center;justify-content:center"><div style="font-size:64px">${pct>=80?'🏆':pct>=60?'👏':'🌱'}</div><h2 style="font-size:34px;margin:8px 0">${z.correct} / ${total}문제</h2><p style="color:var(--muted)">다시 볼 문제 ${z.review}개가 오답복습에 저장되었습니다.</p><div class="stage-actions"><button class="btn btn-primary" data-restart-quiz>다시 풀기</button><button class="btn btn-secondary" data-view="review">오답복습 보기</button></div></article></div>`;return}const q=z.items[z.index];root.innerHTML=`<div class="page-head"><div><div class="eyebrow">서술형 실전연습</div><h1>실전퀴즈</h1><p>답안을 적은 뒤 모범답안과 비교해 보세요.</p></div></div><div class="study-stage"><div class="stage-top"><div class="stage-progress"><div class="hero-progress-line"><span>${z.index+1} / ${z.items.length}</span><strong>${Math.round((z.index+1)/z.items.length*100)}%</strong></div><div class="progress-track"><div class="progress-bar" style="width:${(z.index+1)/z.items.length*100}%"></div></div></div>${badges(q)}</div><article class="stage-card"><div class="question-no">${q.year} · NO.${q.number}</div><div class="stage-question">${formatText(q.question)}</div><textarea class="quiz-textarea" id="quizAnswer" placeholder="기억나는 핵심 키워드와 설명을 직접 작성하세요." ${z.revealed?'disabled':''}></textarea><div class="stage-answer ${z.revealed?'open':''}"><div class="answer-title">모범 답안</div>${formatText(q.answer)}</div><div class="stage-spacer"></div><div class="stage-actions">${z.revealed?`<button class="btn btn-danger" data-quiz-grade="review">다시 공부하기</button><button class="btn btn-success" data-quiz-grade="correct">맞게 썼어요</button>`:`<button class="btn btn-primary" data-quiz-reveal>모범답안 확인</button>`}</div></article></div>`}
function gradeQuiz(kind){const z=state.quiz,q=z.items[z.index];if(kind==='correct'){z.correct++;progress.status[q.id]='known'}else{z.review++;progress.status[q.id]='review'}progress.seen[q.id]=(progress.seen[q.id]||0)+1;touchStudyDay();z.index++;z.revealed=false;if(z.index>=z.items.length){z.done=true;progress.quizHistory.push({date:today(),correct:z.correct,total:z.items.length});progress.quizHistory=progress.quizHistory.slice(-30)}saveProgress();renderQuiz()}

function renderReview(){const list=QUESTIONS.filter(q=>statusOf(q.id)==='review');document.getElementById('reviewView').innerHTML=`<div class="review-head"><div><div class="eyebrow">취약문제 집중학습</div><h1 style="margin:0">오답복습</h1><p style="margin:5px 0 0;color:var(--muted)">다시 보기로 표시한 ${list.length}문제를 모았습니다.</p></div>${list.length?'<button class="btn btn-danger" data-clear-review>오답표시 모두 해제</button>':''}</div>${list.length?`<div class="question-list">${list.map(questionCard).join('')}</div>`:`<div class="empty"><div class="empty-icon">🎉</div><h3>복습할 문제가 없습니다.</h3><p>기출문제를 풀면서 어려운 문제를 ‘다시 보기’로 표시해 보세요.</p><button class="btn btn-primary" data-view="study">기출문제 학습하기</button></div>`}`}

function openQuestion(id){const q=QUESTIONS.find(x=>x.id===id);if(!q)return;state.search='';state.source=q.sourceGroup;state.category='전체';state.sort='recent';const list=filteredQuestions();state.page=Math.floor(list.findIndex(x=>x.id===id)/PAGE_SIZE)+1;setView('study');setTimeout(()=>{const card=document.getElementById('q-'+id);card?.scrollIntoView({behavior:'smooth',block:'center'});card?.querySelector('.answer-toggle')?.focus()},100)}
function clearFilters(){state.search='';state.category='전체';state.source='전체';state.sort='recent';state.page=1;document.getElementById('globalSearch').value='';renderStudy()}
function openDrawer(){document.getElementById('sidebar').classList.add('open');document.getElementById('drawerBackdrop').classList.add('show')}
function closeDrawer(){document.getElementById('sidebar').classList.remove('open');document.getElementById('drawerBackdrop').classList.remove('show')}

// Delegated UI events
document.addEventListener('click',async e=>{const b=e.target.closest('button');if(!b)return;if(b.dataset.view){setView(b.dataset.view);return}if(b.dataset.go==='daily'){startQuiz(getDailyIds());return}if(b.dataset.categoryGo){state.category=b.dataset.categoryGo;state.source='전체';state.page=1;setView('study');return}if(b.dataset.sourceGo){state.source=b.dataset.sourceGo;state.category='전체';state.page=1;setView('study');return}if(b.classList.contains('source-shortcut')){state.source=b.dataset.source;state.category='전체';state.page=1;setView('study');return}if(b.dataset.openQuestion){openQuestion(b.dataset.openQuestion);return}if(b.dataset.category){state.category=b.dataset.category;state.page=1;renderStudy();return}if(b.dataset.page){state.page=Number(b.dataset.page);renderStudy();window.scrollTo({top:0,behavior:'smooth'});return}if(b.dataset.clearFilter!==undefined){clearFilters();return}if(b.classList.contains('answer-toggle')){const box=document.getElementById('answer-'+b.dataset.id);const open=box.classList.toggle('open');b.textContent=open?'답안 닫기':'답안 보기';if(open)markSeen(b.dataset.id);return}if(b.dataset.markKnown){mark(b.dataset.markKnown,'known');return}if(b.dataset.markReview){mark(b.dataset.markReview,'review');return}if(b.dataset.copy){const q=QUESTIONS.find(x=>x.id===b.dataset.copy);await navigator.clipboard.writeText(`${q.question}\n\n${q.answer}`);toast('문제와 답안을 복사했습니다.');return}if(b.dataset.randomFlash!==undefined){state.flashIndex=Math.floor(Math.random()*flashPool().length);state.flashReveal=false;renderFlash();return}if(b.dataset.flashReveal!==undefined){state.flashReveal=true;markSeen(flashPool()[state.flashIndex].id);renderFlash();return}if(b.dataset.flashPrev!==undefined){moveFlash(-1);return}if(b.dataset.flashNext!==undefined){moveFlash(1);return}if(b.dataset.flashGrade){const q=flashPool()[state.flashIndex];mark(q.id,b.dataset.flashGrade);state.flashIndex=(state.flashIndex+1)%flashPool().length;state.flashReveal=false;renderFlash();return}if(b.dataset.startQuiz!==undefined){startQuiz();return}if(b.dataset.quizReveal!==undefined){state.quiz.revealed=true;renderQuiz();return}if(b.dataset.quizGrade){gradeQuiz(b.dataset.quizGrade);return}if(b.dataset.restartQuiz!==undefined){state.quiz=null;startQuiz();return}if(b.dataset.clearReview!==undefined){if(confirm('오답표시를 모두 해제할까요?')){Object.keys(progress.status).forEach(id=>{if(progress.status[id]==='review')delete progress.status[id]});saveProgress();renderReview()}return}});

document.getElementById('globalSearch').addEventListener('input',e=>{state.search=e.target.value;state.page=1;if(state.view!=='study')setView('study');else renderStudy()});
document.addEventListener('change',e=>{if(e.target.id==='sourceFilter'){state.source=e.target.value;state.page=1;renderStudy()}if(e.target.id==='sortFilter'){state.sort=e.target.value;state.page=1;renderStudy()}});
document.getElementById('menuBtn').addEventListener('click',openDrawer);document.getElementById('drawerBackdrop').addEventListener('click',closeDrawer);
document.getElementById('themeBtn').addEventListener('click',()=>{progress.theme=progress.theme==='dark'?'light':'dark';document.documentElement.dataset.theme=progress.theme;saveProgress()});
document.getElementById('resetBtn').addEventListener('click',()=>{if(confirm('암기 완료, 오답, 퀴즈 기록을 모두 초기화할까요?')){progress=structuredClone(defaultProgress);localStorage.removeItem(STORE_KEY);document.documentElement.dataset.theme='light';renderCurrent();toast('학습 기록을 초기화했습니다.')}});
document.addEventListener('keydown',e=>{if(state.view!=='flash'||['INPUT','TEXTAREA'].includes(document.activeElement.tagName))return;if(e.code==='Space'){e.preventDefault();state.flashReveal=!state.flashReveal;renderFlash()}if(e.key==='ArrowRight')moveFlash(1);if(e.key==='ArrowLeft')moveFlash(-1);if(e.key==='1'&&state.flashReveal){const q=flashPool()[state.flashIndex];mark(q.id,'review');moveFlash(1)}if(e.key==='2'&&state.flashReveal){const q=flashPool()[state.flashIndex];mark(q.id,'known');moveFlash(1)}});

document.documentElement.dataset.theme=progress.theme||'light';renderCurrent();
})();

</script>
</body>
</html>

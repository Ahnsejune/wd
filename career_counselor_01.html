<div class="app">

const QUESTIONS = [{"id":"old-1","sourceGroup":"2019~2024","source":"2022년 3회/2021년 3회/2021년 1회/2020년 2회","year":2022,"number":1,"question":"부처(Butcher)의 집단 직업상담의 과정 3단계 모델에 대해 쓰고 설명하시오.","answer":"① 탐색단계 - 자기개방, 흥미와 적성에 대한 탐색, 측정결과에 대한 피드백, 자아상과 피드백 내용 간 불일치의 해결\n② 전환단계 - 자신의 지식과 직업세계의 연결이 이루어지는 단계, 가치와 피드백 간 불일치 해결.\n③ 행동단계 - 목표를 설정하고 정보의 수집과 공유가 이루어지며, 목표를 달성하기 위한 구체적인 행동을 하는 단계","frequency":4,"recent":false,"expected":false,"importance":0,"category":"상담실무·기법","searchText":"부처(butcher)의 집단 직업상담의 과정 3단계 모델에 대해 쓰고 설명하시오. ① 탐색단계 - 자기개방, 흥미와 적성에 대한 탐색, 측정결과에 대한 피드백, 자아상과 피드백 내용 간 불일치의 해결\n② 전환단계 - 자신의 지식과 직업세계의 연결이 이루어지는 단계, 가치와 피드백 간 불일치 해결.\n③ 행동단계 - 목표를 설정하고 정보의 수집과 공유가 이루어지며, 목표를 달성하기 위한 구체적인 행동을 하는 단계 상담실무·기법 2022년 3회/2021년 3회/2021년 1회/2020년 2회"},{"id":"old-2","sourceGroup":"2019~2024","source":"2022년 3회/2020년 1회","year":2022,"number":2,"question":"아들러(Adler)의 개인주의 상담과정의 목표 5가지를 쓰시오.","answer":"① 사회적 관심을 갖도록 돕는다.\n② 패배감을 극복하고 열등감을 감소시킬 수 있도록 돕는다\n③ 내담자의 잘못된 가치와 목표를 수정하도록 돕는다.\n④ 잘못된 동기를 바꾸도록 돕는다.\n⑤ 내담자가 타인과의 동질감을 갖도록 돕는다.\n⑥ 사회의 구성원으로 기여하도록 돕는다.","frequency":2,"recent":false,"expected":false,"importance":0,"category":"상담이론","searchText":"아들러(adler)의 개인주의 상담과정의 목표 5가지를 쓰시오. ① 사회적 관심을 갖도록 돕는다.\n② 패배감을 극복하고 열등감을 감소시킬 수 있도록 돕는다\n③ 내담자의 잘못된 가치와 목표를 수정하도록 돕는다.\n④ 잘못된 동기를 바꾸도록 돕는다.\n⑤ 내담자가 타인과의 동질감을 갖도록 돕는다.\n⑥ 사회의 구성원으로 기여하도록 돕는다. 상담이론 2022년 3회/2020년 1회"},{"id":"old-3","sourceGroup":"2019~2024","source":"2022년 3회/2019년 1회","year":2022,"number":3,"question":"크라이티스(Crites)의 포괄적 직업상담의 상담과정을 단계별로 설명하시오.","answer":"① 제 1단계 : 진단 _ 내담자의 진로문제 진단 및 문제파악을 위해 심리검사 자료와 상담을 통한 자료가 수집된다.\n② 제 2단계 : 명료화 및 해석 _ 의사결정 과정을 방해하는 태도와 행동을 확인해 대안을 탐색한다.\n상담자와 내담자가 함께 문제의 원인을 명료화하고 해결방안을 모색하는 단계이다.\n③ 제 3단계 : 문제해결 _ 문제해결을 위해 어떤 행동을 실제로 취해야 하는지 결정한다.","frequency":2,"recent":false,"expected":false,"importance":0,"category":"심리검사·통계","searchText":"크라이티스(crites)의 포괄적 직업상담의 상담과정을 단계별로 설명하시오. ① 제 1단계 : 진단 _ 내담자의 진로문제 진단 및 문제파악을 위해 심리검사 자료와 상담을 통한 자료가 수집된다.\n② 제 2단계 : 명료화 및 해석 _ 의사결정 과정을 방해하는 태도와 행동을 확인해 대안을 탐색한다.\n상담자와 내담자가 함께 문제의 원인을 명료화하고 해결방안을 모색하는 단계이다.\n③ 제 3단계 : 문제해결 _ 문제해결을 위해 어떤 행동을 실제로 취해야 하는지 결정한다. 심리검사·통계 2022년 3회/2019년 1회"},{"id":"old-4","sourceGroup":"2019~2024","source":"2022년 3회/2020년 2회","year":2022,"number":4,"question":"직업적응 이론에서는 개인과 환경이 상호작용하는 특성을 나타내는 4가지 성격유형 요소를 가정한다.\n성격유형 요소 4가지를 설명하시오.","answer":"① 민첩성 : 개인이 얼마나 빠르게 환경에 적응할 수 있는가를 의미하는 것으로 속도를 중시한다.\n② 역량 : 개인이 환경과 상호작용을 하는 활동수준, 또는 강도를 의미하는 것. 근로자의 평균활동수준(에너지 소비량)\n높은 에너지를 가진 사람이 더 많은 역량이 있다고 볼 수 있다.\n③ 리듬 : 과제를 수행하는 과정의 패턴이 얼마나 꾸준하고 주기적인가 또는 불규칙한가를 의미한다. 활동의 다양성.\n④ 지구력(지속성) : 개인이 불만족스러운 환경을 참고 얼마나 오래 상호작용을 유지할 수 있는가를 나타낸다.\n개인이 환경과 상호작용하는 다양한 활동 수준의 기간.","frequency":2,"recent":false,"expected":false,"importance":0,"category":"상담이론","searchText":"직업적응 이론에서는 개인과 환경이 상호작용하는 특성을 나타내는 4가지 성격유형 요소를 가정한다.\n성격유형 요소 4가지를 설명하시오. ① 민첩성 : 개인이 얼마나 빠르게 환경에 적응할 수 있는가를 의미하는 것으로 속도를 중시한다.\n② 역량 : 개인이 환경과 상호작용을 하는 활동수준, 또는 강도를 의미하는 것. 근로자의 평균활동수준(에너지 소비량)\n높은 에너지를 가진 사람이 더 많은 역량이 있다고 볼 수 있다.\n③ 리듬 : 과제를 수행하는 과정의 패턴이 얼마나 꾸준하고 주기적인가 또는 불규칙한가를 의미한다. 활동의 다양성.\n④ 지구력(지속성) : 개인이 불만족스러운 환경을 참고 얼마나 오래 상호작용을 유지할 수 있는가를 나타낸다.\n개인이 환경과 상호작용하는 다양한 활동 수준의 기간. 상담이론 2022년 3회/2020년 2회"},{"id":"old-5","sourceGroup":"2019~2024","source":"2023년 2회/2019년 1회","year":2023,"number":5,"question":"롭퀴스트와 데이비스의 직업적응 이론에서 직업적응방식의 유형 3가지를 쓰고 설명하시오.","answer":"① 융통성 : 개인이 작업환경과 개인의 환경사이 부조화를 참아낼 수 있는 정도\n② 끈기 : 환경이 자신에게 맞지 않아도 얼마나 오래 견딜 수 있는지\n③ 반응성 : 개인이 작업환경에 반응하는 정도\n④ 적응성 : 개인이 작업환경을 자신과 더 조화롭게 만들기 위해 노력하는 정도.","frequency":2,"recent":false,"expected":false,"importance":0,"category":"상담이론","searchText":"롭퀴스트와 데이비스의 직업적응 이론에서 직업적응방식의 유형 3가지를 쓰고 설명하시오. ① 융통성 : 개인이 작업환경과 개인의 환경사이 부조화를 참아낼 수 있는 정도\n② 끈기 : 환경이 자신에게 맞지 않아도 얼마나 오래 견딜 수 있는지\n③ 반응성 : 개인이 작업환경에 반응하는 정도\n④ 적응성 : 개인이 작업환경을 자신과 더 조화롭게 만들기 위해 노력하는 정도. 상담이론 2023년 2회/2019년 1회"},{"id":"old-6","sourceGroup":"2019~2024","source":"2022년 3회/2024년 1회","year":2024,"number":6,"question":"직업적응 이론(TWA)에서 중요하게 다루는 직업가치 6가지를 쓰시오.","answer":"① 지위 ② 성취 ③ 이타심 ④ 안정성 ⑤ 보호(안락함, 편안함) ⑥ 자율성","frequency":2,"recent":false,"expected":false,"importance":0,"category":"상담이론","searchText":"직업적응 이론(twa)에서 중요하게 다루는 직업가치 6가지를 쓰시오. ① 지위 ② 성취 ③ 이타심 ④ 안정성 ⑤ 보호(안락함, 편안함) ⑥ 자율성 상담이론 2022년 3회/2024년 1회"},{"id":"old-7","sourceGroup":"2019~2024","source":"2022년 3회","year":2022,"number":7,"question":"진로선택이론 중 사회학습이론에서 크롬볼츠(Krumboltz)가 제시한 진로선택에 영향을 주는 요인 4가지를 쓰시오.","answer":"① 유전적 요인과 특별한 능력 ② 환경적 조건과 사건 ③ 학습경험 ④ 과제 접근 기술","frequency":1,"recent":false,"expected":false,"importance":0,"category":"상담이론","searchText":"진로선택이론 중 사회학습이론에서 크롬볼츠(krumboltz)가 제시한 진로선택에 영향을 주는 요인 4가지를 쓰시오. ① 유전적 요인과 특별한 능력 ② 환경적 조건과 사건 ③ 학습경험 ④ 과제 접근 기술 상담이론 2022년 3회"},{"id":"old-8","sourceGroup":"2019~2024","source":"2022년 3회/2020년 2회/2024년 1회","year":2024,"number":8,"question":"규준 제작 시 사용되는 확률표집방법 3가지를 쓰고 설명하시오.","answer":"① 단순 무선 표집 : 구성원들에게 번호를 부여하고 무작위로 번호를 뽑아 표집하는 방법.\n모집단의 구성원이 표본에 속할 확률이 동일한 표집방법\n② 층화표집 : 모집단이 서로 이질적인 하위 집단으로 구성된 경우 각각의 하위 집단에서 표집하여 추출하는 방법\n③ 군집표집 : 모집단이 서로 동질적인 하위 집단으로 구성된 경우에 한 집단 자체를 표본으로 추출하는 방법","frequency":3,"recent":false,"expected":false,"importance":0,"category":"심리검사·통계","searchText":"규준 제작 시 사용되는 확률표집방법 3가지를 쓰고 설명하시오. ① 단순 무선 표집 : 구성원들에게 번호를 부여하고 무작위로 번호를 뽑아 표집하는 방법.\n모집단의 구성원이 표본에 속할 확률이 동일한 표집방법\n② 층화표집 : 모집단이 서로 이질적인 하위 집단으로 구성된 경우 각각의 하위 집단에서 표집하여 추출하는 방법\n③ 군집표집 : 모집단이 서로 동질적인 하위 집단으로 구성된 경우에 한 집단 자체를 표본으로 추출하는 방법 심리검사·통계 2022년 3회/2020년 2회/2024년 1회"},{"id":"old-9","sourceGroup":"2019~2024","source":"2024년 2회","year":2024,"number":9,"question":"모집단에서 규준 집단을 구성하기 위한 표본 추출방법은 크게 확률표집과 비확률표집으로 구분할 수 있다. 이 중 비확률표집방법 3가지를\n쓰고 각각에 대해 설명하시오.","answer":"① 편의표집(임의표집) : 조사자가 손쉽게 이용 가능한 대상을 선택하는 방법\n② 판단표집(유의표집, 의도적 표집) : 조사자가 의도적으로 중요한 정보를 가지고 있어 조사에 적합하다고 판단된 대상자들을 선택하는 방법\n③ 눈덩이 표집(누적표집) : 연구대상자에 대한 사전 정보가 없는 경우 사용하는 방법으로 초기 조사 대상자가 추가 대상자를 추천하는\n방식으로 표본을 확장하는 방법\n④ 할당표집 : 조사 대상의 특성이 이미 구체적으로 결정된 경우 사용하는 방법으로 모집단을 하위 집단으로 나눈 후, 각 하위 집단에서\n표본을 할당하여 선택하는 방법","frequency":1,"recent":false,"expected":false,"importance":0,"category":"심리검사·통계","searchText":"모집단에서 규준 집단을 구성하기 위한 표본 추출방법은 크게 확률표집과 비확률표집으로 구분할 수 있다. 이 중 비확률표집방법 3가지를\n쓰고 각각에 대해 설명하시오. ① 편의표집(임의표집) : 조사자가 손쉽게 이용 가능한 대상을 선택하는 방법\n② 판단표집(유의표집, 의도적 표집) : 조사자가 의도적으로 중요한 정보를 가지고 있어 조사에 적합하다고 판단된 대상자들을 선택하는 방법\n③ 눈덩이 표집(누적표집) : 연구대상자에 대한 사전 정보가 없는 경우 사용하는 방법으로 초기 조사 대상자가 추가 대상자를 추천하는\n방식으로 표본을 확장하는 방법\n④ 할당표집 : 조사 대상의 특성이 이미 구체적으로 결정된 경우 사용하는 방법으로 모집단을 하위 집단으로 나눈 후, 각 하위 집단에서\n표본을 할당하여 선택하는 방법 심리검사·통계 2024년 2회"},{"id":"old-10","sourceGroup":"2019~2024","source":"2022년 3회/2019년 2회","year":2022,"number":10,"question":"측정의 신뢰성을 높이기 위해서는 측정오차를 최소로 줄여야 한다. 측정오차를 줄이기 위한 구체적인 방법 6가지","answer":"① 검사 문항의 수를 늘린다.\n② 신뢰도에 나쁜 영향을 주는 문항을 제거한다.\n③ 표준화된 검사를 사용한다.\n④ 균일한 검사 조건을 유지한다.\n⑤ 검사 실시와 채점 방식을 표준화 한다.\n⑥ 적절한 표본을 추출하여 측정한다.","frequency":2,"recent":false,"expected":false,"importance":0,"category":"심리검사·통계","searchText":"측정의 신뢰성을 높이기 위해서는 측정오차를 최소로 줄여야 한다. 측정오차를 줄이기 위한 구체적인 방법 6가지 ① 검사 문항의 수를 늘린다.\n② 신뢰도에 나쁜 영향을 주는 문항을 제거한다.\n③ 표준화된 검사를 사용한다.\n④ 균일한 검사 조건을 유지한다.\n⑤ 검사 실시와 채점 방식을 표준화 한다.\n⑥ 적절한 표본을 추출하여 측정한다. 심리검사·통계 2022년 3회/2019년 2회"},{"id":"old-11","sourceGroup":"2019~2024","source":"2022년 3회/2022년 2회/2018년 3회","year":2022,"number":11,"question":"심리검사에서 준거 타당도 계수의 크기에 영향을 미치는 요인 3가지만 쓰고, 각각에 대해 설명하시오.","answer":"① 표집오차 : 표집집단이 전체 모집단을 대표하지 못하게 되어 발생하는 오차.\n② 준거측정치의 신뢰도 : 준거측정치의 신뢰도가 낮으면 검사의 타당도도 낮아짐.\n③ 준거측정치의 타당도 : 준거를 측정하는 도구가 얼마나 해당 준거를 잘 반영하고 있는지가 영향을 미친다.\n④ 범위 제한 : 준거타당도 계산을 위해 얻은 자료들이 검사점수와 준거점수의 전체 범위를 포괄하지 않고 일부 범위만을\n포괄하는 경우에 계산된 상관계수는 실제 상관계수보다 작아진다.","frequency":3,"recent":false,"expected":false,"importance":0,"category":"심리검사·통계","searchText":"심리검사에서 준거 타당도 계수의 크기에 영향을 미치는 요인 3가지만 쓰고, 각각에 대해 설명하시오. ① 표집오차 : 표집집단이 전체 모집단을 대표하지 못하게 되어 발생하는 오차.\n② 준거측정치의 신뢰도 : 준거측정치의 신뢰도가 낮으면 검사의 타당도도 낮아짐.\n③ 준거측정치의 타당도 : 준거를 측정하는 도구가 얼마나 해당 준거를 잘 반영하고 있는지가 영향을 미친다.\n④ 범위 제한 : 준거타당도 계산을 위해 얻은 자료들이 검사점수와 준거점수의 전체 범위를 포괄하지 않고 일부 범위만을\n포괄하는 경우에 계산된 상관계수는 실제 상관계수보다 작아진다. 심리검사·통계 2022년 3회/2022년 2회/2018년 3회"},{"id":"old-12","sourceGroup":"2019~2024","source":"2022년 3회/2019년 2회/2021년 2회/2024년 1회","year":2024,"number":12,"question":"심리검사에는 선다형이나 ‘예, 아니오’등 객관적 형태의 자기 보고형 검사 (설문지 형태 검사)가 가장 많이 사용된다.\n이런 형태의 검사가 가지는 장점 5가지를 쓰시오.","answer":"검사 실시 시간이 짧다. / 검사 비용이 경제적이다. / 검사 결과에 대한 해석이 용이하다.\n신뢰도와 타당도가 높은 편이다. / 검사 환경의 영향을 적게 받는다.\n(♣ 투사적 검사와 비교 _ 투사적 검사는 신뢰도와 타당도 검증 어려움 / 채점에 높은 전문성 요구 / 검사자나 상황의 영향을 많이 받는다.)","frequency":4,"recent":false,"expected":false,"importance":0,"category":"심리검사·통계","searchText":"심리검사에는 선다형이나 ‘예, 아니오’등 객관적 형태의 자기 보고형 검사 (설문지 형태 검사)가 가장 많이 사용된다.\n이런 형태의 검사가 가지는 장점 5가지를 쓰시오. 검사 실시 시간이 짧다. / 검사 비용이 경제적이다. / 검사 결과에 대한 해석이 용이하다.\n신뢰도와 타당도가 높은 편이다. / 검사 환경의 영향을 적게 받는다.\n(♣ 투사적 검사와 비교 _ 투사적 검사는 신뢰도와 타당도 검증 어려움 / 채점에 높은 전문성 요구 / 검사자나 상황의 영향을 많이 받는다.) 심리검사·통계 2022년 3회/2019년 2회/2021년 2회/2024년 1회"},{"id":"old-13","sourceGroup":"2019~2024","source":"2019년 3회","year":2019,"number":13,"question":"심리검사 중 선다형이나 '예', '아니오' 등 객관식 형태의 자기 보고형 검사(설문지 형태의 검사)가 가지는 단점 3가지","answer":"① 내담자가 문항의 의도를 파악하여 방어를 할 수 있다.\n② 내담자의 반응이 제한적이어서 다양한 반응의 관찰이 어렵고 무의식까지 관찰할 수 없다.\n③ 내담자의 반응 경향성에 따라 답변이 오염될 수 있다.","frequency":1,"recent":false,"expected":false,"importance":0,"category":"심리검사·통계","searchText":"심리검사 중 선다형이나 '예', '아니오' 등 객관식 형태의 자기 보고형 검사(설문지 형태의 검사)가 가지는 단점 3가지 ① 내담자가 문항의 의도를 파악하여 방어를 할 수 있다.\n② 내담자의 반응이 제한적이어서 다양한 반응의 관찰이 어렵고 무의식까지 관찰할 수 없다.\n③ 내담자의 반응 경향성에 따라 답변이 오염될 수 있다. 심리검사·통계 2019년 3회"},{"id":"old-14","sourceGroup":"2019~2024","source":"2020년 3회","year":2020,"number":14,"question":"투사적 검사의 장점과 단점을 각 3가지씩 쓰시오.","answer":"① 장점 : 수검자의 방어를 무력화 할 수 있다. / 수검자의 무의식을 이끌어 낼 수 있다. / 수검자의 다양한 반응을 관찰할 수 있다.\n② 단점 : 검사 결과의 해석 위해 고도로 훈련된 전문가가 필요 / 검사의 시행에 비용과 시간이 많이 든다. / 신뢰도와 타당도 낮음.","frequency":1,"recent":false,"expected":false,"importance":0,"category":"심리검사·통계","searchText":"투사적 검사의 장점과 단점을 각 3가지씩 쓰시오. ① 장점 : 수검자의 방어를 무력화 할 수 있다. / 수검자의 무의식을 이끌어 낼 수 있다. / 수검자의 다양한 반응을 관찰할 수 있다.\n② 단점 : 검사 결과의 해석 위해 고도로 훈련된 전문가가 필요 / 검사의 시행에 비용과 시간이 많이 든다. / 신뢰도와 타당도 낮음. 심리검사·통계 2020년 3회"},{"id":"old-15","sourceGroup":"2019~2024","source":"2022년 3회","year":2022,"number":15,"question":"진로 성숙도 검사(CMI)의 태도 척도와 능력 척도를 각각 3가지씩 쓰시오.","answer":"① 태도척도 : 진로 결정성, 참여도, 독립성, 성향, 타협성\n② 능력척도 : 자기평가, 직업정보, 목표선정, 계획, 문제해결","frequency":1,"recent":false,"expected":false,"importance":0,"category":"심리검사·통계","searchText":"진로 성숙도 검사(cmi)의 태도 척도와 능력 척도를 각각 3가지씩 쓰시오. ① 태도척도 : 진로 결정성, 참여도, 독립성, 성향, 타협성\n② 능력척도 : 자기평가, 직업정보, 목표선정, 계획, 문제해결 심리검사·통계 2022년 3회"},{"id":"old-16","sourceGroup":"2019~2024","source":"2020년 3회","year":2020,"number":16,"question":"CMI검사에서 능력척도 3가지를 쓰고 설명하시오.","answer":"① 자기평가 : 자신의 능력과 성격, 흥미를 이해하는 능력을 의미한다.\n② 직업정보 : 관심이 있는 직업에 대해 얼마나 정보를 가지고 있고, 수집할 수 있는지에 대한 능력이다.\n③ 목표선정 : 자신이 갖고 있는 정보와 직업세계를 연결하여 직업 목표를 선정하는 능력이다.","frequency":1,"recent":false,"expected":false,"importance":0,"category":"심리검사·통계","searchText":"cmi검사에서 능력척도 3가지를 쓰고 설명하시오. ① 자기평가 : 자신의 능력과 성격, 흥미를 이해하는 능력을 의미한다.\n② 직업정보 : 관심이 있는 직업에 대해 얼마나 정보를 가지고 있고, 수집할 수 있는지에 대한 능력이다.\n③ 목표선정 : 자신이 갖고 있는 정보와 직업세계를 연결하여 직업 목표를 선정하는 능력이다. 심리검사·통계 2020년 3회"},{"id":"old-17","sourceGroup":"2019~2024","source":"2019년 1회/2020년 4회/2022년 3회/2021년 1회/2024년 2회","year":2024,"number":17,"question":"직무분석방법 중 최초 분석법에 해당하는 방법을 4가지만 쓰고 각각에 대해 설명하시오.","answer":"① 체험법 : 직무 분석자가 직접 직무를 체험하여 자료를 얻는 방법이다.\n② 면접법 : 직무 분석자가 직무 담당자와 면접을 진행하여 자료를 얻는 방법이다.\n③ 설문지법 : 직무 담당자에게 설문지를 작성하도록 하여 자료를 얻는 방법이다.\n④ 관찰법 : 직무 분석자가 현장에서 직무 담당자를 관찰하여 자료를 얻는 방법이다.\n⑤ 결정적 사건법 : 직무 담당자가 직무에서 크게 성공하거나 실패한 경우와 관련된 자료를 수집하여 분석하는 방법이다.\n⑥ 녹화법 : 작업 장면을 녹화하여 직무에 관한 자료를 얻는 방법이다.\n⑦ 작업일지법 : 직무 담당자가 작성한 작업 일지를 바탕으로 직무에 관한 자료를 얻는 방법이다.","frequency":5,"recent":false,"expected":false,"importance":0,"category":"직무분석·경력개발","searchText":"직무분석방법 중 최초 분석법에 해당하는 방법을 4가지만 쓰고 각각에 대해 설명하시오. ① 체험법 : 직무 분석자가 직접 직무를 체험하여 자료를 얻는 방법이다.\n② 면접법 : 직무 분석자가 직무 담당자와 면접을 진행하여 자료를 얻는 방법이다.\n③ 설문지법 : 직무 담당자에게 설문지를 작성하도록 하여 자료를 얻는 방법이다.\n④ 관찰법 : 직무 분석자가 현장에서 직무 담당자를 관찰하여 자료를 얻는 방법이다.\n⑤ 결정적 사건법 : 직무 담당자가 직무에서 크게 성공하거나 실패한 경우와 관련된 자료를 수집하여 분석하는 방법이다.\n⑥ 녹화법 : 작업 장면을 녹화하여 직무에 관한 자료를 얻는 방법이다.\n⑦ 작업일지법 : 직무 담당자가 작성한 작업 일지를 바탕으로 직무에 관한 자료를 얻는 방법이다. 직무분석·경력개발 2019년 1회/2020년 4회/2022년 3회/2021년 1회/2024년 2회"},{"id":"old-18","sourceGroup":"2019~2024","source":"2020년 1회","year":2020,"number":18,"question":"한국 직업사전의 부가직업정보 중 작업강도는 해당 직업의 직무를 수행하는 데 필요한 육체적 힘의 강도를 나타낸 것으로 5단계로\n분류하였다. 이 5단계를 쓰시오.","answer":"① 아주 가벼운 작업 ② 가벼운 작업 ③ 보통작업 ④ 힘든작업 ⑤ 아주 힘든 작업","frequency":1,"recent":false,"expected":false,"importance":0,"category":"직업정보·분류","searchText":"한국 직업사전의 부가직업정보 중 작업강도는 해당 직업의 직무를 수행하는 데 필요한 육체적 힘의 강도를 나타낸 것으로 5단계로\n분류하였다. 이 5단계를 쓰시오. ① 아주 가벼운 작업 ② 가벼운 작업 ③ 보통작업 ④ 힘든작업 ⑤ 아주 힘든 작업 직업정보·분류 2020년 1회"},{"id":"old-19","sourceGroup":"2019~2024","source":"2020년 3회","year":2020,"number":19,"question":"한국직업사전의 부가 직업정보 중 직무기능은 자료, 사람, 사물과 연관된 특성을 나타낸다.\n그 중 사물의 세부사항 5가지를 쓰시오.","answer":"① 설치 ② 정밀작업 ③ 제어조작 ④ 조작운전 ⑤ 수동조작 ⑥ 유지 ⑦ 투입 - 인출 ⑧ 단순작업","frequency":1,"recent":false,"expected":false,"importance":0,"category":"직업정보·분류","searchText":"한국직업사전의 부가 직업정보 중 직무기능은 자료, 사람, 사물과 연관된 특성을 나타낸다.\n그 중 사물의 세부사항 5가지를 쓰시오. ① 설치 ② 정밀작업 ③ 제어조작 ④ 조작운전 ⑤ 수동조작 ⑥ 유지 ⑦ 투입 - 인출 ⑧ 단순작업 직업정보·분류 2020년 3회"},{"id":"old-20","sourceGroup":"2019~2024","source":"2022년 3회","year":2022,"number":20,"question":"한국 직업사전에 수록된 부가직업정보 중 정규 교육, 숙련기간, 직무기능의 의미를 기술하시오.","answer":"① 정규교육 : 해당 직무를 수행하기 위해 필요한 정규교육 수준을 의미한다.\n② 숙련기간 : 해당 직무를 평균적인 수준으로 수행하기 위해 필요한 교육, 훈련 등의 기간을 의미한다.\n③ 직무기능 : 해당 직무를 수행하는 과정에서 자료, 사람, 사물과 맺는 관계의 특성을 의미한다.","frequency":1,"recent":false,"expected":false,"importance":0,"category":"직업정보·분류","searchText":"한국 직업사전에 수록된 부가직업정보 중 정규 교육, 숙련기간, 직무기능의 의미를 기술하시오. ① 정규교육 : 해당 직무를 수행하기 위해 필요한 정규교육 수준을 의미한다.\n② 숙련기간 : 해당 직무를 평균적인 수준으로 수행하기 위해 필요한 교육, 훈련 등의 기간을 의미한다.\n③ 직무기능 : 해당 직무를 수행하는 과정에서 자료, 사람, 사물과 맺는 관계의 특성을 의미한다. 직업정보·분류 2022년 3회"},{"id":"old-21","sourceGroup":"2019~2024","source":"2022년 2회","year":2022,"number":21,"question":"한국직업사전의 부가 직업정보 중 직무기능은 자료, 사람, 사물과 연관된 특성을 나타낸다.\n그 중 사람과 관련된 세부사항 5가지를 쓰시오. (단, 수준에 해당되는 숫자는 기재할 필요없음)","answer":"① 자문 ② 협의 ③ 교육 ④ 감독 ⑤ 오락제공 ⑥ 설득 ⑦ 말하기 - 신호 ⑧ 서비스 제공","frequency":1,"recent":false,"expected":false,"importance":0,"category":"직업정보·분류","searchText":"한국직업사전의 부가 직업정보 중 직무기능은 자료, 사람, 사물과 연관된 특성을 나타낸다.\n그 중 사람과 관련된 세부사항 5가지를 쓰시오. (단, 수준에 해당되는 숫자는 기재할 필요없음) ① 자문 ② 협의 ③ 교육 ④ 감독 ⑤ 오락제공 ⑥ 설득 ⑦ 말하기 - 신호 ⑧ 서비스 제공 직업정보·분류 2022년 2회"},{"id":"old-22","sourceGroup":"2019~2024","source":"2022년 2회/2021년 3회","year":2022,"number":22,"question":"한국직업사전의 부가 직업정보 중 직무기능은 해당 직업 종사자가 직무를 수행하는 과정에서 자료, 사람, 사물과 맺는 관련된 특성을\n나타낸다. 이 중에서 자료와 관련된 세부사항 5가지를 쓰시오.","answer":"① 종합 ② 조정 ③ 분석 ④ 수집 ⑤ 계산 ⑥ 기록 ⑦ 비교","frequency":2,"recent":false,"expected":false,"importance":0,"category":"직업정보·분류","searchText":"한국직업사전의 부가 직업정보 중 직무기능은 해당 직업 종사자가 직무를 수행하는 과정에서 자료, 사람, 사물과 맺는 관련된 특성을\n나타낸다. 이 중에서 자료와 관련된 세부사항 5가지를 쓰시오. ① 종합 ② 조정 ③ 분석 ④ 수집 ⑤ 계산 ⑥ 기록 ⑦ 비교 직업정보·분류 2022년 2회/2021년 3회"},{"id":"old-23","sourceGroup":"2019~2024","source":"2023년 2회/2020년 4회","year":2023,"number":23,"question":"한국직업사전의 부가직업 정보 중 육체활동의 구분 5가지를 쓰시오.","answer":"균형 감각 - 시각 - 청각 - 언어력 - 손사용 - 웅크림","frequency":2,"recent":false,"expected":false,"importance":0,"category":"직업정보·분류","searchText":"한국직업사전의 부가직업 정보 중 육체활동의 구분 5가지를 쓰시오. 균형 감각 - 시각 - 청각 - 언어력 - 손사용 - 웅크림 직업정보·분류 2023년 2회/2020년 4회"},{"id":"old-24","sourceGroup":"2019~2024","source":"2021년 1회/2024년 1회","year":2024,"number":24,"question":"한국직업사전에 수록된 부가 직업정보 5가지를 쓰시오.","answer":"① 작업 강도 ② 작업 환경 ③ 작업 장소 ④ 육체활동 ⑤ 정규 교육 ⑥ 숙련기간\n(IF) 설명하시오. 문제가 나올 경우,\n정규교육 - 해당 직무를 수행하는데 필요한 일반적인 교육수준\n숙련기간 - 해당 직무를 평균 수준으로 수행하기 위해 필요한 숙련기간\n직무기능 - 직무를 수행하는 과정에서 사람, 사물, 자료와 관계된 특성","frequency":2,"recent":false,"expected":false,"importance":0,"category":"직업정보·분류","searchText":"한국직업사전에 수록된 부가 직업정보 5가지를 쓰시오. ① 작업 강도 ② 작업 환경 ③ 작업 장소 ④ 육체활동 ⑤ 정규 교육 ⑥ 숙련기간\n(if) 설명하시오. 문제가 나올 경우,\n정규교육 - 해당 직무를 수행하는데 필요한 일반적인 교육수준\n숙련기간 - 해당 직무를 평균 수준으로 수행하기 위해 필요한 숙련기간\n직무기능 - 직무를 수행하는 과정에서 사람, 사물, 자료와 관계된 특성 직업정보·분류 2021년 1회/2024년 1회"},{"id":"old-25","sourceGroup":"2019~2024","source":"2023년 1회","year":2023,"number":25,"question":"한국직업사전의 부가 직업정보의 직무기능 중 자료에 대한 오른쪽 설명을 보고 해당하는 기능을 왼쪽 빈칸에 쓰시오.","answer":"기능\n설명\n조정\n데이터의 분석에 기초하여 시간, 장소, 작업순서, 활동 등을 결정한다. 결정을 실행하거나 상황을 보고한다.\n분석\n조사하고 평가한다. 평가와 관련된 대안적 행위의 제시가 빈번하게 포함된다.\n수집\n자료, 사람, 사물에 관한 정보를 수집, 대조, 분류한다. 정보와 관련하여 규정된 활동의 수행 및 보고가 자주 포함된다.\n계산\n사칙연산을 실시하고 사칙연산과 관련하여 규정된 활동을 수행하거나 보고한다. 수를 세는 것은 포함되지 않는다.\n기록\n데이터를 옮겨 적거나 입력하거나 표시한다.\n비교\n자료, 사람, 사물의 쉽게 관찰되는 기능적, 구조적, 조합적 특성을(유사성 또는 표준과의 차이) 판단한다.","frequency":1,"recent":false,"expected":false,"importance":0,"category":"노동시장·고용","searchText":"한국직업사전의 부가 직업정보의 직무기능 중 자료에 대한 오른쪽 설명을 보고 해당하는 기능을 왼쪽 빈칸에 쓰시오. 기능\n설명\n조정\n데이터의 분석에 기초하여 시간, 장소, 작업순서, 활동 등을 결정한다. 결정을 실행하거나 상황을 보고한다.\n분석\n조사하고 평가한다. 평가와 관련된 대안적 행위의 제시가 빈번하게 포함된다.\n수집\n자료, 사람, 사물에 관한 정보를 수집, 대조, 분류한다. 정보와 관련하여 규정된 활동의 수행 및 보고가 자주 포함된다.\n계산\n사칙연산을 실시하고 사칙연산과 관련하여 규정된 활동을 수행하거나 보고한다. 수를 세는 것은 포함되지 않는다.\n기록\n데이터를 옮겨 적거나 입력하거나 표시한다.\n비교\n자료, 사람, 사물의 쉽게 관찰되는 기능적, 구조적, 조합적 특성을(유사성 또는 표준과의 차이) 판단한다. 노동시장·고용 2023년 1회"},{"id":"old-26","sourceGroup":"2019~2024","source":"2024년 2회","year":2024,"number":26,"question":"한국직업사전에서 제공하는 부가직업정보중 직무기능은 해당 직무를 수행하는 작업자가 자료, 사람, 사물과 맺는 관계를 나타내는\n것이다. 아래 표를 보고 빈칸에 알맞은 기능을 쓰시오.\n수준\n자료(Data)\n사람(People)\n사물(Thing)\n0\n종합","answer":"③ 자문\n설치\n1\n① 조정\n협의\n정밀작업\n2\n분석\n교육\n⑤ 제어조작\n3\n수집\n④ 감독\n조작운전\n4\n계산\n오락제공\n⑥ 수동조작\n5\n② 기록\n설득\n유지\n6\n비교\n말하기-신호\n투입-인출\n7\n서비스제공\n단순작업","frequency":1,"recent":false,"expected":false,"importance":0,"category":"직업정보·분류","searchText":"한국직업사전에서 제공하는 부가직업정보중 직무기능은 해당 직무를 수행하는 작업자가 자료, 사람, 사물과 맺는 관계를 나타내는\n것이다. 아래 표를 보고 빈칸에 알맞은 기능을 쓰시오.\n수준\n자료(data)\n사람(people)\n사물(thing)\n0\n종합 ③ 자문\n설치\n1\n① 조정\n협의\n정밀작업\n2\n분석\n교육\n⑤ 제어조작\n3\n수집\n④ 감독\n조작운전\n4\n계산\n오락제공\n⑥ 수동조작\n5\n② 기록\n설득\n유지\n6\n비교\n말하기-신호\n투입-인출\n7\n서비스제공\n단순작업 직업정보·분류 2024년 2회"},{"id":"old-27","sourceGroup":"2019~2024","source":"2022년 2회","year":2022,"number":27,"question":"한국직업사전의 작업강도 빈칸채우기","answer":"1)아주 가벼운 작업 : 최고( 4 )kg의 물건을 들어올리고 때때로 장부 대장 소도구등을 들어올리거나 운반한다\n2)보통 작업:최고( 20 )kg의 물건을 들어올리고 ( 10 )kg정도의 빈번히 들어 올리거나 운반한다\n3)힘든 작업: 최고( 40 )kg의 물건을 들어올리고 ( 20 )kg정도의 빈번히 들어 올리거나 운반한다","frequency":1,"recent":false,"expected":false,"importance":0,"c  중 포괄적 업무 분류 원칙 3가지를 설명하시오.","answer":"① 주된 직무 우선 원칙 : 여러 직무를 수행하는 경우 가장 주된 직업으로 분류한다.\n② 최상급 직능 수준 우선 원칙 : 가장 높은 직무능력을 필요로 하는 일로 분류한다.\n③ 생산업무 우선 원칙 : 생산과 공급이 함께 이루어지는 경우 생산으로 분류한다.","frequency":4,"recent":false,"expected":false,"importance":0,"category":"직업정보·분류","searchText":"한국표준직업분류의 분류 원칙 중 포괄적 업무 분류 원칙 3가지를 설명하시오. ① 주된 직무 우선 원칙 : 여러 직무를 수행하는 경우 가장 주된 직업으로 분류한다.\n② 최상급 직능 수준 우선 원칙 : 가장 높은 직무능력을 필요로 하는 일로 분류한다.\n③ 생산업무 우선 원칙 : 생산과 공급이 함께 이루어지는 경우 생산으로 분류한다. 직업정보·분류 2023년 1회/2020년 4회/2020년 3회/2020년 2회"},{"id":"old-35","sourceGroup":"2019~2024","source":"2022년 3회/2021년 2회/2023년 2회","year":2023,"number":35,"question":"한국표준산업분류에서 산업분류의 결정 방법 중 생산단위 활동형태는 주된 산업활동, 부차적 산업활동, 보조활동으로 구분할 수 있다.\n이 3가지를 각각 설명하시오.","answer":"① 주된 산업활동 : 생산된 재화 또는 제공된 서비스 중에서 부가가치가 가장 큰 활동을 말한다.\n② 부차적 산업활동 : 주된 산업활동 이외의 재화 생산 및 서비스 제공 활동을 말한다.\n③ 보조활동 : 회계, 창고, 운송 등과 같이 주된 산업활동과 부차적 산업활동을 지원하는 활동을 말한다.","frequency":3,"recent":false,"expected":false,"importance":0,"category":"직업정보·분류","searchText":"한국표준산업분류에서 산업분류의 결정 방법 중 생산단위 활동형태는 주된 산업활동, 부차적 산업활동, 보조활동으로 구분할 수 있다.\n이 3가지를 각각 설명하시오. ① 주된 산업활동 : 생산된 재화 또는 제공된 서비스 중에서 부가가치가 가장 큰 활동을 말한다.\n② 부차적 산업활동 : 주된 산업활동 이외의 재화 생산 및 서비스 제공 활동을 말한다.\n③ 보조활동 : 회계, 창고, 운송 등과 같이 주된 산업활동과 부차적 산업활동을 지원하는 활동을 말한다. 직업정보·분류 2022년 3회/2021년 2회/2023년 2회"},{"id":"old-36","sourceGroup":"2019~2024","source":"2022 2회/2021년 1회/2020년 2회/2020년 1회/2024년 2회/2024년 1회","year":2024,"number":36,"question":"한국 표준산업분류 개요 중 산업, 산업활동, 산업활동의 범위, 산업분류, 통계단위의 정의를 쓰시오.","answer":"① 산업 : 유사한 산업활동에 종사하는 생산단위의 집합\n② 산업활동: 각 생산단위가 노동, 자본, 자원 등을 투입하여 재화 또는 서비스를 생산, 제공하는 일련의 활동과정\n③ 산업활동의 범위 : 영리, 비영리 활동은 포함하지만 가사활동은 포함되지 않는다.\n④ 산업분류 : 생산단위가 수행하는 생산활동을 그 유사성에 따라 체계적으로 분류한 것\n⑤ 통계단위 : 생산단위의 활동에 관한 통계작성을 위하여 필요한 정보를 수집, 분석할 대상이 되는 관찰 또는 분석 단위를 말한다. 생산활동과\n장소의 동질성의 차이에 따라 기업체 단위, 지역 단위, 활동유형 단위, 사업체 단위로 구분된다.","frequency":5,"recent":false,"expected":false,"importance":0,"category":"노동시장·고용","searchText":"한국 표준산업분류 개요 중 산업, 산업활동, 산업활동의 범위, 산업분류, 통계단위의 정의를 쓰시오. ① 산업 : 유사한 산업활동에 종사하는 생산단위의 집합\n② 산업활동: 각 생산단위가 노동, 자본, 자원 등을 투입하여 재화 또는 서비스를 생산, 제공하는 일련의 활동과정\n③ 산업활동의 범위 : 영리, 비영리 활동은 포함하지만 가사활동은 포함되지 않는다.\n④ 산업분류 : 생산단위가 수행하는 생산활동을 그 유사성에 따라 체계적으로 분류한 것\n⑤ 통계단위 : 생산단위의 활동에 관한 통계작성을 위하여 필요한 정보를 수집, 분석할 대상이 되는 관찰 또는 분석 단위를 말한다. 생산활동과\n장소의 동질성의 차이에 따라 기업체 단위, 지역 단위, 활동유형 단위, 사업체 단위로 구분된다. 노동시장·고용 2022 2회/2021년 1회/2020년 2회/2020년 1회/2024년 2회/2024년 1회"},{"id":"old-37","sourceGroup":"2019~2024","source":"2021년 2회","year":2021,"number":37,"question":"한국표준직업분류에서 직무 유사성의 판단기준 4가지를 쓰시오","answer":"지식 / 경험 / 기능 / 직무수행자가 입직하기 위해 필요한 요건","frequency":1,"recent":false,"expected":false,"importance":0,"category":"직업정보·분류","searchText":"한국표준직업분류에서 직무 유사성의 판단기준 4가지를 쓰시오 지식 / 경험 / 기능 / 직무수행자가 입직하기 위해 필요한 요건 직업정보·분류 2021년 2회"},{"id":"old-38","sourceGroup":"2019~2024","source":"2020년 4회","year":2020,"number":38,"question":"한국 표준산업분류에서 산업분류의 적용원칙을 쓰시오.","answer":"Ÿ\n산출물, 투입물, 생산공정을 모두 고려하여 분류한다.\nŸ\n대분류를 결정한 후 중, 소, 세, 세세 단위로 분류한다.\nŸ\n산업활동이 결합되어 있는 경우에는 생산단위의 주된 활동으로 분류한다.","frequency":1,"recent":false,"expected":false,"importance":0,"category":"직업정보·분류","searchText":"한국 표준산업분류에서 산업분류의 적용원칙을 쓰시오. ÿ\n산출물, 투입물, 생산공정을 모두 고려하여 분류한다.\nÿ\n대분류를 결정한 후 중, 소, 세, 세세 단위로 분류한다.\nÿ\n산업활동이 결합되어 있는 경우에는 생산단위의 주된 활동으로 분류한다. 직업정보·분류 2020년 4회"},{"id":"old-39","sourceGroup":"2019~2024","source":"2023년 3회","year":2023,"number":39,"question":"한국 표준산업분류에서 산업 결정방법 4가지를 쓰시오.","answer":"Ÿ\n생산단위의 산업활동은 그 생산단위가 수행하는 주된 산업활동의 종류에 따라 결정된다. 이러한 주된 산업 활동은 산출문에\n대한 부가가치의 크기에 따라 결정되어야 하나, 부가가치 측정이 어려운 경우에는 산출액에 의하여 결정한다.\nŸ\n상기 원칙에 따라 결정하는 것이 적합하지 않을 경우에는 그 해당 활동의 종업원 수 및 노동시간, 임금 및 급여액 또는\n설비의 정도에 의하여 결정한다.\nŸ\n계절에 따라 정기적으로 산업을 달리하는 사업체의 경우에는 조사시점에서 경영하는 사업과는 관계 없이 조사대상 기간\n중 산출액이 많았던 활동에 의하여 분류한다.\nŸ\n휴업 중 또는 자산을 청산 중인 사업체의 산업은 영업 중 또는 청산을 시작하기 이전의 산업활동에 의하여 결정하며,\n설립 중인 사업체는 개시하는 산업활동에 따라 결정한다.\nŸ\n단일사업체의 보조 단위는 그 사업체의 일개 부서로 포함하며, 여러 사업체를 관리하는 중앙 보조단위는 별도의 사업체로 처리한다.","frequency":1,"recent":false,"expected":false,"importance":0,"category":"노동시장·고용","searchText":"한국 표준산업분류에서 산업 결정방법 4가지를 쓰시오. ÿ\n생산단위의 산업활동은 그 생산단위가 수행하는 주된 산업활동의 종류에 따라 결정된다. 이러한 주된 산업 활동은 산출문에\n대한 부가가치의 크기에 따라 결정되어야 하나, 부가가치 측정이 어려운 경우에는 산출액에 의하여 결정한다.\nÿ\n상기 원칙에 따라 결정하는 것이 적합하지 않을 경우에는 그 해당 활동의 종업원 수 및 노동시간, 임금 및 급여액 또는\n설비의 정도에 의하여 결정한다.\nÿ\n계절에 따라 정기적으로 산업을 달리하는 사업체의 경우에는 조사시점에서 경영하는 사업과는 관계 없이 조사대상 기간\n중 산출액이 많았던 활동에 의하여 분류한다.\nÿ\n휴업 중 또는 자산을 청산 중인 사업체의 산업은 영업 중 또는 청산을 시작하기 이전의 산업활동에 의하여 결정하며,\n설립 중인 사업체는 개시하는 산업활동에 따라 결정한다.\nÿ\n단일사업체의 보조 단위는 그 사업체의 일개 부서로 포함하며, 여러 사업체를 관리하는 중앙 보조단위는 별도의 사업체로 처리한다. 노동시장·고용 2023년 3회"},{"id":"old-40","sourceGroup":"2019~2024","source":"2023년 2회/2021년 1회","year":2023,"number":40,"question":"다음은 한국표준직업분류와 직능 수준의 관계를 나타낸다. ( ) 에 알맞은 숫자를 쓰시오.","answer":"관리자는 제 (4)직능 수준 혹은 제 (3) 직능 수준 필요.\n판매종사자는 제 (2) 직능 수준필요\n장치, 기계조작 및 조립 종사자는 제 (2) 직능 수준 필요\n군인은 제 (2)직능 수준 이상 필요\n단순 노무직은 제 (1) 직능 수준","frequency":2,"recent":false,"expected":false,"importance":0,"category":"직업정보·분류","searchText":"다음은 한국표준직업분류와 직능 수준의 관계를 나타낸다. ( ) 에 알맞은 숫자를 쓰시오. 관리자는 제 (4)직능 수준 혹은 제 (3) 직능 수준 필요.\n판매종사자는 제 (2) 직능 수준필요\n장치, 기계조작 및 조립 종사자는 제 (2) 직능 수준 필요\n군인은 제 (2)직능 수준 이상 필요\n단순 노무직은 제 (1) 직능 수준 직업정보·분류 2023년 2회/2021년 1회"},{"id":"old-41","sourceGroup":"2019~2024","source":"2022년 3회/2020년 1회/2019년 3회","year":2022,"number":41,"question":"내부 노동시장의 형성 요인과 장점을 각각 3가지씩 쓰시오.","answer":"① 내부 노동시장의 형성 요인 : 숙련의 특수성, 현장훈련, 기업 내의 관습\n② 내부 노동시장의 장점 : 우수한 인적자원을 확보하고 유지할 수 있다.\n승진, 배치전환 등을 통하여 동기를 유발할 수 있다.\n인적자원 확보 및 동기유발을 통해 생산성이 향상된다.","frequency":3,"recent":false,"expected":false,"importance":0,"category":"노동시장·고용","searchText":"내부 노동시장의 형성 요인과 장점을 각각 3가지씩 쓰시오. ① 내부 노동시장의 형성 요인 : 숙련의 특수성, 현장훈련, 기업 내의 관습\n② 내부 노동시장의 장점 : 우수한 인적자원을 확보하고 유지할 수 있다.\n승진, 배치전환 등을 통하여 동기를 유발할 수 있다.\n인적자원 확보 및 동기유발을 통해 생산성이 향상된다. 노동시장·고용 2022년 3회/2020년 1회/2019년 3회"},{"id":"old-42","sourceGroup":"2019~2024","source":"2023년 2회","year":2023,"number":42,"question":"내부 노동시장의 형성 요인을 3가지 쓰고 각각에 대해 설명하시오.","answer":"① 숙련의 특수성 : 기업에서 필요로 하는 숙련도는 기록이나 문서로는 전수가 불가능하여 축적됨에 따라 내부 노동시장을 형성하게 된다.\n② 현장훈련 : 문서화 되지 않은 노하우가 실제 현장에서만 전수되어 내부 노동시장을 형성한다.\n③ 관습 : 기업 내의 고유한 관습은 다르기업과 차별화된 근로조건, 근로환경을 만들어 내부 노동시장을 형성하게 한다.","frequency":1,"recent":false,"expected":false,"importance":0,"category":"노동시장·고용","searchText":"내부 노동시장의 형성 요인을 3가지 쓰고 각각에 대해 설명하시오. ① 숙련의 특수성 : 기업에서 필요로 하는 숙련도는 기록이나 문서로는 전수가 불가능하여 축적됨에 따라 내부 노동시장을 형성하게 된다.\n② 현장훈련 : 문서화 되지 않은 노하우가 실제 현장에서만 전수되어 내부 노동시장을 형성한다.\n③ 관습 : 기업 내의 고유한 관습은 다르기업과 차별화된 근로조건, 근로환경을 만들어 내부 노동시장을 형성하게 한다. 노동시장·고용 2023년 2회"},{"id":"old-43","sourceGroup":"2019~2024","source":"2022년 3회","year":2022,"number":43,"question":"산업별로 임금격차가 발생하는 원인 4가지를 쓰시오.","answer":"① 지리적 요인 ② 산업의 종류 ③ 노동조합의 존재여부 ④ 보상적 임금 ⑤ 노동 생산성의 차이","frequency":1,"recent":false,"expected":false,"importance":0,"category":"노동시장·고용","searchText":"산업별로 임금격차가 발생하는 원인 4가지를 쓰시오. ① 지리적 요인 ② 산업의 종류 ③ 노동조합의 존재여부 ④ 보상적 임금 ⑤ 노동 생산성의 차이 노동시장·고용 2022년 3회"},{"id":"old-44","sourceGroup":"2019~2024","source":"2019년 3회","year":2019,"number":44,"question":"산업별로 임금격차가 발생하는 원인 3가지를 쓰고 설명하시오.","answer":"① 노동조합의 존재 여부 : 강력한 노동조합이 존재하는 산업은 그렇지 않은 산업에 비해 급여가 높기 때문\n② 보상적 임금 : 근무 환경이나 조건이 열악한 산업의 경우 이에 대하여 금전적으로 보상이 이루어 지게 되므로\n③ 노동생산성의 차이 : 노동생산성이 높은 산업은 그렇지 못한 산업에 비해 임금이 높기 때문","frequency":1,"recent":false,"expected":false,"importance":0,"category":"노동시장·고용","searchText":"산업별로 임금격차가 발생하는 원인 3가지를 쓰고 설명하시오. ① 노동조합의 존재 여부 : 강력한 노동조합이 존재하는 산업은 그렇지 않은 산업에 비해 급여가 높기 때문\n② 보상적 임금 : 근무 환경이나 조건이 열악한 산업의 경우 이에 대하여 금전적으로 보상이 이루어 지게 되므로\n③ 노동생산성의 차이 : 노동생산성이 높은 산업은 그렇지 못한 산업에 비해 임금이 높기 때문 노동시장·고용 2019년 3회"},{"id":"old-45","sourceGroup":"2019~2024","source":"2022년 3회","year":2022,"number":45,"question":"인터넷을 이용한 사이버상담의 필요성을 6가지 쓰시오.","answer":"① 접근이 용이하다.\n② 익명성이 보장되어 솔직한 표현이 가능하다.\n③ 직접 대면하는 것이 아니므로 심리적인 부담이 덜하다.\n④ 상담 중 자료의 탐색이 용이하다.\n⑤ 가명을 이용하여 상담 사례를 소개하는 것이 가능하다.\n⑥ 내담자 주도로 자기 성찰 능력을 기를 수 있다.","frequency":1,"recent":false,"expected":false,"importance":0,"category":"상담실무·기법","searchText":"인터넷을 이용한 사이버상담의 필요성을 6가지 쓰시오. ① 접근이 용이하다.\n② 익명성이 보장되어 솔직한 표현이 가능하다.\n③ 직접 대면하는 것이 아니므로 심리적인 부담이 덜하다.\n④ 상담 중 자료의 탐색이 용이하다.\n⑤ 가명을 이용하여 상담 사례를 소개하는 것이 가능하다.\n⑥ 내담자 주도로 ","frequency":5,"recent":false,"expected":false,"importance":0,"category":"심리검사·통계","searchText":"집단 내 규준 3가지를 쓰고 설명하시오. ① 백분위 점수 : 개인이 집단에서 차지하는 상대적 위치이다.\n100개의 동일한 구간으로 나누어 개인의 점수가 어디에 속하는 지를 측정한다.\n② 표준 점수 : 평균으로부터 떨어진 거리를 측정한다.\n③ 표준 등급 : 원점수를 9개의 구간으로 나누어, 각각 해당하는 구간이 어디에 속하는지 측정한다. 심리검사·통계 2023년 2회/2023년 1회/2021년 2회/2020년 1회/2019년 1회/2024년년 2회"},{"id":"old-56","sourceGroup":"2019~2024","source":"2021년 3회/2021년 1회/2019년 2회","year":2021,"number":56,"question":"심리검사는 사용목적에 따라 규준 참조 검사와 준거 참조 검사로 구분할 수 있다. 각각 예를 들어 설명하시오.","answer":"① 규준참조검사 - 개인의 점수를 다른 사람의 점수와 비교하여 평가하는 상대평가이다. 그 예로는 각종 심리검사가 있다.\n② 준거참조검사 - 개인의 점수를 기준 점수와 비교하여 평가하는 절대평가이다. 그 예로는 국가 자격시험이 있다.","frequency":3,"recent":false,"expected":false,"importance":0,"category":"심리검사·통계","searchText":"심리검사는 사용목적에 따라 규준 참조 검사와 준거 참조 검사로 구분할 수 있다. 각각 예를 들어 설명하시오. ① 규준참조검사 - 개인의 점수를 다른 사람의 점수와 비교하여 평가하는 상대평가이다. 그 예로는 각종 심리검사가 있다.\n② 준거참조검사 - 개인의 점수를 기준 점수와 비교하여 평가하는 절대평가이다. 그 예로는 국가 자격시험이 있다. 심리검사·통계 2021년 3회/2021년 1회/2019년 2회"},{"id":"old-57","sourceGroup":"2019~2024","source":"2023년 2회/2021년 3회/2020년 2회/2024년 1회","year":2024,"number":57,"question":"직업심리검사의 신뢰도를 추정하는 방법 3가지를 쓰고 설명하시오.","answer":"① 검사 - 재검사 신뢰도 : 동일한 사람에게 동일한 검사를 시간 간격을 두고 두 번 실시하여,\n검사 점수 간의 상관관계를 통해 신뢰도를 추정하는 방법.\n② 동형 검사 신뢰도 : 신뢰도가 검증된 검사와 유사한 검사를 함께 실시하여,\n두 검사 점수 간 상관관계를 통해 신뢰도를 추정하는 방법.\n③ 반분 신뢰도 (=내적합치도) : 한 개의 검사를 두 부분으로 나누어 각 부분 간의 검사 결과를 비교하여 신뢰도를 추정하는 방법.","frequency":4,"recent":false,"expected":false,"importance":0,"category":"심리검사·통계","searchText":"직업심리검사의 신뢰도를 추정하는 방법 3가지를 쓰고 설명하시오. ① 검사 - 재검사 신뢰도 : 동일한 사람에게 동일한 검사를 시간 간격을 두고 두 번 실시하여,\n검사 점수 간의 상관관계를 통해 신뢰도를 추정하는 방법.\n② 동형 검사 신뢰도 : 신뢰도가 검증된 검사와 유사한 검사를 함께 실시하여,\n두 검사 점수 간 상관관계를 통해 신뢰도를 추정하는 방법.\n③ 반분 신뢰도 (=내적합치도) : 한 개의 검사를 두 부분으로 나누어 각 부분 간의 검사 결과를 비교하여 신뢰도를 추정하는 방법. 심리검사·통계 2023년 2회/2021년 3회/2020년 2회/2024년 1회"},{"id":"old-58","sourceGroup":"2019~2024","source":"2019년 3회/2024년 2회","year":2024,"number":58,"question":"반분 신뢰도를 추정하기 위해 사용하는 방법 3가지를 쓰고, 각각 설명하시오.","answer":"① 전후 반분법  위한 기본 상담기술 6가지를 쓰시오. 공감 / 적극적 경청 / 명료화 / 반영 / 수용 / 요약과 재진술 / 감정이입 / 환언 / 직면 상담실무·기법 2023년 1회/2020년 1회"},{"id":"old-80","sourceGroup":"2019~2024","source":"2023년 1회/2022년 1회/2024년 1회/2023년 3회","year":2024,"number":80,"question":"행동주의 직업상담의 상담기법은 크게 불안감소기법과 학습촉진기법의 유형으로 구분할 수 있다.\n각 유형별 대표적 방법을 각각 2가지씩 쓰고 설명하시오.","answer":"① 불안감소기법\n• 체계적 둔감법\n불안이나 공포를 일으키는 자극에서 이완상태를 끌어 낸 후, 작성해 놓은 불안 위계 목록에 따라 불안, 공포\n상태를 경험하게 함으로서 불안이나 공포의 영향을 감소시키는 방법. 근육 이완 훈련, 불안 위계 목록 작성,\n둔감화의 3단계로 시행된다.\n• 홍수법\n내담자가 두려워하는 자극에 장시간, 지속적으로 노출시켜 두려움을 제거하는 방법.\n• 역조건 형성\n내담자가 공포를 느꼈던 장면에 바람직한 반응을 연합시켜 부적절한 반응을 소거하는 방법.\n• 혐오치료\n내담자의 문제행동에 대해 혐오자극을 제시하여 부적절한 행동을 감소시키는 방법.\n② 학습촉진기법(적응행동 증진기법)\n• 강화\n내담자의 직업 선택이나 결정에 대해 상담자가 긍적적 또는 부정적 반응을 보임으로써 내담자의 바람직한\n직업결정을 촉진하는 방법.\n• 대리학습(모델링)\n다른 사람들의 진로 결정 행동 및 결과 등을 관찰하도록 하여 내담자의 의사결정 학습을 촉진하는 방법.\n• 변별학습\n상이한 둘 이상의 자극을 구별하게 하는 학습으로, 검사도구 등을 사용하여\n직업선택, 직업결정 능력을 변별하고 비교해 보도록 하는 방법.","frequency":4,"recent":false,"expected":false,"importance":0,"category":"상담이론","searchText":"행동주의 직업상담의 상담기법은 크게 불안감소기법과 학습촉진기법의 유형으로 구분할 수 있다.\n각 유형별 대표적 방법을 각각 2가지씩 쓰고 설명하시오. ① 불안감소기법\n• 체계적 둔감법\n불안이나 공포를 일으키는 자극에서 이완상태를 끌어 낸 후, 작성해 놓은 불안 위계 목록에 따라 불안, 공포\n상태를 경험하게 함으로서 불안이나 공포의 영향을 감소시키는 방법. 근육 이완 훈련, 불안 위계 목록 작성,\n둔감화의 3단계로 시행된다.\n• 홍수법\n내담자가 두려워하는 자극에 장시간, 지속적으로 노출시켜 두려움을 제거하는 방법.\n• 역조건 형성\n내담자가 공포를 느꼈던 장면에 바람직한 반응을 연합시켜 부적절한 반응을 소거하는 방법.\n• 혐오치료\n내담자의 문제행동에 대해 혐오자극을 제시하여 부적절한 행동을 감소시키는 방법.\n② 학습촉진기법(적응행동 증진기법)\n• 강화\n내담자의 직업 선택이나 결정에 대해 상담자가 긍적적 또는 부정적 반응을 보임으로써 내담자의 바람직한\n직업결정을 촉진하는 방법.\n• 대리학습(모델링)\n다른 사람들의 진로 결정 행동 및 결과 등을 관찰하도록 하여 내담자의 의사결정 학습을 촉진하는 방법.\n• 변별학습\n상이한 둘 이상의 자극을 구별하게 하는 학습으로, 검사도구 등을 사용하여\n직업선택, 직업결정 능력을 변별하고 비교해 보도록 하는 방법. 상담이론 2023년 1회/2022년 1회/2024년 1회/2023년 3회"},{"id":"old-81","sourceGroup":"2019~2024","source":"2021년 2회","year":2021,"number":81,"question":"행동주의 상담의 치료기법 중 적응 행동 증진기법 3가지를 설명하시오.","answer":"① 강화 : 내담자의 행동에 대해 적절하게 긍정·부정적 반응을 보임으로써 내담자의 바람직한 행동을 강화시킨다\n② 변별학습 : 자신의 직업결정 능력 등을 검사도구를 사용해 변별하고 비교해보도록 하는 것이다\n③ 사회적 모델링과 대리학습 : 타인의 행동에 대한 관찰과 모방을 통해 내담자의 학습을 촉진한다\n④ 행동조성 : 행동을 단계별로 세분화해 단계마다 강화를 제공함으로써 학습을 촉진한다\n⑤ 상표제도(토큰경제) : 내담자의 바람직한 행동이 이뤄질 때마다 그에 상응하는 보상을 하는 것이다.","frequency":1,"recent":false,"expected":false,"importance":0,"category":"상담이론","searchText":"행동주의 상담의 치료기법 중 적응 행동 증진기법 3가지를 설명하시오. ① 강화 : 내담자의 행동에 대해 적절하게 긍정·부정적 반응을 보임으로써 내담자의 바람직한 행동을 강화시킨다\n② 변별학습 : 자신의 직업결정 능력 등을 검사도구를 사용해 변별하고 비교해보도록 하는 것이다\n③ 사회적 모델링과 대리학습 : 타인의 행동에 대한 관찰과 모방을 통해 내담자의 학습을 촉진한다\n④ 행동조성 : 행동을 단계별로 세분화해 단계마다 강화를 제공함으로써 학습을 촉진한다\n⑤ 상표제도(토큰경제) : 내담자의 바람직한 행동이 이뤄질 때마다 그에 상응하는 보상을 하는 것이다. 상담이론 2021년 2회"},{"id":"old-82","sourceGroup":"2019~2024","source":"2022년 2회/2021년 3회/2020년 4회","year":2022,"number":82,"question":"윌리암슨의 직업상담 문제유형 4가지를 쓰고 설명하시오.","answer":"① 진로 무선택 : 직업을 선택해 본 적이 없거나, 어떤 것을 선택할 지 모르는 유형\n② 불확실한 선택 : 진로를 선택하였으나 이에 대한 확신이 없는 유형\n③ 어리석은 선택 : 자신의 특성과 흥미 등을 고려하지 않고, 특정 직업의 특권이나 갈망으로 직업을 선택한 유형\n④ 흥미와 적성의 불일치 : 자신의 흥미나 적성에 모순되는 직업을 선택한 유형","frequency":3,"recent":false,"expected":false,"importance":0,"category":"상담이론","searchText":"윌리암슨의 직업상담 문제유형 4가지를 쓰고 설명하시오. ① 진로 무선택 : 직업을 선택해 본 적이 없거나, 어떤 것을 선택할 지 모르는 유형\n② 불확실한 선택 : 진로를 선택하였으나 이에 대한 확신이 없는 유형\n③ 어리석은 선택 : 자신의 특성과 흥미 등을 고려하지 않고, 특정 직업의 특권이나 갈망으로 직업을 선택한 유형\n④ 흥미와 적성의 불일치 : 자신의 흥미나 적성에 모순되는 직업을 선택한 유형 상담이론 2022년 2회/2021년 3회/2020년 4회"},{"id":"old-83","sourceGroup":"2019~2024","source":"2024년년 2회","year":2019,"number":83,"question":"윌리암슨의 심리검사 해석 시 사용하는 상담기법 3가지를 쓰고 설명하시오.","answer":"① 설득 - 검사 결과를 종합하여 내담자가 올바른 결정을 할 수 있도록 설득한다.\n② 설명 - 검사 결과를 내담자가 이해할 수 있도록 설명한다.\n③ 직접 충고 - 검사에 대한 솔직한 상담자의 생각을 내담자에게 직접적으로 전달한다.","frequency":1,"recent":false,"expected":false,"importance":0,"category":"심리검사·통계","searchText":"윌리암슨의 심리검사 해석 시 사용하는 상담기법 3가지를 쓰고 설명하시오. ① 설득 - 검사 결과를 종합하여 내담자가 올바른 결정을 할 수 있도록 설득한다.\n② 설명 - 검사 결과를 내담자가 이해할 수 있도록 설명한다.\n③ 직접 충고 - 검사에 대한 솔직한 상담자의 생각을 내담자에게 직접적으로 전달한다. 심리검사·통계 2024년년 2회"},{"id":"old-84","sourceGroup":"2019~2024","source":"2019년 2회","year":2019,"number":84,"question":"집단상담은 그 형태와 접근 방식에 따라 여러 가지로 나눌 수 있다. 집단상담의 형태를 3가지 쓰고 각각 설명하시오.","answer":"① 성장 집단 : 내담자의 내적, 외적 성장을 위한 집단이다.\n② 교육 집단 : 내담자의 교육을 목표로 하는 집단이다.\n③ 상담 집단 : 구성원의 문제 해결, 자아 발견 등을 목표로 하는 집단이다.","frequency":1,"recent":false,"expected":false,"importance":0,"category":"상담실무·기법","searchText":"집단상담은 그 형태와 접근 방식에 따라 여러 가지로 나눌 수 있다. 집단상담의 형태를 3가지 쓰고 각각 설명하시오. ① 성장 집단 : 내담자의 내적, 외적 성장을 위한 집단이다.\n② 교육 집단 : 내담자의 교육을 목표로 하는 집단이다.\n③ 상담 집단 : 구성원의 문제 해결, 자아 발견 등을 목표로 하는 집단이다. 상담실무·기법 2019년 2회"},{"id":"old-85","sourceGroup":"2019~2024","source":"2019년 1회","year":2019,"number":85,"question":"톨버트가 제시한 집단상담 과정에서 나타나는 활동 유형 3가지를 제시하시오.","answer":"자기탐색 / 상호작용 / 개인적 정보의 검토 및 목표와의 연결 / 직업적 교육적 정보의 획득과 검토 / 의사결정","frequency":1,"recent":false,"expected":false,"importance":0,"category":"상담실무·기법","searchText":"톨버트가 제시한 집단상담 과정에서 나타나는 활동 유형 3가지를 제시하시오. 자기탐색 / 상호작용 / 개인적 정보의 검토 및 목표와의 연결 / 직업적 교육적 정보의 획득과 검토 / 의사결정 상담실무·기법 2019년 1회"},{"id":"old-86","sourceGroup":"2019~2024","source":"2023년 1회/2020년 4회/2019년 1회/2024년 2회","year":2024,"number":86,"question":"집단상담의 장점 6가지를 쓰시오.","answer":"① 시간과 비용이 경제적이다.\n② 내담자가 사회성을 기를 수 있다.\n③ 직업 성숙도가 낮은 내담자에게 적합하다.\n④ 타인을 보고 관찰하여 학습하는 효과가 있다.\n⑤ 개인에 대한 집중도가 낮아 내담자의 부담감을 감소시킬 수 있다.\n⑥ 구체적인 경험 및 현실 검증의 기회가 제공된다.","frequency":4,"recent":false,"expected":false,"importance":0,"category":"상담실무·기법","searchText":"집단상담의 장점 6가지를 쓰시오. ① 시간과 비용이 경제적이다.\n② 내담자가 사회성을 기를 수 있다.\n③ 직업 성숙도가 낮은 내담자에게 적합하다.\n④ 타인을 보고 관찰하여 학습하는 효과가 있다.\n⑤ 개인에 대한 집중도가 낮아 내담자의 부담감을 감소시킬 수 있다.\n⑥ 구체적인 경험 및 현실 검증의 기회가 제공된다. 상담실무·기법 2023년 1회/2020년 4회/2019년 1회/2024년 2회"},{"id":"old-87","sourceGroup":"2019~2024","source":"2020년 4회","year":2020,"number":87,"question":"집단상담의 단점 3가지를 쓰시오.","answer":"① 다수 내담자로 인해 비밀 보장이 어렵다.\n② 상담을 위한 집단을 구성하기 어렵다.\n③ 모든 구성원이 만족하는 상담을 하기 어렵다.\n④ 심층적 내면 심리 상담에 부적합하다.","frequency":1,"recent":false,"expected":false,"importance":0,"category":"상담실무·기법","searchText":"집단상담의 단점 3가지를 쓰시오. ① 다수 내담자로 인해 비밀 보장이 어렵다.\n② 상담을 위한 집단을 구성하기 어렵다.\n③ 모든 구성원이 만족하는 상담을 하기 어렵다.\n④ 심층적 내면 심리 상담에 부적합하다. 상담실무·기법 2020년 4회"},{"id":"old-88","sourceGroup":"2019~2024","source":"2023년 1회","year":2023,"number":88,"question":"로저스의 인간중심 상담의 기본 바탕이 되는 철학적 가정 4가지(5가지)를 쓰시오.","answer":"① 인간은 가치를 지닌 유일한 존재이다.\n② 인간은 성장력을 가지고 있다.\n③ 인간은 선한 존재이다.\n④ 인간은 자유로운 존재이다.\n⑤ 인간은 자신의 진로를 선택할 권리가 있다.","frequency":1,"recent":false,"expected":false,"importance":0,"category":"상담이론","searchText":"로저스의 인간중심 상담의 기본 바탕이 되는 철학적 가정 4가지(5가지)를 쓰시오. ① 인간은 가치를 지닌 유일한 존재이다.\n② 인간은 성장력을 가지고 있다.\n③ 인간은 선한 존재이다.\n④ 인간은 자유로운 존재이다.\n⑤ 인간은 자신의 진로를 선택할 권리가 있다. 상담이론 2023년 1회"},{"id":"old-89","sourceGroup":"2019~2024","source":"2023년 1회","year":2023,"number":89,"question":"직무분석 방법 중 면접법의 장점과 단점을 각각 2가지씩 쓰시오.","answer":"① 장점\nŸ\n수행자의 정신적인 활동까지 파악할 수 있다.\nŸ\n질문지법에 비해 응답률이 높다.\nŸ\n추가질문, 설명 등을 통해 답변의 오류를 줄일 수 있다.\nŸ\n피면접자의 답변에 따라 유연한 조사가 가능하다.\n단점\nŸ\n피면접자의 주관적인 의견이 반영되어 분석의 정확도에 영향을 줄 수 있다.\nŸ\n정보의 수집에 많은 시간과 노력이 필요하다.\nŸ\n익명성이 보장되지 않아 민감한 질문은 하기 어렵다.\nŸ\n수량화된 정보를 얻기 어렵다.","frequency":1,"recent":false,"expected":false,"importance":0,"category":"직무분석·경력개발","searchText":"직무분석 방법 중 면접법의 장점과 단점을 각각 2가지씩 쓰시오. ① 장점\nÿ\n수행자의 정신적인 활동까지 파악할 수 있다.\nÿ\n질문지법에 비해 응답률이 높다.\nÿ\n추가질문, 설명 등을 통해 답변의 오류를 줄일 수 있다.\nÿ\n피면접자의 답변에 따라 유연한 조사가 가능하다.\n단점\nÿ\n피면접자의 주관적인 의견이 반영되어 분석의 정확도에 영향을 줄 수 있다.\nÿ\n정보의 수집에 많은 시간과 노력이 필요하다.\nÿ\n익명성이 보장되지 않아 민감한 질문은 하기 어렵다.\nÿ\n수량화된 정보를 얻기 어렵다. 직무분석·경력개발 2023년 1회"},{"id":"old-90","sourceGroup":"2019~2024","source":"2023년 3회","year":2023,"number":90,"question":"직무분석 방법 중 질문지법의 장점과 단점을 각각 2가지씩 쓰시오.","answer":"① 장점\nŸ\n시간과 비용에 있어 경제적이다.\nŸ\n면접자에 의한 주관적 개입을 배제할 수 있다.\nŸ\n집단의 경향을 파악하는데 유용하다.\nŸ\n다수의 응답자가 참여할 수 있다.\nŸ\n자료 수집이 용이하다.\n단점\nŸ\n읽고 쓰는 것이 어려운 응답자를 대상으로 활용하기 어렵다.\nŸ\n질문지 외의 자료를 수집하기 어렵다.\nŸ\n응답자의 사실과 다른 답변에 대해 검증할 수 없다.\nŸ\n각 문항에 대한 무응답률이 높을 수 있다.\nŸ\n비언어적 행위에 대한 조사가 불가능하다.","frequency":1,"recent":false,"expected":false,"importance":0,"category":"심리검사·통계","searchText":"직무분석 방법 중 질문지법의 장점과 단점을 각각 2가지씩 쓰시오. ① 장점\nÿ\n시간과 비용에 있어 경제적이다.\nÿ\n면접자에 의한 주관적 개입을 배제할 수 있다.\nÿ\n집단의 경향을 파악하는데 유용하다.\nÿ\n다수의 응답자가 참여할 수 있다.\nÿ\n자료 수집이 용이하다.\n단점\nÿ\n읽고 쓰는 것이 어려운 응답자를 대상으로 활용하기 어렵다.\nÿ\n질문지 외의 자료를 수집하기 어렵다.\nÿ\n응답자의 사실과 다른 답변에 대해 검증할 수 없다.\nÿ\n각 문항에 대한 무응답률이 높을 수 있다.\nÿ\n비언어적 행위에 대한 조사가 불가능하다. 심리검사·통계 2023년 3회"},{"id":"old-91","sourceGroup":"2019~2024","source":"2023년 3회","year":2023,"number":91,"question":"실험실 연구의 장점 3가지를 쓰시오","answer":"① 장점\nŸ\n특정 변인의 조작 및 통제가 가능하다.\nŸ\n변인들 간의 인과관계 파악이 용이하다.\nŸ\n동일한 실험을 다양한 조건에서 반복 실시하여 보다 정확한 결과를 얻을 수 있다.\n단점\nŸ\n실험실과 실제 세계는 다르므로 실험 결과를 일반화하는데 위험이 따른다.\nŸ\n표본이 대표성을 가지지 않을 경우 실험결과를 인반화하기 어렵다.\nŸ\n인위적 조작이 가능한 변인의 경우에만 유용하다","frequency":1,"recent":false,"expected":false,"importance":0,"category":"기타 핵심이론","searchText":"실험실 연구의 장점 3가지를 쓰시오 ① 장점\nÿ\n특정 변인의 조작 및 통제가 가능하다.\nÿ\n변인들 간의 인과관계 파악이 용이하다.\nÿ\n동일한 실험을 다양한 조건에서 반복 실시하여 보다 정확한 결과를 얻을 수 있다.\n단점\nÿ\n실험실과 실제 세계는 다르므로 실험 결과를 일반화하는데 위험이 따른다.\nÿ\n표본이 대표성을 가지지 않을 경우 실험결과를 인반화하기 어렵다.\nÿ\n인위적 조작이 가능한 변인의 경우에만 유용하다 기타 핵심이론 2023년 3회"},{"id":"old-92","sourceGroup":"2019~2024","source":"2023년 1회/2021년 1회/2023년 3회","year":2023,"number":92,"question":"예언 타당도와 동시(공인) 타당도에 대해 각각의 예를 포함하여 설명하시오.","answer":"① 예언타당도 : 검사의 점수가 미래 행위를 얼마나 잘 예측해 낼 수 있는가와 관련한 타당도이다.\n입사를 위한 적성감사에서 점수가 높았던 사람이 입사 후 우수한 업무 실적을 냈다면,\n해당 적성검사는 예언타당도가 높다고 할 수 있다.\n② 동시(공인)타당도 : 이미 타당도가 검증된 검사와 유사한 검사를 실시하고, 두 검사 점수를 비교하여 측정하는 타당도\n토익 점수가 높은 사람이 새로 개발한 영어 시험의 점수가 높다면,\n새로 개발한 영어 시힘은 동시타당도가 높다고 할 수 있다.","frequency":3,"recent":false,"expected":false,"importance":0,"category":"심리검사·통계","searchText":"예언 타당도와 동시(공인) 타당도에 대해 각각의 예를 포함하여 설명하시오. ① 예언타당도 : 검사의 점수가 미래 행위를 얼마나 잘 예측해 낼 수 있는가와 관련한 타당도이다.\n입사를 위한 적성감사에서 점수가 높았던 사람이 입사 후 우수한 업무 실적을 냈다면,\n해당 적성검사는 예언타당도가 높다고 할 수 있다.\n② 동시(공인)타당도 : 이미 타당도가 검증된 검사와 유사한 검사를 실시하고, 두 검사 점수를 비교하여 측정하는 타당도\n토익 점수가 높은 사람이 새로 개발한 영어 시험의 점수가 높다면,\n새로 개발한 영어 시힘은 동시타당도가 높다고 할 수 있다. 심리검사·통계 2023년 1회/2021년 1회/2023년 3회"},{"id":"old-93","sourceGroup":"2019~2024","source":"2023년 3회","year":2023,"number":93,"question":"다음은 준거타당도에 관한 사항이다. 물음에 답하시오.\n(1) 여러 가지 타당도 중에서 특히 직업상담사에게 준거타당도가 중요한 이유 2가지를 설명하시오\n직업에서 성공할 수 있는 가능성을 예측할 수 있게 해준다. / 공정한 인사관리를 가능하게 해 준다.\n(2) 실증연구에서 얻은 타당도 계수와 실제 연구에서의 타당도 계수가 다른데, 실제 연구에서 타당도 계수가 낮은 이유를 3가지 쓰시오.","answer":"Ÿ\n실제 연구는 외부요인을 통제하기 어렵다.\nŸ\n실제 연구는 내적 타당도가 낮다.\nŸ\n실제 연구는 독립변인에 의한 효과와 가외변인의 효과를 구분하기 어렵다.","frequency":1,"recent":false,"expected":false,"importance":0,"category":"심리검사·통계","searchText":"다음은 준거타당도에 관한 사항이다. 물음에 답하시오.\n(1) 여러 가지 타당도 중에서 특히 직업상담사에게 준거타당도가 중요한 이유 2가지를 설명하시오\n직업에서 성공할 수 있는 가능성을 예측할 수 있게 해준다. / 공정한 인사관리를 가능하게 해 준다.\n(2) 실증연구에서 얻은 타당도 계수와 실제 연구에서의 타당도 계수가 다른데, 실제 연구에서 타당도 계수가 낮은 이유를 3가지 쓰시오. ÿ\n실제 연구는 외부요인을 통제하기 어렵다.\nÿ\n실제 연구는 내적 타당도가 낮다.\nÿ\n실제 연구는 독립변인에 의한 효과와 가외변인의 효과를 구분하기 어렵다. 심리검사·통계 2023년 3회"},{"id":"old-94","sourceGroup":"2019~2024","source":"2023년 1회/2020년 1회/2020년 2회","year":2023,"number":94,"question":"직업상담을 위한 심리검사 선정 시 고려사항 3가지를 쓰시오.","answer":"① 신뢰도와 타당도가 검증된 검사를 선정한다.\n② 검사를 하는 목적에 부합하는 검사를 선정해야 한다.\n③ 검사의 간편성, 경제성 등 실용성을 고려해야 한다.\n④ 검사 선택 시 내담자도 포함하여야 한다.\n⑤ 내담자의 문제점을 파악한 후 검사를 선정해야 한다.\n⑥ 정상 집단에서 적합성이 있어야 한다.","frequency":3,"recent":false,"expected":false,"importance":0,"category":"심리검사·통계","searchText":"직업상담을 위한 심리검사 선정 시 고려사항 3가지를 쓰시오. ① 신뢰도와 타당도가 검증된 검사를 선정한다.\n② 검사를 하는 목적에 부합하는 검사를 선정해야 한다.\n③ 검사의 간편성, 경제성 등 실용성을 고려해야 한다.\n④ 검사 선택 시 내담자도 포함하여야 한다.\n⑤ 내담자의 문제점을 파악한 후 검사를 선정해야 한다.\n⑥ 정상 집단에서 적합성이 있어야 한다. 심리검사·통계 2023년 1회/2020년 1회/2020년 2회"},{"id":"old-95","sourceGroup":"2019~2024","source":"2021년 2회","year":2021,"number":95,"question":"심리검사 제작을 위한 예비문항 제작시 고려해야 할 5가지를 쓰시오","answer":"① 문항의 적절성 : 성별, 종교, 인종, 문화 등 특정집단에 유리하도록 제작해서는 안된다\n② 문항의 난이도 : 수검자의 수준에 따라 난이도를 적절하게 구성한다\n③ 문항의 구조화 : 문항 내용은 구체적이고 명확해야 한다\n④ 문항의 동기유발 : 문항은 수검자로 하여금 학습동기를 유발할 수 있어야 한다\n⑤ 문항의 참신성 : 기존검사에 중복되지 않는 새로운 문항을 제시한다\n⑥ 문항의 중립성 : 특정집단에 불쾌감을 주는 문항이 포함되지 않도록 주의한다","frequency":1,"recent":false,"expected":false,"importance":0,"category":"심리검사·통계","searchText":"심리검사 제작을 위한 예비문항 제작시 고려해야 할 5가지를 쓰시오 ① 문항의 적절성 : 성별, 종교, 인종, 문화 등 특정집단에 유리하도록 제작해서는 안된다\n② 문항의 난이도 : 수검자의 수준에 따라 난이도를 적절하게 구성한다\n③ 문항의 구조화 : 문항 내용은 구체적이고 명확해야 한다\n④ 문항의 동기유발 : 문항은 수검자로 하여금 학습동기를 유발할 수 있어야 한다\n⑤ 문항의 참신성 : 기존검사에 중복되지 않는 새로운 문항을 제시한다\n ategory":"상담이론","searchText":"실직하고 나서 \"나는 무능하다\"라는 부정적인 자동적 사고가 떠올라 우울감에 빠진 내담자에게 벡의 인지행동적 상담을 한다고\n하자. 이 내담자의 부정적인 사고를 반박하고 긍정적인 대안적 사고를 찾게 하기 위해 사용할 수 있는 방법 3가지를 설명하시오. ① 언어적 기법 : 비합리적 신념을 논박하여 내담자의 언어를 변화시키는 방법이다.\n② 정서적 기법 : 내담자가 합리적 정서를 상상하도록 하는 방법이다.\n③ 행동적 기법 : 내담자에게 목표 행동을 부여하고 실행하도록 하여 신념체계를 변화시키는 방법이다. 상담이론 2019년 3회"},{"id":"old-107","sourceGroup":"2019~2024","source":"2022년 2회/2020년 1회","year":2022,"number":107,"question":"부정적인 심리검사 결과가 나온 내담자에게 검사 결과를 통보하는 방법 4가지를 쓰시오.","answer":"① 내담자가 충격을 받지 않도록 주의하여 설명한다.\n② 전문적 용어나 통계적 숫자보다는 일상적인 용어를 사용하여 설명한다.\n③ 적절한 해석과 함께 검사 결과를 설명한다.\n④ 검사결과가 유출되지 않도록 비밀보장에 유의한다.","frequency":2,"recent":false,"expected":false,"importance":0,"category":"심리검사·통계","searchText":"부정적인 심리검사 결과가 나온 내담자에게 검사 결과를 통보하는 방법 4가지를 쓰시오. ① 내담자가 충격을 받지 않도록 주의하여 설명한다.\n② 전문적 용어나 통계적 숫자보다는 일상적인 용어를 사용하여 설명한다.\n③ 적절한 해석과 함께 검사 결과를 설명한다.\n④ 검사결과가 유출되지 않도록 비밀보장에 유의한다. 심리검사·통계 2022년 2회/2020년 1회"},{"id":"old-108","sourceGroup":"2019~2024","source":"2022년 2회/2020년 1회","year":2022,"number":108,"question":"심리검사의 사용목적 3가지를 쓰고 설명하시오.","answer":"① 개인적 기능 : 내담자의 자기이해를 증진시키고 이를 통해 성공 가능성이 높은 진로를 선택할 수 있도록 돕는다.\n② 예측적 기능 : 내담자의 성격이나 적성 등을 파악하여 수행능력을 예측한다.\n③ 진단적 기능 : 내담자의 문제 원인을 파악하고 해결한다.\n④ 조사적 기능 : 특정 집단의 성향을 조사하여 집단의 특징을 규명한다.","frequency":2,"recent":false,"expected":false,"importance":0,"category":"심리검사·통계","searchText":"심리검사의 사용목적 3가지를 쓰고 설명하시오. ① 개인적 기능 : 내담자의 자기이해를 증진시키고 이를 통해 성공 가능성이 높은 진로를 선택할 수 있도록 돕는다.\n② 예측적 기능 : 내담자의 성격이나 적성 등을 파악하여 수행능력을 예측한다.\n③ 진단적 기능 : 내담자의 문제 원인을 파악하고 해결한다.\n④ 조사적 기능 : 특정 집단의 성향을 조사하여 집단의 특징을 규명한다. 심리검사·통계 2022년 2회/2020년 1회"},{"id":"old-109","sourceGroup":"2019~2024","source":"2022년 2회/2020년 1회","year":2022,"number":109,"question":"노동수요 Ld = 5,000 - 2W이고, 1시간당 임금이 W = 2,000원일 때\n노동수요의 임금 탄력성의 절댓값과 근로자의 수입이 얼마인지 계산하시오. .","answer":"① 노동수요의 임금 탄력성 = 노동수요 변화율 / 임금 변화율\n= (노동수요 변화량 / 원래 노동수요) / (입금 변화량 / 원래 임금)\n= (△Ld / Ld) / (△W / W) = (△Ld / △W) x (W/Ld)\n이때 (△Ld / △W)는 Ld = 5,000 - 2W 그래프의 기울기, 따라서 -2\nW가 2,000일 때 Ld = 5,000 - (2 x 2,000)=1,000\n-2 x (2,000 / 1,000) = -4\n임금 탄력성의 절대값 : 4\n② 근로자의 수입 = 노동수요 x 임금\n( 5,000 - 2 x 2,000 ) x 2,000 = 2,000,000원","frequency":2,"recent":false,"expected":false,"importance":0,"category":"노동시장·고용","searchText":"노동수요 ld = 5,000 - 2w이고, 1시간당 임금이 w = 2,000원일 때\n노동수요의 임금 탄력성의 절댓값과 근로자의 수입이 얼마인지 계산하시오. . ① 노동수요의 임금 탄력성 = 노동수요 변화율 / 임금 변화율\n= (노동수요 변화량 / 원래 노동수요) / (입금 변화량 / 원래 임금)\n= (△ld / ld) / (△w / w) = (△ld / △w) x (w/ld)\n이때 (△ld / △w)는 ld = 5,000 - 2w 그래프의 기울기, 따라서 -2\nw가 2,000일 때 ld = 5,000 - (2 x 2,000)=1,000\n-2 x (2,000 / 1,000) = -4\n임금 탄력성의 절대값 : 4\n② 근로자의 수입 = 노동수요 x 임금\n( 5,000 - 2 x 2,000 ) x 2,000 = 2,000,000원 노동시장·고용 2022년 2회/2020년 1회"},{"id":"old-110","sourceGroup":"2019~2024","source":"2022년 2회/2019년 3회","year":2022,"number":110,"question":"표준화를 위해 수집된 자료가 정규분포에서 벗어하는 것은 검사도구의 문제보다 표집 절차의 오류에 원인이 있을 수 있다.\n이를 해결하기 위한 방법 3가지를 쓰고, 각각 설명하시오.","answer":"① 완곡법 : 검사결과가 정규분포와 비슷한 모양을 갖는 경우, 점수를 더하거나 빼서 정상분포의 모양이 되도록 하는 방법\n② 절미법 : 꼬리가 작은 경우 분포 곡선에서 한쪽으로 치우친 편포의 꼬리를 잘라내는 방법이다.\n③ 면적 환산법 : 각 점수의 백분위를 찾아, 이에 해당하는 Z점수를 찾는 방법이다","frequency":2,"recent":false,"expected":false,"importance":0,"category":"심리검사·통계","searchText":"표준화를 위해 수집된 자료가 정규분포에서 벗어하는 것은 검사도구의 문제보다 표집 절차의 오류에 원인이 있을 수 있다.\n이를 해결하기 위한 방법 3가지를 쓰고, 각각 설명하시오. ① 완곡법 : 검사결과가 정규분포와 비슷한 모양을 갖는 경우, 점수를 더하거나 빼서 정상분포의 모양이 되도록 하는 방법\n② 절미법 : 꼬리가 작은 경우 분포 곡선에서 한쪽으로 치우친 편포의 꼬리를 잘라내는 방법이다.\n③ 면적 환산법 : 각 점수의 백분위를 찾아, 이에 해당하는 z점수를 찾는 방법이다 심리검사·통계 2022년 2회/2019년 3회"},{"id":"old-111","sourceGroup":"2019~2024","source":"2022년 2회/2019년 3회/2019년 1회","year":2022,"number":111,"question":"갤라트가 제시한 직업 의사 결정의 상담과정 8단계를 순서대로 쓰시오.","answer":"목표의식 → 정보수집 → 대안의 열거 → 대안의 결과 예측 → 대안의 실현 가능성 예측 → 가치평가 → 의사결정 → 평가 & 재투입","frequency":3,"recent":false,"expected":false,"importance":0,"category":"상담실무·기법","searchText":"갤라트가 제시한 직업 의사 결정의 상담과정 8단계를 순서대로 쓰시오. 목표의식 → 정보수집 → 대안의 열거 → 대안의 결과 예측 → 대안의 실현 가능성 예측 → 가치평가 → 의사결정 → 평가 & 재투입 상담실무·기법 2022년 2회/2019년 3회/2019년 1회"},{"id":"old-112","sourceGroup":"2019~2024","source":"2020년 4회/2023년 3회","year":2023,"number":112,"question":"인지 정서 상담기법의 기본 가정, 기본개념, 상담의 목표를 쓰시오.","answer":"① 기본가정 : 인간은 합리적일 수도, 비합리적일 수도 있는 존재이며, 내담자의 문제는 비합리적 사고로 인해 생긴다.\n② 기본개념 : 내담자의 문제를 해결하기 위해 상담자의 논박이 필요하며, 이를 위해 ABCDEF 모델을 제시한다.\n③ 상담의 목표 : 내담자의 비합리적 신념을 합리적 신념으로 변화시켜 문제를 해결한다.","frequency":2,"recent":false,"expected":false,"importance":0,"category":"상담실무·기법","searchText":"인지 정서 상담기법의 기본 가정, 기본개념, 상담의 목표를 쓰시오. ① 기본가정 : 인간은 합리적일 수도, 비합리적일 수도 있는 존재이며, 내담자의 문제는 비합리적 사고로 인해 생긴다.\n② 기본개념 : 내담자의 문제를 해결하기 위해 상담자의 논박이 필요하며, 이를 위해 abcdef 모델을 제시한다.\n③ 상담의 목표 : 내담자의 비합리적 신념을 합리적 신념으로 변화시켜 문제를 해결한다. 상담실무·기법 2020년 4회/2023년 3회"},{"id":"old-113","sourceGroup":"2019~2024","source":"2022년 2회/2021년 3회/2021년 2회/2020년 3회/2020년 2회","year":2022,"number":113,"question":"인지적, 정서적, 행동적 상담의 기본개념인 ABCDEF의 의미를 쓰시오.","answer":"A - 선행사건 : 내담자의 감정이나 행동에 영향을 미치는 사건이다.\nB - 비합리적 신념 : 선행사건에 대한 비합리적 신념체계이다.\nC - 결과 : 비합리적 신념으로 인한 부적응적인 정서·행동적 결과이다.\nD - 논박 : 비합리적 신념을 논리적으로 반박하는 것이다.\nE - 효과 : 논박으로 인해 비합리적 신념이 합리적 신념으로 전환된다\nF - 새로운 감정 : 합리적 신념에서 비롯된 긍정적이고 수용적인 감정이다.","frequency":5,"recent":false,"expected":false,"importance":0,"category":"상담실무·기법","searchText":"인지적, 정서적, 행동적 상담의 기본개념인 abcdef의 의미를 쓰시오. a - 선행사건 : 내담자의 감정이나 행동에 영향을 미치는 사건이다.\nb - 비합리적 신념 : 선행사건에 대한 비합리적 신념체계이다.\nc - 결과 : 비합리적 신념으로 인한 부적응적인 정서·행동적 결과이다.\nd - 논박 : 비합리적 신념을 논리적으로 반박하는 것이다.\ne - 효과 : 논박으로 인해 비합리적 신념이 합리적 신념으로 전환된다\nf - 새로운 감정 : 합리적 신념에서 비롯된 긍정적이고 수용적인 감정이다. 상담실무·기법 2022년 2회/2021년 3회/2021년 2회/2020년 3회/2020년 2회"},{"id":"old-114","sourceGroup":"2019~2024","source":"2021년 1회","year":2021,"number":114,"question":"아래의 사례에 대해 인지정서행동 상담의 ABCDEF 기법을 사용하여 설명하시오.","answer":"김 씨는 최근 회사에서 정리해고를 당했다. 자신 스스로가 쓸모없는 무가치한 존재라 여기게 되었고, 이로 인해 우울증까지 겹치게 되었다.\n김 씨는 극단적인 생각을 하게 되면서 자살까지 시도하였지만 실패하였다. 그 이후 상담과정을 거치면서 점차 회복하게 되었다.\nA - 선행사건 : 회사에서 정리해고를 당하는 사건이 발생하였다.\nB - 비합리적 신념 : 해고가 자신이 무가치한 존재인 것을 의미한다는 비합리적 신념을 갖게 되었다.\nC - 결과 : 비합리적 신념의 결과로 우울증과 자살 시도 등의 행동이 발생하였다.\nD - 논박 : 상담을 통해 정리해고가 김 씨의 무가치함을 의미하는 것이 아님을 논박한다.\nE - 효과 : 논박의 효과로 김 씨는 우울감을 극복하고 자신을 재평가 한다.\nF - 새로운 감정 : 김 씨는 자신에 대해 긍정적으로 평가하기 시작하고 다시 구직활동을 한다.","frequency":1,"recent":false,"expected":false,"importance":0,"category":"상담이론","searchText":"아래의 사례에 대해 인지정서행동 상담의 abcdef 기법을 사용하여 설명하시오. 김 씨는 최근 회사에서 정리해고를 당했다. 자신 스스로가 쓸모없는 무가치한 존재라 여기게 되었고, 이로 인해 우울증까지 겹치게 되었다.\n김 씨는 극단적인 생각을 하게 되면서 자살까지 시도하였지만 실패하였다. 그 이후 상담과정을 거치면서 점차 회복하게 되었다.\na - 선행사건 : 회사에서 정리해고를 당하는 사건이 발생하였다.\nb - 비합리적 신념 : 해고가 자신이 무가치한 존재인 것을 의미한다는 비합리적 신념을 갖게 되었다.\nc - 결과 : 비합리적 신념의 결과로 우울증과 자살 시도 등의 행동이 발생하였다.\nd - 논박 : 상담을 통해 정리해고가 김 씨의 무가치함을 의미하는 것이 아님을 논박한다.\ne - 효과 : 논박의 효과로 김 씨는 우울감을 극복하고 자신을 재평가 한다.\nf - 새로운 감정 : 김 씨는 자신에 대해 긍정적으로 평가하기 시작하고 다시 구직활동을 한다. 상담이론 2021년 1회"},{"id":"old-115","sourceGroup":"2019~2024","source":"2022년 2회/2020년 4회","year":2022,"number":115,"question":"직업상담사가 갖추어야 할 자질 5가지를 쓰시오.","answer":"① 직업정보를 수집하고 분석하여 전달하는 능력이 있어야 한다.\n② 내담자에 관하여 파악할 수 있는 통찰력이 있어야 한다.\n③ 직업 상담에 관한 지식 및 상담 기술이 있어야 한다.\n④ 편견 없이 내담자를 대할 수 있어야 한다.\n⑤ 내담자를 존중하는 태도를 갖추어야 한다.\n⑥ 도덕성을 갖추어야 한다.\n⑦ 내담자의 문제 해결을 도와줄 수 있는 심리학적 지식을 갖추어야 한다.\n⑧ 노동시작의 흐름이나 국가, 기업의 정책에 관한 지식을 수집하고 분석할 수 있는 능력을 갖추어야 한다.","frequency":2,"recent":false,"expected":false,"importance":0,"category":"노동시장·고용","searchText":"직업상담사가 갖추어야 할 자질 5가지를 쓰시오. ① 직업정보를 수집하고 분석하여 전달하는 능력이 있어야 한다.\n② 내담자에 관하여 파악할 수 있는 통찰력이 있어야 한다.\n③ 직업 상담에 관한 지식 및 상담 기술이 있어야 한다.\n④ 편견 없이 내담자를 대할 수 있어야 한다.\n⑤ 내담자를 존중하는 태도를 갖추어야 한다.\n⑥ 도덕성을 갖추어야 한다.\n⑦ 내담자의 문제 해결을 도와줄 수 있는 심리학적 지식을 갖추어야 한다.\n⑧ 노동시작의 흐름이나 국가, 기업의 정책에 관한 지식을 수집하고 분석할 수 있는 능력을 갖추어야 한다. 노동시장·고용 2022년 2회/2020년 4회"},{"id":"old-116","sourceGroup":"2019~2024","source":"2022년 2회","year":2022,"number":116,"question":"직업상담에서 내담자 이해를 위한 질적 측정도구 3가지를 쓰고 설명하시오.","answer":"① 자기효능감 척도 : 어떤 과제를 어느 정도 수준으로 수행할 수 있는지 스스로 판단하는 척도를 의미한다.\n② 제노그램 : 내감자의 가계도를 통해 직업에 대한 인식과 흥미를 파악할 수 있다.\n③ 직업카드 분류 : 직업카드를 선호, 혐호, 미결정으로 분류하여 내담자의 직업 선호도를 파악할 수 있다.\n④ 역할놀이 : 내담자에게 업무 상황을 제시하고 해결하는 과정을 관찰하여 내담자의 직업 관련 기술을 파악할 수 있다.","frequency":1,"recent":false,"expected":false,"importance":0,"category":"상담실무·기법","searchText":"직업상담에서 내담자 이해를 위한 질적 측정도구 3가지를 쓰고 설명하시오. ① 자기효능감 척도 : 어떤 과제를 어느 정도 수준으로 수행할 수 있는지 스스로 판단하는 척도를 의미한다.\n② 제노그램 : 내감자의 가계도를 통해 직업에 대한 인식과 흥미를 파악할 수 있다.\n③ 직업카드 분류 : 직업카드를 선호, 혐호, 미결정으로 분류하여 내담자의 직업 선호도를 파악할 수 있다.\n④ 역할놀이 : 내담자에게 업무 상황을 제시하고 해결하는 과정을 관찰하여 내담자의 직업 관련 기술을 파악할 수 있다. 상담실무·기법 2022년 2회"},{"id":"old-117","sourceGroup":"2019~2024","source":"2022년 1회/=","year":2022,"number":117,"question":"한국표준산업분류의 적용원칙 4가지를 쓰시오.","answer":"① 생산단위는 산출물, 투입물, 생산 공정 등을 함께 고려하여 분류해야 한다.\n② 복합적 활동단위는 대분류를 결정하고, 순차적으로 중, 소, 세, 세세분류 단계 항목으로 결정한다.\n③ 산업활동이 결합되어 있는 경우에는 그 활동단위의 주된 활동에 따라서 분류하여야 한다.\n④ 수수료 또는 계약에 의하여 활동을 수행하는 단위는 자기계정과 자기 책임 하에서 생산하는 단위와 동일 항목으로 분류","frequency":1,"recent":false,"expected":false,"importance":0,"category":"직업정보·분류","searchText":"한국표준산업분류의 적용원칙 4가지를 쓰시오. ① 생산단위는 산출물, 투입물, 생산 공정 등을 함께 고려하여 분류해야 한다.\n② 복합적 활동단위는 대분류를 결정하고, 순차적으로 중, 소, 세, 세세분류 단계 항목으로 결정한다.\n③ 산업활동이 결합되어 있는 경우에는 그 활동단위의 주된 활동에 따라서 분류하여야 한다.\n④ 수수료 또는 계약에 의하여 활동을 수행하는 단위는 자기계정과 자기 책임 하에서 생산하는 단위와 동일 항목으로 분류 직업정보·분류 2022년 1회/="},{"id":"old-118","sourceGroup":"2019~2024","source":"2022년 1회","year":2022,"number":118,"question":"스피어만의 지능에 관한 2 요인설에서 2가지 요인을 쓰고 각각에 대해 설명하시오.","answer":"① 일반요인 - 모든 지적 활동에 포함된 단일한 추론능력\n② 특수요인 - 특정 과제를 수행하는 데 포함된 여러가지 능력","frequency":1,"recent":false,"expected":false,"importance":0,"category":"기타 핵심이론","searchText":"스피어만의 지능에 관한 2 요인설에서 2가지 요인을 쓰고 각각에 대해 설명하시오. ① 일반요인 - 모든 지적 활동에 포함된 단일한 추론능력\n② 특수요인 - 특정 과제를 수행하는 데 포함된 여러가지 능력 기타 핵심이론 2022년 1회"},{"id":"old-119","sourceGroup":"2019~2024","source":"2022년 1회","year":2022,"number":119,"question":"검사 - 재검사 신뢰도의 단점 4가지를 쓰시오.","answer":"① 이월효과 ② 성숙효과 ③ 반응 민감성 ④ 환경상의 변화","frequency":1,"recent":false,"expected":false,"importance":0,"category":"심리검사·통계","searchText":"검사 - 재검사 신뢰도의 단점 4가지를 쓰시오. ① 이월효과 ② 성숙효과 ③ 반응 민감성 ④ 환경상의 변화 심리검사·통계 2022년 1회"},{"id":"old-120","sourceGroup":"2019~2024","source":"2022년 1회","year":2022,"number":120,"question":"직업상담의 목적 5가지를 쓰시오.","answer":"① 내담자가 이미 선택한 진로 결정을 확실하게 해 준다.\n② 내담자의 직업 목표를 명확하게 해 준다.\n③ 내담자가 자신과 직업세계에 대해 더 잘 이해할 수 있도록 해 준다.\n④ 내담자의 의사결정 능력을 길러준다.\n⑤ 내담자가 능동적인 태도를 갖도록 돕는다.","frequency":1,"recent":false,"expected":false,"importance":0,"category":"상담실무·기법","searchText":"직업상담의 목적 5가지를 쓰시오. ① 내담자가 이미 선택한 진로 결정을 확실하게 해 준다.\n② 내담자의 직업 목표를 명확하게 해 준다.\n③ 내담자가 자신과 직업세계에 대해 더 잘 이해할 수 있도록 해 준다.\n④ 내담자의 의사결정 능력을 길러준다.\n⑤ 내담자가 능동적인 태도를 갖도록 돕는다. 상담실무·기법 2022년 1회"},{"id":"old-121","sourceGroup":"2019~2024","source":"2022년 1회","year":2022,"number":121,"question":"정신분석학에서 역전이의 의미와 해결책을 3가지 쓰시오.","answer":"① 의미 - 상담자가 내담자에게 이전에 다른 사람에게 가졌던 감정을 갖게 되는 것.\n② 해결방법 : 자기분석을 한다. / 수퍼바이저의 지도, 감독을 받는다. / 다른 전문가에게 상담을 위임한다.","frequency":1,"recent":false,"expected":false,"importance":0,"category":"상담이론","searchText":"정신분석학에서 역전이의 의미와 해결책을 3가지 쓰시오. ① 의미 - 상담자가 내담자에게 이전에 다른 사람에게 가졌던 감정을 갖게 되는 것.\n② 해결방법 : 자기분석을 한다. / 수퍼바이저의 지도, 감독을 받는다. / 다른 전문가에게 상담을 위임한다. 상담이론 2022년 1회"},{"id":"old-122","sourceGroup":"2019~2024","source":"2022년 1회/2021년 3회/2019년 2회","year":2022,"number":122,"question":"정신분석적 상담은 이성적이고 직접적인 방법으로 불안을 통제할 수 없을 때 무의식적으로 방어기제를 사용한다고 한다.\n방어기제의 종류 3가지를 쓰고 설명하시오.","answer":"① 억압 - 감정을 무의식으로 밀어 넣는 것.\n② 부정 - 현실을 무의식적으로 인정하지 않는 것.\n③ 합리화 - 그럴듯한 이유를 붙여 현실을 회피하는 것.\n④ 동일시 ⑤ 전위 ⑥ 투사 ⑥ 퇴행 ⑦ 승화","frequency":3,"recent":false,"expected":false,"importance":0,"category":"상담이론","searchText":"정신분석적 상담은 이성적이고 직접적인 방법으로 불안을 통제할 수 없을 때 무의식적으로 방어기제를 사용한다고 한다.\n방어기제의 종류 3가지를 쓰고 설명하시오. ① 억압 - 감정을 무의식으로 밀어 넣는 것.\n② 부정 - 현실을 무의식적으로 인정하지 않는 것.\n③ 합리화 - 그럴듯한 이유를 붙여 현실을 회피하는 것.\n④ 동일시 ⑤ 전위 ⑥ 투사 ⑥ 퇴행 ⑦ 승화 상담이론 2022년 1회/2021년 3회/2019년 2회"},{"id":"old-123","sourceGroup":"2019~2024","source":"2021년 2회","year":2021,"number":123,"question":"정신분석 상담에서 필수적인 개념인 불안의 3가지 유형을 쓰고 각각에 대해 설명하시오","answer":"① 현실적 불안 : 현실에서 실제적 위험을 지각함으로써 느끼는 불안이다.\n② 신경증적 불안 : 자아와 원초아 간 갈등이며, 자아가 원초아를 통제하지 못할 경우 발생하는 불안이다.\n③ 도덕적 불안 : 원초아와 초자아 간 갈등에서 생기는 것으로 본질적인 자기양심에 대한 불안이다.","frequency":1,"recent":false,"expected":false,"importance":0,"category":"상담이론","searchText":"정신분석 상담에서 필수적인 개념인 불안의 3가지 유형을 쓰고 각각에 대해 설명하시오 ① 현실적 불안 : 현실에서 실제적 위험을 지각함으로써 느끼는 불안이다.\n② 신경증적 불안 : 자아와 원초아 간 갈등이며, 자아가 원초아를 통제하지 못할 경우 발생하는 불안이다.\n③ 도덕적 불안 : 원초아와 초자아 간 갈등에서 생기는 것으로 본질적인 자기양심에 대한 불안이다. 상담이론 2021년 2회"},{"id":"old-124","sourceGroup":"2019~2024","source":"2022년 1회","year":2022,"number":124,"question":"일반직업적성검사(GATB)에서 측정하는 적성 항목을 3가지 쓰고 각각에 대해 간략히 설명하시오.","answer":"① 지능 - 일반적인 학습능력을 검사한다.\n② 언어능력 - 언어를 이해하고 사용하는 능력을 검사한다.\n③ 수리능력 - 신속하게 계산하는 능력을 검사한다.","frequency":1,"recent":false,"expected":false,"importance":0,"category":"심리검사·통계","searchText":"일반직업적성검사(gatb)에서 측정하는 적성 항목을 3가지 쓰고 각각에 대해 간략히 설명하시오. ① 지능 - 일반적인 학습능력을 검사한다.\n② 언어능력 - 언어를 이해하고 사용하는 능력을 검사한다.\n③ 수리능력 - 신속하게 계산하는 능력을 검사한다. 심리검사·통계 2022년 1회"},{"id":"old-125","sourceGroup":"2019~2024","source":"2022년 1회/2021년 2회","year":2022,"number":125,"question":"최저임금제의 기대효과 5가지를 쓰시오.","answer":"① 산업간, 계층간 임금 격차가 줄어든다.\n② 노동자의 생활 안정에 도움이 된다.\n③ 경기 활성화 효과가 있다.\n④ 노사분규를 예방하는 효과가 있다.\n⑤ 불필요한 임금 절감 경쟁을 방지하여 경영 합리화에 도움을 준다.\n⑥ 고임금 경제 효과를 얻을 수 있다.\n⑦ 경제성장, 고용증대 효과가 있다.\n⑧ 산업구조의 고도화에 기여한다.\n⑨ 소득분배 상태가 개선된다.","frequency":2,"recent":false,"expected":false,"importance":0,"category":"노동시장·고용","searchText":"최저임금제의 기대효과 5가지를 쓰시오. ① 산업간, 계층간 임금 격차가 줄어든다.\n② 노동자의 생활 안정에 도움이 된다.\n③ 경기 활성화 효과가 있다.\n④ 노사분규를 예방하는 효과가 있다.\n⑤ 불필요한 임금 절감 경쟁을 방지하여 경영 합리화에 도움을 준다.\n⑥ 고임금 경제 효과를 얻을 수 있다.\n⑦ 경제성장, 고용증대 효과가 있다.\n⑧ 산업구조의 고도화에 기여한다.\n⑨ 소득분배 상태가 개선된다. 노동시장·고용 2022년 1회/2021년 2회"},{"id":"old-126","sourceGroup":"2019~2024","source":"2020년 2회","year":2020,"number":126,"question":"의사교류분석 상담기법에서 주장하는 역동적 자아상태 3가지를 쓰시오.","answer":"부모자아 / 성인자아 / 어린이 자아","frequency":1,"recent":false,"expected":false,"importance":0,"category":"상담이론","searchText":"의사교류분석 상담기법에서 주장하는 역동적 자아상태 3가지를 쓰시오. 부모자아 / 성인자아 / 어린이 자아 상담이론 2020년 2회"},{"id":"old-127","sourceGroup":"2019~2024","source":"2022년 1회","year":2022,"number":127,"question":"의사교류분석상담의 제한점 3가지를 쓰시오.","answer":"① 용어가 추상적이어서 실제 적용이 어렵다.\n② 어려운 개념이 많아 지적 능력이 낮은 내담자에게 적합하지 않다.\n③ 과학적인 검증이 부족하다.","frequency":1,"recent":false,"expected":false,"i ":"생애진로사정을 통해 얻을 수 있는 정보 3가지를 쓰시오. 교육, 훈련 경험 / 의존적인지, 독립적인지의 성향 / 자신의 기술과 능력에 대한 자기평가 기타 핵심이론 2020년 2회/2019년 3회/2024년 1회"},{"id":"old-140","sourceGroup":"2019~2024","source":"2020년 1회/2019년 3회","year":2020,"number":136,"question":"직업상담의 구조화된 면담법으로 생애진로 사정의 구조 4가지에 대해 설명하시오.","answer":"① 진로사정 : 내담자의 직업, 교육, 훈련경험, 관심사 등에 관하여 사정한다.\n② 전형적인 하루 : 내담자가 의존적인지 독립적인지, 임의적인지 체계적인지 알 수 있도록 돕는다.\n③ 강점과 장애 : 장애보다 강점에 중점을 두고 장애를 극복하기 위한 방안을 찾는다.\n④ 요약 : 내담자가 스스로에 대해 알게 된 사실을 요약하게 하여 자기인식을 증진시킨다.","frequency":2,"recent":false,"expected":false,"importance":0,"category":"상담실무·기법","searchText":"직업상담의 구조화된 면담법으로 생애진로 사정의 구조 4가지에 대해 설명하시오. ① 진로사정 : 내담자의 직업, 교육, 훈련경험, 관심사 등에 관하여 사정한다.\n② 전형적인 하루 : 내담자가 의존적인지 독립적인지, 임의적인지 체계적인지 알 수 있도록 돕는다.\n③ 강점과 장애 : 장애보다 강점에 중점을 두고 장애를 극복하기 위한 방안을 찾는다.\n④ 요약 : 내담자가 스스로에 대해 알게 된 사실을 요약하게 하여 자기인식을 증진시킨다. 상담실무·기법 2020년 1회/2019년 3회"},{"id":"old-141","sourceGroup":"2019~2024","source":"2021년 2회","year":2021,"number":137,"question":"흥미를 사정하는 목적을 5가지 쓰시오.","answer":"여가선호와 직업선호 구별 / 자기인식 발전 / 직업탐색 조장 / 직업대안 규명 / 직업·교육상 불만족 원인 규명","frequency":1,"recent":false,"expected":false,"importance":0,"category":"기타 핵심이론","searchText":"흥미를 사정하는 목적을 5가지 쓰시오. 여가선호와 직업선호 구별 / 자기인식 발전 / 직업탐색 조장 / 직업대안 규명 / 직업·교육상 불만족 원인 규명 기타 핵심이론 2021년 2회"},{"id":"old-142","sourceGroup":"2019~2024","source":"2022년 1회","year":2022,"number":138,"question":"다음 내용은 내담자의 짧은 호소문이다. 이 호소문의 내용을 참고하여 아래의 각 물음에 답하시오.\n저는 어렸을 때부터 모범생이었으며, 항상 부모님을 실망시키지 않았습니다. 대학교에서도 우수한 성적으로 졸업하였습니다. 그리고 부모님이\n나 친척들이 저에게 많은 기대를 하고 있지요. 좋은 직업을 갖고 내로라하는 직장에 취업할 수 있다고 믿고 있습니다. 사실 제 형제들은\n저보다 공부를 잘하지도 못했고 좋은 대학도 나오지 못했습니다. 그래서 항상 보무님들은 제가 기쁘게 해 드릴 수 있다고 생각합니다.\n대학의 학과 선택도 부모님의 의견을 존중했습니다. 전 부모님을 실망시켜드리고 싶지 않아 열심히 취업 준비를 하였습니다. 그런데 어쩐\n일인지 아무리 노력해도 취업하기가 힘듭니다. 이번에 Y 회사에 이력서를 냈는데 그르칠까 봐 걱정입니다. 더군다나 이번이 그럴듯한\n회사의 채용공고가 거의 마지막 기회이기 때문에 실패하게 된다고 생각하니 숨이 막힐 것 같습니다. 어떻게 해서라도 좋은 회사에 취업을\n해야만 한다고 생각하니 하루하루 생활이 힘듭니다.\n1) 이 내담자를 진단하고, 어떤 기법을 사용해야 하는지를 제시하시오.\n이 내담자는 취업에 실패하는 것은 인생이 실패하는 것이라는 비합리적 사고에 빠져있다. 따라서 엘리스의 합리적 정서적 상담기법을\n사용하는 것이 바람직하다.\n2) 직업 상담을 실시한다면 각 치료단계(5단계)마다 어떤 내용으로 상담을 진행해야 하는지 간략하게 가상적인 상담내용을 기록하시오.","answer":"A : 선행사건 - Y 회사에 이력서를 냈다.\nB : 불합리한 신념 - Y 회사에 합격하지 못하면 더이상 그럴듯한 채용이 없고 부모님을 실망시키게 된다.\nC : 결과 - Y 회사 취업에 실패할까 봐 숨이 막힌다.\nD : 논박 - 그럴듯한 채용건이 더 이상 없는 것이 아니며, 좋은 회사에 채용하는 것이 인생의 성공을 의미하는 것 X\nE : 효과 - 내담자는 Y 회사 채용이 마지막 기회가 아님을 인지하고 다른 채용 건 또는 다른 진로에 대한 목표를 갖게 됨. 이를 통해\n스트레스와 압박감을 극복하고 정서적 안정을 찾으며, 새로운 동기부여를 찾음.\n3) 호소문에는 제시되지 않았으나 이 내담자가 가지고 있는 예측될 수 있는 문제는 무엇이 있는지 6가지를 쓰시오.\n무력감에 빠진다. 우울하다. 불안하고 초조하다. 불면증에 시달린다. 좌절감을 느낀다. 스트레스를 심하게 받는다.","frequency":1,"recent":false,"expected":false,"importance":0,"category":"상담이론","searchText":"다음 내용은 내담자의 짧은 호소문이다. 이 호소문의 내용을 참고하여 아래의 각 물음에 답하시오.\n저는 어렸을 때부터 모범생이었으며, 항상 부모님을 실망시키지 않았습니다. 대학교에서도 우수한 성적으로 졸업하였습니다. 그리고 부모님이\n나 친척들이 저에게 많은 기대를 하고 있지요. 좋은 직업을 갖고 내로라하는 직장에 취업할 수 있다고 믿고 있습니다. 사실 제 형제들은\n저보다 공부를 잘하지도 못했고 좋은 대학도 나오지 못했습니다. 그래서 항상 보무님들은 제가 기쁘게 해 드릴 수 있다고 생각합니다.\n대학의 학과 선택도 부모님의 의견을 존중했습니다. 전 부모님을 실망시켜드리고 싶지 않아 열심히 취업 준비를 하였습니다. 그런데 어쩐\n일인지 아무리 노력해도 취업하기가 힘듭니다. 이번에 y 회사에 이력서를 냈는데 그르칠까 봐 걱정입니다. 더군다나 이번이 그럴듯한\n회사의 채용공고가 거의 마지막 기회이기 때문에 실패하게 된다고 생각하니 숨이 막힐 것 같습니다. 어떻게 해서라도 좋은 회사에 취업을\n해야만 한다고 생각하니 하루하루 생활이 힘듭니다.\n1) 이 내담자를 진단하고, 어떤 기법을 사용해야 하는지를 제시하시오.\n이 내담자는 취업에 실패하는 것은 인생이 실패하는 것이라는 비합리적 사고에 빠져있다. 따라서 엘리스의 합리적 정서적 상담기법을\n사용하는 것이 바람직하다.\n2) 직업 상담을 실시한다면 각 치료단계(5단계)마다 어떤 내용으로 상담을 진행해야 하는지 간략하게 가상적인 상담내용을 기록하시오. a : 선행사건 - y 회사에 이력서를 냈다.\nb : 불합리한 신념 - y 회사에 합격하지 못하면 더이상 그럴듯한 채용이 없고 부모님을 실망시키게 된다.\nc : 결과 - y 회사 취업에 실패할까 봐 숨이 막힌다.\nd : 논박 - 그럴듯한 채용건이 더 이상 없는 것이 아니며, 좋은 회사에 채용하는 것이 인생의 성공을 의미하는 것 x\ne : 효과 - 내담자는 y 회사 채용이 마지막 기회가 아님을 인지하고 다른 채용 건 또는 다른 진로에 대한 목표를 갖게 됨. 이를 통해\n스트레스와 압박감을 극복하고 정서적 안정을 찾으며, 새로운 동기부여를 찾음.\n3) 호소문에는 제시되지 않았으나 이 내담자가 가지고 있는 예측될 수 있는 문제는 무엇이 있는지 6가지를 쓰시오.\n무력감에 빠진다. 우울하다. 불안하고 초조하다. 불면증에 시달린다. 좌절감을 느낀다. 스트레스를 심하게 받는다. 상담이론 2022년 1회"},{"id":"old-143","sourceGroup":"2019~2024","source":"2021년 3회","year":2021,"number":139,"question":"진로시간 전망 검사 중 원형 검사에서 시간 전망 개입의 3가지 차원을 쓰고 각각에 대해 설명하시오.","answer":"① 변별성 : 미래를 현실처럼 느끼고 목표를 설정하는 것.\n② 통합성 - 미래와 현재를 연결하여 미래에 대한 인식을 증진시키는 것.\n③ 방향성 - 미래를 낙관적으로 구성하는 것.","frequency":1,"recent":false,"expected":false,"importance":0,"category":"직업선택·발달","searchText":"진로시간 전망 검사 중 원형 검사에서 시간 전망 개입의 3가지 차원을 쓰고 각각에 대해 설명하시오. ① 변별성 : 미래를 현실처럼 느끼고 목표를 설정하는 것.\n② 통합성 - 미래와 현재를 연결하여 미래에 대한 인식을 증진시키는 것.\n③ 방향성 - 미래를 낙관적으로 구성하는 것. 직업선택·발달 2021년 3회"},{"id":"old-144","sourceGroup":"2019~2024","source":"2019년 3회","year":2019,"number":140,"question":"진로시간 전망 검사지의 주요 용도 3가지를 쓰고 각각 설명하시오.","answer":"① 미래에 대한 희망을 갖도록 한다.\n② 미래가 실제인 것처럼 느끼게 해 준다.\n③ 목표의식을 갖도록 촉구한다.\n④ 진로의식을 높인다.\n⑤ 미래를 계획하는 연습을 한다.\n⑥ 연재의 행동을 미래의 결과와 연계하도록 한다.\n⑦ 미래의 방향을 이끌어 낸다.","frequency":1,"recent":false,"expected":false,"importance":0,"category":"직업선택·발달","searchText":"진로시간 전망 검사지의 주요 용도 3가지를 쓰고 각각 설명하시오. ① 미래에 대한 희망을 갖도록 한다.\n② 미래가 실제인 것처럼 느끼게 해 준다.\n③ 목표의식을 갖도록 촉구한다.\n④ 진로의식을 높인다.\n⑤ 미래를 계획하는 연습을 한다.\n⑥ 연재의 행동을 미래의 결과와 연계하도록 한다.\n⑦ 미래의 방향을 이끌어 낸다. 직업선택·발달 2019년 3회"},{"id":"old-145","sourceGroup":"2019~2024","source":"2021년 3회","year":2021,"number":141,"question":"A노동조합의 기업은 시간당 임금이 4,000원일 때 20,000시간의 노동을 필요로 한다. 임금이 5,000원으로 인상되면 10,000시간의\n노동을 필요로 한다. B노동조합의 기업은 시간당 6,000원일 때 30,000시간의 노동을 필요로 한다. 임금이 5,000원으로 인하되면\n33,000시간의 노동을 필요로 한다.\n(1) A, B노동조합의 기업의 노동수요의 임금 탄력성을 구하시오.","answer":"임금탄력성 = | 노동 수요 변화율 / 임금 변화율 |\nA기업 = |{(10,000 - 20,000) / 20,000 x 100} / {(5,000 - 4,000) / 4,000 x 100}| = 2\nB기업 = |{(33,000 - 30,000) / 30,000 x 100} / {(5,000 - 6,000) / 6,000 x 100}| = 0.6\n(2) 어느 노동조합이 임금교섭력이 강한지 쓰고, 그 이유를 설명하시오.\n교섭력이 강한 것은 B노동조합이다. 일반적으로 노동수요의 임금 탄력성이 낮을 수록 노동조합의 교섭력은 커진다. 노동수요의 임금 탄력성이\n낮으면 임금이 인상되어도 고용 감소가 적기 때문이다.","frequency":1,"recent":false,"expected":false,"importance":0,"category":"노동시장·고용","searchText":"a노동조합의 기업은 시간당 임금이 4,000원일 때 20,000시간의 노동을 필요로 한다. 임금이 5,000원으로 인상되면 10,000시간의\n노동을 필요로 한다. b노동조합의 기업은 시간당 6,000원일 때 30,000시간의 노동을 필요로 한다. 임금이 5,000원으로 인하되면\n33,000시간의 노동을 필요로 한다.\n(1) a, b노동조합의 기업의 노동수요의 임금 탄력성을 구하시오. 임금탄력성 = | 노동 수요 변화율 / 임금 변화율 |\na기업 = |{(10,000 - 20,000) / 20,000 x 100} / {(5,000 - 4,000) / 4,000 x 100}| = 2\nb기업 = |{(33,000 - 30,000) / 30,000 x 100} / {(5,000 - 6,000) / 6,000 x 100}| = 0.6\n(2) 어느 노동조합이 임금교섭력이 강한지 쓰고, 그 이유를 설명하시오.\n교섭력이 강한 것은 b노동조합이다. 일반적으로 노동수요의 임금 탄력성이 낮을 수록 노동조합의 교섭력은 커진다. 노동수요의 임금 탄력성이\n낮으면 임금이 인상되어도 고용 감소가 적기 때문이다. 노동시장·고용 2021년 3회"},{"id":"old-146","sourceGroup":"2019~2024","source":"2021년 2회/2024년 2회","year":2024,"number":142,"question":"비수요부족 실업에 해당하는 대표적 실업을 3가지 쓰고 설명하시오.","answer":"① 마찰적 실업 : 신규 또는 전직자가 직업을 찾는 과정에서 직업정보 부족으로 인해 일시적으로 발생하는 비수요부족, 자발적 실업\n② 구조적 실업 : 경제구조 자체의 변화 또는 지역 간 노동력 수급의 불균형 때문에 발생하는 비수요부족, 비자발적, 장기적 실업\n③ 계절적 실업 : 기후나 계절 변화에 따라 노동수요의 변화가 심한 부문에서 발생하는 비수요부족, 일시적 실업.\n(♣ 수요부족 실업 _ 경기적 실업 : 불경기를 맞거나 경기가 후퇴하면서 생산물 시장의 수요 부족으로 인해 노동의 수요가 감소하여 발생.)","frequency":2,"recent":false,"expected":false,"importance":0,"category":"노동시장·고용","searchText":"비수요부족 실업에 해당하는 대표적 실업을 3가지 쓰고 설명하시오. ① 마찰적 실업 : 신규 또는 전직자가 직업을 찾는 과정에서 직업정보 부족으로 인해 일시적으로 발생하는 비수요부족, 자발적 실업\n② 구조적 실업 : 경제구조 자체의 변화 또는 지역 간 노동력 수급의 불균형 때문에 발생하는 비수요부족, 비자발적, 장기적 실업\n③ 계절적 실업 : 기후나 계절 변화에 따라 노동수요의 변화가 심한 부문에서 발생하는 비수요부족, 일시적 실업.\n(♣ 수요부족 실업 _ 경기적 실업 : 불경기를 맞거나 경기가 후퇴하면서 생산물 시장의 수요 부족으로 인해 노동의 수요가 감소하여 발생.) 노동시장·고용 2021년 2회/2024년 2회"},{"id":"old-147","sourceGroup":"2019~2024","source":"2021년 2회/2020년 3회","year":2021,"number":143,"question":"개인의 관심이나 호기심을 자극하는 어떤 것을 흥미라고 한다. 내담자 가 흥미를 사정하려고 할 때 사용할 수 있는\n사정기법을 3가지만 쓰고 각각에 대하여 설명하시오","answer":"① 흥미평가기법 : 종이에 쓰여진 알파벳에 따라 흥밋거리를 기입하게 해서 내담자의 흥미를 사정하는 기법이다.\n② 직업선호도검사 : 홀랜드의 흥미유형과 연관지어 내담자의 흥미를 사정한다\n③ 직업카드분류법 : 직업선택의 동기를 알아보기 위해 직업카드를 선호군, 혐오군, 미결정 중성군으로 분류하도록 한다.\n④ 작업경험 분석 : 내담자가 과거에 경험했던 작업들을 분석해 직업 관련 선호도를 찾아내는 기법이다.","frequency":2,"recent":false,"expected":false,"importance":0,"category":"상담이론","searchText":"개인의 관심이나 호기심을 자극하는 어떤 것을 흥미라고 한다. 내담자 가 흥미를 사정하려고 할 때 사용할 수 있는\n사정기법을 3가지만 쓰고 각각에 대하여 설명하시오 ① 흥미평가기법 : 종이에 쓰여진 알파벳에 따라 흥밋거리를 기입하게 해서 내담자의 흥미를 사정하는 기법이다.\n② 직업선호도검사 : 홀랜드의 흥미유형과 연관지어 내담자의 흥미를 사정한다\n③ 직업카드분류법 : 직업선택의 동기를 알아보기 위해 직업카드를 선호군, 혐오군, 미결정 중성군으로 ,"number":147,"question":"A회사의 근로자 수와 하루 의자 생산량은 다음과 같다. 아래 물음에 답하시오. (임금은 10,000원, 의자 가격은 2,000원)\n인원\n총 생산한 의자 수\n1\n10\n2\n18\n3\n23\n4\n27\n5\n30\n(1) 근로자 수가 5명일 때 노동의 평균 생산량을 구하시오.\n30 / 5 = 6, 6명\n(2) 이윤을 극대화하기 위해 고용해야 할 근로자 수와 노동의 한계생산량을 구하시오.\n이윤의 극대화는 임금과 한계 생산물 가치가 같을 때 이루어진다. (23개 - 18개) x 2,000원 = 10,000원, 고용인원이 3명일 때 임금과\n한계생산물가치가 일치한다. 따라서 이윤을 극대화하기 위해 고용해야 할 근로자는 3명이고, 이때의 한계생산량은 5개(23개-18개)이다.","answer":"- 아래와 같이 표를 그린후 답을 구하면 보다 용이합니다.\n인원\n총 생산한 의자 수\n한계생산량\n한계생산가치\n1\n10\n10\n20,000\n2\n18\n8\n16,000\n3\n23\n5\n10,000\n4\n27\n4\n8,000\n5\n30\n3\n6,000","frequency":1,"recent":false,"expected":false,"importance":0,"category":"노동시장·고용","searchText":"a회사의 근로자 수와 하루 의자 생산량은 다음과 같다. 아래 물음에 답하시오. (임금은 10,000원, 의자 가격은 2,000원)\n인원\n총 생산한 의자 수\n1\n10\n2\n18\n3\n23\n4\n27\n5\n30\n(1) 근로자 수가 5명일 때 노동의 평균 생산량을 구하시오.\n30 / 5 = 6, 6명\n(2) 이윤을 극대화하기 위해 고용해야 할 근로자 수와 노동의 한계생산량을 구하시오.\n이윤의 극대화는 임금과 한계 생산물 가치가 같을 때 이루어진다. (23개 - 18개) x 2,000원 = 10,000원, 고용인원이 3명일 때 임금과\n한계생산물가치가 일치한다. 따라서 이윤을 극대화하기 위해 고용해야 할 근로자는 3명이고, 이때의 한계생산량은 5개(23개-18개)이다. - 아래와 같이 표를 그린후 답을 구하면 보다 용이합니다.\n인원\n총 생산한 의자 수\n한계생산량\n한계생산가치\n1\n10\n10\n20,000\n2\n18\n8\n16,000\n3\n23\n5\n10,000\n4\n27\n4\n8,000\n5\n30\n3\n6,000 노동시장·고용 2021년 1회"},{"id":"old-152","sourceGroup":"2019~2024","source":"2021년 1회/2020년 3회","year":2021,"number":148,"question":"스트롱 직업흥미검사의 척도를 3가지 쓰시오.","answer":"① GOT (일반직업분류) : 흥미에 대한 포괄정보제공, 홀랜드 6가지 유형\n② BIS (기본흥미척도) : 6가지 흥미유형에 대한 구체적 정보, 특정활동주제에 대한 개인흥미평가\n③ PSS (개인특성척도) : 업무스타일, 학습스타일, 리더십, 모험심에 대한 선호도, 일상생활과 일에 대한 광범위한 특성","frequency":2,"recent":false,"expected":false,"importance":0,"category":"직업정보·분류","searchText":"스트롱 직업흥미검사의 척도를 3가지 쓰시오. ① got (일반직업분류) : 흥미에 대한 포괄정보제공, 홀랜드 6가지 유형\n② bis (기본흥미척도) : 6가지 흥미유형에 대한 구체적 정보, 특정활동주제에 대한 개인흥미평가\n③ pss (개인특성척도) : 업무스타일, 학습스타일, 리더십, 모험심에 대한 선호도, 일상생활과 일에 대한 광범위한 특성 직업정보·분류 2021년 1회/2020년 3회"},{"id":"old-153","sourceGroup":"2019~2024","source":"2021년 1회","year":2021,"number":149,"question":"동시 타당도와 예측 타당도의 의미를 쓰고 그 차이점을 설명하시 로 올랐다고 가정하자. 생산성 임금제에 근거할 때 이 기업의 2008년도\n적정임금상승률을 구하시오. 생산성 임금제 하에서는 임금 상승률과 생산성 상승률이 같다.\n부가가치 노동생산성 = (생산량 x 생산물 단가) / 노동 투입량\n2007년 부가가치 노동생산성 = (100개 x 10원) / 40명 = 25원\n2008년 부가가치 노동생산성 = (120개 x 12원) / 50명 = 28.8원\n생산성 상승률 = (28.8원 - 25원) / 25원 x 100 = 15.2%\n따라서 2008년 임금 상승률은 15.2%이다. 노동시장·고용 2020년 4회"},{"id":"old-160","sourceGroup":"2019~2024","source":"2020년 3회/2023년 3회","year":2023,"number":156,"question":"아래 내용을 참조하여 기업의 한계노동비용과 이윤 극대화가 이루어질 때 노동공급 등을 구하시오.\n노동공급단위\n임금\n한계수입생산\n5단위\n6\n62\n6단위\n8\n50\n7단위\n10\n38\n8단위\n12\n26\n9단위\n14\n14\n10단위\n16\n2\n(1) 노동공급이 7단위일 때 한계 노동비용을 구하시오.\n한계노동비용 = ( 7 x 10 ) - ( 6 x 8 ) = 12\n(2) 이윤 극대화가 이루어지는 노동공급과 임금을 구하시오.","answer":"Ÿ\n이윤극대화가 이루어지는 거은 한계노동비용과 한계수입생산이 같을 때이다.\nŸ\n노동공급이 8단위일 때 한계노동비용은 ( 12 x 8 ) - ( 10 x 7 ) = 26으로 한계수입생산과 같다.\nŸ\n따라서 이윤이 극대화 되는 것은 노동공급 8단위, 임금 12일 때이다.","frequency":2,"recent":false,"expected":false,"importance":0,"category":"노동시장·고용","searchText":"아래 내용을 참조하여 기업의 한계노동비용과 이윤 극대화가 이루어질 때 노동공급 등을 구하시오.\n노동공급단위\n임금\n한계수입생산\n5단위\n6\n62\n6단위\n8\n50\n7단위\n10\n38\n8단위\n12\n26\n9단위\n14\n14\n10단위\n16\n2\n(1) 노동공급이 7단위일 때 한계 노동비용을 구하시오.\n한계노동비용 = ( 7 x 10 ) - ( 6 x 8 ) = 12\n(2) 이윤 극대화가 이루어지는 노동공급과 임금을 구하시오. ÿ\n이윤극대화가 이루어지는 거은 한계노동비용과 한계수입생산이 같을 때이다.\nÿ\n노동공급이 8단위일 때 한계노동비용은 ( 12 x 8 ) - ( 10 x 7 ) = 26으로 한계수입생산과 같다.\nÿ\n따라서 이윤이 극대화 되는 것은 노동공급 8단위, 임금 12일 때이다. 노동시장·고용 2020년 3회/2023년 3회"},{"id":"old-161","sourceGroup":"2019~2024","source":"2020년 2회","year":2020,"number":157,"question":"구조조정 당한 실직자 상담에 대해 다음 물음에 답하시오.\n(1) 구조조정 당한 실직자의 심리적 특성을 2가지 기술하시오. : 자존감이 낮아진다. / 우울증에 빠질 수 있다.\n(2) 이 내담자에게 적용할 수 있는 지도방법 2가지를 제시하시오.","answer":"Ÿ\n논박을 통해 비합리적 신념에서 벗어나도록 한다.\nŸ\n새로운 직업을 탐색할 수 있도록 정보를 제공한다.","frequency":1,"recent":false,"expected":false,"importance":0,"category":"상담실무·기법","searchText":"구조조정 당한 실직자 상담에 대해 다음 물음에 답하시오.\n(1) 구조조정 당한 실직자의 심리적 특성을 2가지 기술하시오. : 자존감이 낮아진다. / 우울증에 빠질 수 있다.\n(2) 이 내담자에게 적용할 수 있는 지도방법 2가지를 제시하시오. ÿ\n논박을 통해 비합리적 신념에서 벗어나도록 한다.\nÿ\n새로운 직업을 탐색할 수 있도록 정보를 제공한다. 상담실무·기법 2020년 2회"},{"id":"old-162","sourceGroup":"2019~2024","source":"2020년 2회","year":2020,"number":158,"question":"다음 표에서 내담자 C의 점수가 7점이고, 평균과 표준편차가 아래와 같을 때 C의 표준점수 Z를 구하시오.","answer":"(소수점 둘째 자리에서 반올림할 것.)\n내담자\nA\nB\nC\nD\nE\nF\n평균\n표준편차\n점수\n3\n6\n7\n10\n14\n20\n10","frequency":1,"recent":false,"expected":false,"importance":0,"category":"심리검사·통계","searchText":"다음 표에서 내담자 c의 점수가 7점이고, 평균과 표준편차가 아래와 같을 때 c의 표준점수 z를 구하시오. (소수점 둘째 자리에서 반올림할 것.)\n내담자\na\nb\nc\nd\ne\nf\n평균\n표준편차\n점수\n3\n6\n7\n10\n14\n20\n10 심리검사·통계 2020년 2회"},{"id":"old-164","sourceGroup":"2019~2024","source":"2020년 2회","year":2020,"number":159,"question":"고용정보를 미시 정보와 거시 정보로 나누어 각각 2가지씩 쓰시오.","answer":"① 미시정보 : 구인, 구직 정보, 취업박람회\n② 거시정보 : 경제 및 산업동향, 노동시장 및 고용 실업 동향","frequency":1,"recent":false,"expected":false,"importance":0,"category":"노동시장·고용","searchText":"고용정보를 미시 정보와 거시 정보로 나누어 각각 2가지씩 쓰시오. ① 미시정보 : 구인, 구직 정보, 취업박람회\n② 거시정보 : 경제 및 산업동향, 노동시장 및 고용 실업 동향 노동시장·고용 2020년 2회"},{"id":"old-165","sourceGroup":"2019~2024","source":"2020년 2회","year":2020,"number":160,"question":"내부 노동시장이론, 이중노동시장이론, 인적 자본론에 대해 각각 설명하시오.","answer":"① 내부노동시장이론 : 기업의 규모가 커지고 노동조합이 성장하면 기업 내부에 노동시장이 형성되어\n내부시장과 외부시장으로 분리된다는 이론이다.\n② 이중노동시장이론 : 한 나라의 노동시장은 1차 노동시장과 2차 노동시장으로 나누어져 있으며,\n서로 다른 근로조건을 갖고 있고 노동력의 이동이 제한적이라는 이론이다.\n③ 인적자본론 : 인간을 투자에 의해 생산성을 향상 시킬 수 있는 자본으로 보는 이론이다.","frequency":1,"recent":false,"expected":false,"importance":0,"category":"노동시장·고용","searchText":"내부 노동시장이론, 이중노동시장이론, 인적 자본론에 대해 각각 설명하시오. ① 내부노동시장이론 : 기업의 규모가 커지고 노동조합이 성장하면 기업 내부에 노동시장이 형성되어\n내부시장과 외부시장으로 분리된다는 이론이다.\n② 이중노동시장이론 : 한 나라의 노동시장은 1차 노동시장과 2차 노동시장으로 나누어져 있으며,\n서로 다른 근로조건을 갖고 있고 노동력의 이동이 제한적이라는 이론이다.\n③ 인적자본론 : 인간을 투자에 의해 생산성을 향상 시킬 수 있는 자본으로 보는 이론이다. 노동시장·고용 2020년 2회"},{"id":"old-166","sourceGroup":"2019~2024","source":"2020년 2회","year":2020,"number":161,"question":"다음 표를 보고 물음에 답하시오.","answer":"시간당 임금\n5,000원\n6,000원\n7,000원\n8,000원\n9,000원\nA기업의\n22\n21\n20\n19\n18\n노동수요량\nB기업의\n24\n22\n20\n18\n16\n노동수요량\n(1) 임금이 7,000원에서 8,000원으로 인상될 때 각 기업의 노동수요의 임금 탄력성을 구하시오.\n노동수요의 임금탄력성 = | 노동수요량의 변화율 / 임금의 변화율 |\nA기업의 임금탄력성 = | {(19-20)/20 x 100} / {(8,000-7,000)/7,000 x 100} | = | -5% / 14% | = 0.36\nB기업의 임금탄력서 = | {(18-20)/20 x 100} / {(8,000-7,000)/7,000 x 100} | = | -10% / 14% | = 0.71\n(2) A, B 각 기업의 노동조합이 임금인상 협상을 시도할 때 임금인상을 타결할 가능성이 높은 기업과 그 이유를 설명하시오.\n노동수요의 임금탄력성이 낮을 수록 노동조합의 교섭력이 커진다. 노동수요의 탄력성이 낮으면 임금이 인상 되어도 고용량의 감소가 적기\n때문이다. 따라서 노동수요의 임금탄력성이 낮은 A기업이 협상 가능성이 높다.","frequency":1,"recent":false,"expected":false,"importance":0,"category":"노동시장·고용","searchText":"다음 표를 보고 물음에 답하시오. 시간당 임금\n5,000원\n6,000원\n7,000원\n8,000원\n9,000원\na기업의\n22\n21\n20\n19\n18\n노동수요량\nb기업의\n24\n22\n20\n18\n16\n노동수요량\n(1) 임금이 7,000원에서 8,000원으로 인상될 때 각 기업의 노동수요의 임금 탄력성을 구하시오.\n노동수요의 임금탄력성 = | 노동수요량의 변화율 / 임금의 변화율 |\na기업의 임금탄력성 = | {(19-20)/20 x 100} / {(8,000-7,000)/7,000 x 100} | = | -5% / 14% | = 0.36\nb기업의 임금탄력서 = | {(18-20)/20 x 100} / {(8,000-7,000)/7,000 x 100} | = | -10% / 14% | = 0.71\n(2) a, b 각 기업의 노동조합이 임금인상 협상을 시도할 때 임금인상을 타결할 가능성이 높은 기업과 그 이유를 설명하시오.\n노동수요의 임금탄력성이 낮을 수록 노동조합의 교섭력이 커진다. 노동수요의 탄력성이 낮으면 임금이 인상 되어도 고용량의 감소가 적기\n때문이다. 따라서 노동수요의 임금탄력성이 낮은 a기업이 협상 가능성이 높다. 노동시장·고용 2020년 2회"},{"id":"old-167","sourceGroup":"2019~2024","source":"2020년 2회/2019년 1회","year":2020,"number":162,"question":"임금이 상승하면 노동공급곡선은 우상향 한다. 이것이 참인지, 거짓인지, 불확실한지 판정하고\n여가와 소득의 선택 모형에 의거하여 그 이유를 설명하시오.","answer":"Ÿ\n불확실하다.\nŸ\n여가가 열등재인 경우 노동공급곡선은 우상향하지만, 여가가 정상재인 경우 임금이 일정 수준에 이를 때까지는 대체효과가 소득효과\n보다 커서 노동공급곡선이 우상향하지만, 소득효과가 대체효과 보다 커지면 노동을 줄이고 여가를 늘리게 되어 노동공급곡선이 후방\n굴절형이 된다.","frequency":2,"recent":false,"expected":false,"importance":0,"category":"노동시장·고용","searchText":"임금이 상승하면 노동공급곡선은 우상향 한다. 이것이 참인지, 거짓인지, 불확실한지 판정하고\n여가와 소득의 선택 모형에 의거하여 그 이유를 설명하시오. ÿ\n불확실하다.\nÿ\n여가가 열등재인 경우 노동공급곡선은 우상향하지만, 여가가 정상재인 경우 임금이 일정 수준에 이를 때까지는 대체효과가 소득효과\n보다 커서 노동공급곡선이 우상향하지만, 소득효과가 대체효과 보다 커지면 노동을 줄이고 여가를 늘리게 되어 노동공급곡선이 후방\n굴절형이 된다. 노동시장·고용 2020년 2회/2019년 1회"},{"id":"old-168","sourceGroup":"2019~2024","source":"2020년 1회","year":2020,"number":163,"question":"직업상담의 과정 5단계를 쓰시오.","answer":"Ÿ\n관계형성 → 진단 → 목표설정 → 개입 → 평가","frequency":1,"recent":false,"expected":false,"importance":0,"category":"상담실무·기법","searchText":"직업상담의 과정 5단계를 쓰시오. ÿ\n관계형성 → 진단 → 목표설정 → 개입 → 평가 상담실무·기법 2020년 1회"},{"id":"old-169","sourceGroup":"2019~2024","source":"2020년 1회","year":2020,"number":164,"question":"역량검사와 속도검사에 대해서 설명하시오.","answer":"① 역량검사 : 시간의 제한 없이 어려운 문제로 구성된 검사이다. 문제해결 능력을 측정한다.\n② 속도검사 : 시간 제한이 있으며, 대체로 쉬운 문제로 구성된다. 숙련도를 측정하는 검사이다.","frequency":1,"recent":false,"expected":false,"importance":0,"category":"기타 핵심이론","searchText":"역량검사와 속도검사에 대해서 설명하시오. ① 역량검사 : 시간의 제한 없이 어려운 문제로 구성된 검사이다. 문제해결 능력을 측정한다.\n② 속도검사 : 시간 제한이 있으며, 대체로 쉬운 문제로 구성된다. 숙련도를 측정하는 검사이다. 기타 핵심이론 2020년 1회"},{"id":"old-170","sourceGroup":"2019~2024","source":"2020년 1회","year":2020,"number":165,"question":"가상적인 국가의 고용동향이 다음과 같다. 다음의 질문에 답하시오.","answer":"경제활동인구\n비경제활동인구\n임금 근로자\n비임금 근로자\n350천 명\n150천 명\n190천 명\n140천 명\n(1) 이 국가의 실업률을 구하시오.\n실업률 = 실업자 수 / 경제활동인구 수 x 100\n실업자 수 = 경제활동인구 수 - 취업자 수\n( 350천 명 - 190천 명 - 140천 명) / 350천 명 x 100 = 5.71%\n(2) 이 국가의 경제활동참가율을 구하시오.\n경제활동참가율 = 경제활동인구 수 / 생산가능인구 수 x 100\n생산가능인구 수 = 경제활동인구 수 + 비경제활동인구 수\n350천 명 / ( 350천 명 + 150천 명 ) x 100 = 70%\n(3) 자영업주가 90천 명일 때 무급가족종사자는 최소한 얼마인가?\n무급가족 종사자 = 비임금근로자 수 - 자영업주\n140천 명 - 90천 명 = 50천 명\n(4) 경제활동 가능 인구 중 취업자 비율을 구하시오.\n취업자 비율 = 취업자 수 / 생산가능인구 수 x 100\n취업자 수 = 임금근로자 수 + 비임금근로자 수\n( 190천 명 + 140천 명 ) / ( 350천 명 + 150천 명 ) x 100 = 66%","frequency":1,"recent":false,"expected":false,"importance":0,"category":"노동시장·고용","searchText":"가상적인 국가의 고용동향이 다음과 같다. 다음의 질문에 답하시오. 경제활동인구\n비경제활동인구\n임금 근로자\n비임금 근로자\n350천 명\n150천 명\n190천 명\n140천 명\n(1) 이 국가의 실업률을 구하시오.\n실업률 = 실업자 수 / 경제활동인구 수 x 100\n실업자 수 = 경제활동인구 수 - 취업자 수\n( 350천 명 - 190천 명 - 140천 명) / 350천 명 x 100 = 5.71%\n(2) 이 국가의 경제활동참가율을 구하시오.\n경제활동참가율 = 경제활동인구 수 / 생산가능인구 수 x 100\n생산가능인구 수 = 경제활동인구 수 + 비경제활동인구 수\n350천 명 / ( 350천 명 + 150천 명 ) x 100 = 70%\n(3) 자영업주가 90천 명일 때 무급가족종사자는 최소한 얼마인가?\n무급가족 종사자 = 비임금근로자 수 - 자영업주\n140천 명 - 90천 명 = 50천 명\n(4) 경제활동 가능 인구 중 취업자 비율을 구하시오.\n취업자 비율 = 취업자 수 / 생산가능인구 수 x 100\n취업자 수 = 임금근로자 수 + 비임금근로자 수\n( 190천 명 + 140천 명 ) / ( 350천 명 + 150천 명 ) x 100 = 66% 노동시장·고용 2020년 1회"},{"id":"old-171","sourceGroup":"2019~2024","source":"2024년 1회","year":2024,"number":166,"question":"고용률이 50%이고 비경제활동인구가 400명인 가상경제에서 실업자 수가 50명일 때 실업률을 구하시오.","answer":"실업률 = 실업자 수 / 경제활동인구 수 x 100\n고용률 = 취업자 수 / 생산가능인구 수 x 100\n경제활동인구 수 = 실업자 수 + 취업자 수\n생산가능인구 수 = 비경제활동인구 수 + 경제활동인구 수 = 비경제활동인구 수 + 실업자 수 + 취업자 수\n여기서 취업자 수를 A라고 하면,\n50%(고용률) = A / (400+50+A) x 100\nA = 450명\n실업률 = 50 / (50+450) x 100 = 10%","frequency":1,"recent":false,"expected":false,"importance":0,"category":"노동시장·고용","searchText":"고용률이 50%이고 비경제활동인구가 400명인 가상경제에서 실업자 수가 50명일 때 실업률을 구하시오. 실업률 = 실업자 수 / 경제활동인구 수 x 100\n고용률 = 취업자 수 / 생산가능인구 수 x 100\n경제활동인구 수 = 실업자 수 + 취업자 수\n생산가능인구 수 = 비경제활동인구 수 + 경제활동인구 수 = 비경제활동인구 수 + 실업자 수 + 취업자 수\n여기서 취업자 수를 a라고 하면,\n50%(고용률) = a / (400+50+a) x 100\na = 450명\n실업률 = 50 / (50+450) x 100 = 10% 노동시장·고용 2024년 1회"},{"id":"old-172","sourceGroup":"2019~2024","source":"2019년 3회/2024년 1회","year":2024,"number":167,"question":"자기 보고식 가치 사정하기에서 가치 사정 법 6가지를 쓰시오.","answer":"존경하는 사람 기술하기 / 백일몽 말하기 / 과거 선택 회상하기 / 자유시간과 금전의 사용계획 조사하기\n/ 체크목록 가치에 순위 매기기 / 절정 경험 조사하기","frequency":2,"recent":false,"expected":false,"importance":0,"category":"기타 핵심이론","searchText":"자기 보고식 가치 사정하기에서 가치 사정 법 6가지를 쓰시오. 존경하는 사람 기술하기 / 백일몽 말하기 / 과거 선택 회상하기 / 자유시간과 금전의 사용계획 조사하기\n/ 체크목록 가치에 순위 매기기 / 절정 경험 조사하기 기타 핵심이론 2019년 3회/2024년 1회"},{"id":"old-173","sourceGroup":"2019~2024","source":"2019년 3회","year":2019,"number":168,"question":"인지-정서적 상담이론에서 비합리적 신념의 뿌리를 이루고 있는 것으로 가정한 3가지 당위성을 쓰고,\n각각 예를 들어 설명하시오.","answer":"① 자신에 대한 당위성 : \"나는 반드시 성공해야 한다.\"와 같이 자신에 대한 당위적 신념이다.\n② 타인에 대한 당위성 : \"타인은 반드시 나를 공정하게 대해야 한다.\"와 같은 타인에 대한 당위적 신념이다.\n③ 세상에 대한 당위성 : \"세상은 내가 원하는 방향으로 진행되어야 한다.\"와 같은 세상에 대한 당위적 신념이다.","frequency":1,"recent":false,"expected":false,"importance":0,"category":"상담이론","searchText":"인지-정서적 상담이론에서 비합리적 신념의 뿌리를 이루고 있는 것으로 가정한 3가지 당위성을 쓰고,\n각각 예를 들어 설명하시오. ① 자신에 대한 .\n④ 축소상황 검사 : 실제와 같은 상황이지만 과제나 직무를 축소하여 제시하고 수검자가 어떻게 수행하는지 관찰하는 검사 심리검사·통계 2021년 3회/2019년 1회"},{"id":"old-184","sourceGroup":"2019~2024","source":"2019년 1회","year":2019,"number":178,"question":"심리검사의 결과에 영향을 미치는 검사자 변인과 수검자 변인 중에서 강화 효과, 기대효과, 코칭 효과를 설명하시오.","answer":"① 강화효과 : 검사자가 수검자에게 물질적, 언어적 보상을 하는 경우 검사 결과에 영향을 줄 수 있다.\n② 기대효과 : 검사자가 수검자에게 어떤 기대를 가지고 있는지 표현하는 것은 검사 결과에 영향을 줄 수 있다.\n③ 코칭효과 : 검사자가 수검자에게 검사와 관련하여 설명하고 지시하는 등의 코칭이 검사 결과에 영향을 줄 수 있다.","frequency":1,"recent":false,"expected":false,"importance":0,"category":"심리검사·통계","searchText":"심리검사의 결과에 영향을 미치는 검사자 변인과 수검자 변인 중에서 강화 효과, 기대효과, 코칭 효과를 설명하시오. ① 강화효과 : 검사자가 수검자에게 물질적, 언어적 보상을 하는 경우 검사 결과에 영향을 줄 수 있다.\n② 기대효과 : 검사자가 수검자에게 어떤 기대를 가지고 있는지 표현하는 것은 검사 결과에 영향을 줄 수 있다.\n③ 코칭효과 : 검사자가 수검자에게 검사와 관련하여 설명하고 지시하는 등의 코칭이 검사 결과에 영향을 줄 수 있다. 심리검사·통계 2019년 1회"},{"id":"old-185","sourceGroup":"2019~2024","source":"2019년 1회","year":2019,"number":179,"question":"교류분석 상담에서 개인의 생활 각본을 구성하는 주요 요소인 기본적인 생활자세를 4가지 쓰고 설명하시오.","answer":"① 자기긍정, 타인긍정 : 원만하고 긍정적인 생활자세이다.\n② 자기긍정, 타인부정 : 타인에 대해 공격적인 태도를 갖는 생활자세이다.\n③ 자기부정, 타인긍정 : 타인과 자신을 비교하며, 자기비하적인 태도를 갖는 생활자세이다.\n④ 자기부성, 타인부정 : 파괴적이고 비관적인 태도를 갖는 생활자세이다.","frequency":1,"recent":false,"expected":false,"importance":0,"category":"상담이론","searchText":"교류분석 상담에서 개인의 생활 각본을 구성하는 주요 요소인 기본적인 생활자세를 4가지 쓰고 설명하시오. ① 자기긍정, 타인긍정 : 원만하고 긍정적인 생활자세이다.\n② 자기긍정, 타인부정 : 타인에 대해 공격적인 태도를 갖는 생활자세이다.\n③ 자기부정, 타인긍정 : 타인과 자신을 비교하며, 자기비하적인 태도를 갖는 생활자세이다.\n④ 자기부성, 타인부정 : 파괴적이고 비관적인 태도를 갖는 생활자세이다. 상담이론 2019년 1회"},{"id":"old-186","sourceGroup":"2019~2024","source":"2019년 1회","year":2019,"number":180,"question":"A국의 15세 이상 생산가능 인구의 수가 100만 명, 경제활동 참가율이 70%, 실업률이 10%라고 할 때 실업자 수?","answer":"실업률 = 실업자 수 / 경제활동인구 수 x 100\n경제활동참가율 = 경제활동인구 수 / 생산가능인구 수 x 100\n70% = 경제활동인구 수 / 100만 명 x 100, 경제활동인구 수 = 70만 명\n10% = 실업자 수 / 70만 명 x 100, 실업자 수 = 7만 명","frequency":1,"recent":false,"expected":false,"importance":0,"category":"노동시장·고용","searchText":"a국의 15세 이상 생산가능 인구의 수가 100만 명, 경제활동 참가율이 70%, 실업률이 10%라고 할 때 실업자 수?
